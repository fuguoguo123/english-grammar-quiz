":"选C。考查形容词最高级。根据题意长春是中国最冷的城市之一，故选C。","source":"original"},{"question":"Music courses are ______ to me than science courses.","options":["interesting","more interesting","interested","more interested"],"answer":1,"explanation":"考查形容词辨析。由句意可知，要表达的意思是“使人感到有趣的”，用interesting，后文出现了than，所以要用比较级，前面加more，故选B。","source":"original"},{"question":"She was ______, and she told us the news ______.","options":["excited; happily","excitedly; happy","excitedly; happily","excited; happy"],"answer":0,"explanation":"考查形容词副词辨析。be动词后面加形容词作表语，excited，激动的，excitedly，激动地，故第一个空填excited，排除BC；第二个空填副词修饰told us the news，happy，高兴的，happily，高兴地，故第二个空填happily，故选A。","source":"original"},{"question":"______ has Hanmei been in the library?","options":["How long","How soon","How far","How often"],"answer":0,"explanation":"考查现在完成时。How long表示多久了，用于提问一段时间，has been in表示“已在某地（待了多久）”。","source":"original"},{"question":"The question is ______ for me.","options":["easy enough","enough easy","easier enough","enough easier"],"answer":0,"explanation":"考查enough的用法。考查enough作副词，修饰形容词时放在形容词后面。","source":"original"},{"question":"Tom is ______ than Jack. But I am ______ of the three.","options":["tall; tallest","taller; tallest","taller; the tallest"],"answer":2,"explanation":"此题考查形容词的比较级和最高级。根据句意：Tom比Jack高，但我是三个中最高的。两者之间用形容词的比较级，tall的比较级是taller；tall的最高级是tallest，故选C。","source":"original"},{"question":"______ is Mr. White? He's in the office.","options":["Who","Where","What"],"answer":1,"explanation":"考查特殊疑问词。根据答句，He's in the office. 回答位置关系使用特殊疑问词where。故答案为B。","source":"original"},{"question":"Which is ______, singing, dancing or watching TV?","options":["relaxing","more relaxing","most relaxing","the most relaxing"],"answer":3,"explanation":"这题考查形容词最高级，因为是singing，dancing和watchingTV三者比较，所以要用形容词最高级，选D。","source":"original"},{"question":"Elephants are ______ animals on land.","options":["the heaviest","the heavier","the heavy"],"answer":0,"explanation":"A. 考查形容词最高级。根据句意“大象是陆地上最重的动物”，选A，heavy的最高级是 heaviest，B是比较级，C是原级。","source":"original"},{"question":"Don't be ______. Let me help you.","options":["sad","sadly","excited","excitedly"],"answer":0,"explanation":"考查词性，sad形容词“悲伤的”，sadly副词“悲伤地”，excited形容词“激动的”，excitedly副词“激动地”，be动词后面接形容词，根据语境选择A项。","source":"original"},{"question":"My elder sister is two years ______ than I.","options":["older","old","the oldest"],"answer":0,"explanation":"看到than要用比较级。","source":"original"},{"question":"The hamburgers smell ______! I like them.","options":["salty","healthy","delicious"],"answer":2,"explanation":"考查形容词。根据空格后面的I like them.可知尝起来很美味，故选C。","source":"original"},{"question":"Exercise ______ and smoke ______ is good for your health.","options":["most; least","less; more","more; less","least; most"],"answer":2,"explanation":"考查比较级。句意是：多运动少吸烟有利于你的健康。","source":"original"},{"question":"______ do you go to school? — On foot.","options":["What","Where","How"],"answer":2,"explanation":"考查特殊疑问词。根据答句：On foot, 可知问句为“你怎样去学校？”A选项对事物进行提问，B选项对地点进行提问，C选项对方式进行提问。故答案为C。","source":"original"},{"question":"______ does Pat brush her teeth? Once a week.","options":["How long","How often","How much","What time"],"answer":1,"explanation":"考查代词。疑问代词的选择，结合句意“她多久刷一次牙？一周一次”可知，是对刷牙频率进行提问，因此选择B选项。","source":"original"},{"question":"I'm 40 kg. You are 46 kg. So you are ______ than me.","options":["tall","taller","heavy","heavier"],"answer":3,"explanation":"考查比较级，重的比较级为heavier。","source":"original"},{"question":"It's summer now, the weather is getting ______.","options":["higher and higher","lower and lower","hotter and hotter","colder and colder"],"answer":2,"explanation":"考查比较级。比较级+and+比较级意为“越来越...”，句意为“现在是夏天，天气变得越来越热”。","source":"original"},{"question":"______ the cat? — It's in the garden.","options":["Where's","Who's","What's"],"answer":0,"explanation":"考查特殊疑问词的用法。句意：猫在哪里？它在花园里。根据句意，问的是地点，故选A。","source":"original"},{"question":"The little boy is only three years old. He's ______ young to go to school.","options":["enough","very","too","quiet"],"answer":2,"explanation":"考查enough的too的区别。Too...to...是“太...以至于不能...”，句意是：我的小弟弟只有三岁，他太小了以至于还不能去上学。","source":"original"},{"question":"My dress is Size M. Your dress is Size L. Your dress is ______ than ______.","options":["bigger; my","smaller; my","bigger; mine","smaller; mine"],"answer":2,"explanation":"考查比较级和代词。根据句意，我的裙子是M号的，你的裙子是L号的，你的裙子比我的要大，需要用big的比较级bigger，同时第二空用名词性物主代词来作宾语，故答案为C。","source":"original"},{"question":"Tom and Jerry are in the ______ school. But they are in different ______.","options":["same, class","same, classes","difference, classes","different, class"],"answer":1,"explanation":"考查形容词辨析；根据句义，他们在相同的学校，在不同的班级，the same相同的，两个人在不同的班级，用class的复数，所以选B。","source":"original"},{"question":"That's the ______ dinosaur in this hall.","options":["heavier","heaviest","heavy","more heavy"],"answer":1,"explanation":"考查形容词最高级。句意：那是大厅里最重的恐龙。定冠词the+adj最高级，表示最......，故答案为heaviest。","source":"original"},{"question":"My mum is ______ in our family.","options":["busier","the busiest","busiest","the most busy"],"answer":1,"explanation":"考查形容词最高级。形容词的最高级前面必须用the。故选B。","source":"original"},{"question":"I'm 1.60 metres. You are 1.61 metres. You are ______ than me.","options":["shorter","taller","younger"],"answer":1,"explanation":"考查形容词比较级。根据than可知，形容词要使用比较级。根据句意：我身高是1.6米。你身高是1.61米。你比我高一点。故选B。","source":"original"},{"question":"They are ______ good students that they often get full marks in their exams.","options":["a such","such","so a","such a"],"answer":1,"explanation":"such + 形容词 + 名词 + that。","source":"original"},{"question":"The movie is ______. Yeah, and we are really very ______ when we see it.","options":["relaxing; relaxing","relaxed; relaxed","relaxing; relaxed","relaxed; relaxing"],"answer":2,"explanation":"本题考查形容词辨析。通常情况下，以- ing 结尾的形容词修饰物，意思是：令人...；而以- ed 结尾的形容词修饰人，意思是：感到...；结合句意：这部电影是令人放松的，填入relaxing；我们都感到放松的，填入relaxed；故选C。","source":"original"},{"question":"______ do you go to the cinema with your family? — Once a month.","options":["How often","How soon","How long","How far"],"answer":0,"explanation":"考查代词。How often，多久一次，问频率；How soon，多久以后；How long，多长时间；How far，多远，问距离。根据句意，这里想表达的是“你多久和你的家人去一次看电影？”故答案选A。","source":"original"},{"question":"Li Ming gets up late every morning, and he ______ late for school.","options":["always is","is always","never is","is never"],"answer":1,"explanation":"考查频率副词；频率副词用在be动词的后面，并且根据句意，Li Ming每天早上很迟起床，故应是总是迟到，故答案选B。","source":"original"},{"question":"Of the two sisters, Lucy is ______ one, and she is also the one who loves to be quiet.","options":["the younger","a youngest","a younger","the youngest"],"answer":0,"explanation":"考查比较级。在这两姐妹当中，Lucy是最年轻的。范围是两者，所以这里要用比较级，且在 of the two 句型中，比较级前要加 the，故答案选 A。","source":"original"},{"question":"Grandma ______ makes chocolate cakes because we don't like chocolate.","options":["sometimes","never","often"],"answer":1,"explanation":"根据不喜欢巧克力的意义得知此处频率为从不。","source":"original"},{"question":"This is my elder sister. She is three years ______ than me.","options":["old","older","elder","eldest"],"answer":1,"explanation":"考查形容词比较级。elder指年长的，作定语，表示比...年长用older than结构。选B。","source":"original"},{"question":"Most dinosaurs are ______ pandas.","options":["heavy than","heavier than","heaviest than","heavy more"],"answer":1,"explanation":"两者之间的比较 heavy 变成 heavier。","source":"original"},{"question":"You may be ______ if you have a ______ problem.","options":["exciting; worrying","worried; worried","worrying; worried","worried; worrying"],"answer":3,"explanation":"考查形容词辨析。- ed结尾的形容词，修饰人。- ing结尾的，修饰“物”。故选D。","source":"original"},{"question":"______ apple juice would you like to drink?","options":["How many","How much","How","What"],"answer":1,"explanation":"考查特殊疑问词用法。问数量用how many和how much，apple juice为不可数名词，所以选B。","source":"original"},{"question":"I don't need to use much money to buy the phone. It is ______.","options":["cheap","expensive","beautiful"],"answer":0,"explanation":"cheap便宜的。","source":"original"},{"question":"This phone is very big. It's as ______ as a tablet.","options":["small","smaller","bigger","big"],"answer":3,"explanation":"as+原形+as。","source":"original"},{"question":"Frank ______ watches movies because they are boring.","options":["often","usually","never"],"answer":2,"explanation":"因为电影很无聊，所以从来不看。","source":"original"},{"question":"—______ do you have lunch? — At 12:00 every day.","options":["When","Where","Who"],"answer":0,"explanation":"考查疑问词。一...吃午餐？一每天12点。“什么时候”“哪里”“谁”，故选A。","source":"original"},{"question":"Look, it's a ______ (红色的) door.","options":["red","blue"],"answer":0,"explanation":"考查单词词义辨析。句意：看，这是一扇红色的门。A.red红色，B.blue蓝色。根据句意，可知A项符合题意。故答案为A。","source":"original"},{"question":"Kate is ______ than all of his friends.","options":["tall","taller","tallest","the tallest"],"answer":1,"explanation":"比较级标志词than，tall比较级taller。","source":"original"},{"question":"Which is the ______, the train station, the bus station or the airport?","options":["far","farthest","father","more far"],"answer":1,"explanation":"考查形容词最高级。当相互比较的物体是三个或三个以上时，我们就要用形容词或副词的最高级。","source":"original"},{"question":"连词成句 she does work Where ?","options":["Where does she work?","Where she does work?","Does she work where?"],"answer":0,"explanation":"考查特殊疑问句。句意：她在哪里工作？根据题干中？和特殊疑问词Where可知，本句为特殊疑问句。句式：特殊疑问词+助动词+主语+动词原形？does为助动词，she为主语，work为动词。故答案为：Where does she work ?","source":"original"},{"question":"Which is the ______, the sun, the moon or the earth?","options":["small","smaller","smallest","the smallest"],"answer":3,"explanation":"句意：太阳，月亮，地球哪个最小？选最高级，D。","source":"original"},{"question":"Jack is ______ than Tom, he is ______ boy in the class.","options":["tall; taller","taller; taller","taller; the tallest"],"answer":2,"explanation":"第一个空有than为两者比较用比较级，第二个空in+范围表示在班上最高，用最高级。","source":"original"},{"question":"______ pictures are there on the wall? Five.","options":["How many","How much","How long","How often"],"answer":0,"explanation":"问多少为how many和how much，pictures可数用how many。","source":"original"},{"question":"A: ______ does your son go to school? B: He always goes to school at seven in the morning.","options":["What","Where","When"],"answer":2,"explanation":"考查疑问词。答句说出了上学的时间，所以问句用when提问，选C。","source":"original"},{"question":"Is your little sister ______ old to go to school?","options":["too","enough","very","quite"],"answer":1,"explanation":"考查enough和too的区别。enough放在名词之后形容词之前，句意是：你的小妹妹能够去上学了吗？","source":"original"},{"question":"The pancake usually tastes ______.","options":["delicious","deliciously","well","wonderfully"],"answer":0,"explanation":"taste是系动词，后接形容词。","source":"original"},{"question":"I am ______ tall ______ my elder brother.","options":["as; so","such; as","as; as","as; such"],"answer":2,"explanation":"as...as中间加形容词原形。","source":"original"},{"question":"My home is ______ of my classmates.","options":["bigger","the most highest","the highest","his"],"answer":2,"explanation":"big最高级the biggest。","source":"original"},{"question":"The boy is ______ young to carry the box. Let's go and help him.","options":["too","so","very","quite"],"answer":0,"explanation":"考查too...to do太...而不能。","source":"original"},{"question":"______ is the girl from? She is the UK.","options":["Where's; from","Where; from","Where; in"],"answer":1,"explanation":"就地点提问疑问词用where，问句中be动词is已给出，所以排除A选项。“来自”可以用be from表示，故选B。","source":"original"},{"question":"The ______ you are, the ______ you can work out the math problems.","options":["more carefully; more easily","more carefully; easier","more careful; easier","more careful; more easily"],"answer":3,"explanation":"考查形容词副词比较级和固定搭配。本题为the+比较级，the+比较级句式，首空修饰人应用形容词more careful；第二个空修饰事用easily的比较级more easily。故答案选D。","source":"original"},{"question":"To keep a good diet, you should eat ______ fruits and vegetables.","options":["more","less","little"],"answer":0,"explanation":"考查形容词的用法。此处想表达的是吃更多的水果和蔬菜，little和less都表示少的，more表示更多的，符合题意，故选A。","source":"original"},{"question":"It was raining ______ when we went out.","options":["easily","heavily","heavy","softly"],"answer":1,"explanation":"考察副词。雨下得很大用heavily。","source":"original"},{"question":"Miss Smith doesn't have ______ housework to do today.","options":["much","many","a lot","a piece"],"answer":0,"explanation":"考查形容词。housework为不可数名词，用much来修饰。故选A。","source":"original"},{"question":"It's eleven o'clock, but he ______.","options":["still works","still working","is still working","still is working"],"answer":2,"explanation":"考查副词的用法。副词still的位置应该放在be动词的后面，另外eleven o'clock是个时间点，所以用进行时。句意：现在是十一点，他仍然在工作。故选C。","source":"original"},{"question":"Timmy is one of ______ in Class Two.","options":["the tallest boy","the tall boy","the tallest boys","the tall boys"],"answer":2,"explanation":"考查形容词最高级，句意：Timmy是二班最高的男孩之一。one of后用名词复数；最高级前要加the。","source":"original"},{"question":"My brother likes that ______ painting very much.","options":["old French interesting","interesting French new","interesting new French"],"answer":2,"explanation":"多个形容词修饰名词的顺序：观点+大小+颜色+国籍+材质。","source":"original"},{"question":"Mike has many good habits. He gets up early in the morning and ______ goes to bed late.","options":["always; never","sometimes; always","never; always","often; sometimes"],"answer":0,"explanation":"考查频率副词的使用。A选项always意为\"总是\"，never，意为\"从不\"。B选项sometimes意为\"有时\"，always，意为\"总是\"。C选项never意为\"从不\"，always意为\"总是\"。D选项often意为\"经常\"，sometimes意为\"有时\"。根据第一句\"迈克有很多好习惯\"，所以选项A最符合题意。意为他总是在早上很早起床并且从来不会很晚上床睡觉。故答案为A选项。","source":"original"},{"question":"Video games are ______ toys in the U.S.A.","options":["the most popular","the more popular","popularest"],"answer":0,"explanation":"考察形容词最高级的用法。","source":"original"},{"question":"That's the ______ dress. We don't have a cheaper one.","options":["biggest","smallest","cheapest","longest"],"answer":2,"explanation":"本题考查形容词词义辨析和最高级。","source":"original"},{"question":"—______ are there in your family? —Three.","options":["How many peoples","How much people","How many people"],"answer":2,"explanation":"people表示\"人\"时是集合名词，表示的是复数概念，不能在词尾加- s。how many后面接可数名词复数，how much后面接不可数名词。故选C。","source":"original"},{"question":"Your book is ______ and I am so ______ in it.","options":["interesting; interesting","interested; interested","interested, interesting","interesting, interested"],"answer":3,"explanation":"考查形容词。Interesting，令人感兴趣的，修饰物；interested，人感兴趣的，修饰人。第一个空想要表达的是\"你的书非常有趣。\"修饰物，所以要用interesting。第二空想要表达的是\"我对它很感兴趣。\"修饰人，所以要用interested。故答案选D。","source":"original"},{"question":"They feel ______ today.","options":["happy","happily","badly"],"answer":0,"explanation":"考查系动词的用法。根据句意,\"感到开心\"feel happy,系动词feel后应接形容词。故选A。","source":"original"},{"question":"Beijing is ______ than Shanghai, but Shanghai is ______ than Beijing.","options":["bigger; moderner","bigger; moderner","bigger; more modern","more big; more more modern"],"answer":2,"explanation":"考察形容词比较级。big的比较级是bigger,modern的比较级是more modern。","source":"original"},{"question":"I hate mangoes. I ______ eat them.","options":["always","never"],"answer":1,"explanation":"根据句意，讨厌芒果，所以从不吃。","source":"original"},{"question":"Ann is a ______ girl and she does homework ______.","options":["careful; carefully","careful; careful","carefully; carefully"],"answer":0,"explanation":"修饰名词girl用形容词careful,修饰动词do用副词carefully。","source":"original"},{"question":"This picture is ______ one of pictures at present.","options":["most popular","more popular","the most popular","popular"],"answer":2,"explanation":"本题考查形容词最高级。","source":"original"},{"question":"Shenzhen is one of the ______ beautiful cities in China.","options":["most","much","more"],"answer":0,"explanation":"A. 考查形容词最高级。深圳市中国最美的城市之一, beautiful的最高级在前面加most。","source":"original"},{"question":"I will buy the red pen, it is ______ than the green one.","options":["cheaper","cheaper","cheapir"],"answer":0,"explanation":"考察形容词比较级的用法。","source":"original"},{"question":"Tony is a great football player. Yes. And Jason can play football ______ him.","options":["as good as","as well as","as bad as","as badly as"],"answer":1,"explanation":"play football是动词短语，用副词well修饰。","source":"original"},{"question":"______ bread did you eat?","options":["How much","How many","How well"],"answer":0,"explanation":"考查特殊疑问词。A, How much, 对不可数名词提问; B, How many 对可数名词复数提问; C, How well 对程度提问。句意为, 你吃了多少面包? bread 是不可数名词。故答案为 A。","source":"original"},{"question":"\"He walks to school every day\". This means \"he ______ walks to school\".","options":["often","usually","always"],"answer":2,"explanation":"每天走路去上学，所以频率很高用always。","source":"original"},{"question":"Where shall we eat tonight? Let's call Mike. He ______ knows the best places to go.","options":["only","nearly","seldom","always"],"answer":3,"explanation":"考查副词辨析。only仅仅；nearly几乎不；seldom很少；always经常，句意：我们今晚上去哪里吃？答：我们给Mike打电话，他总是知道去哪里最好。故选D。","source":"original"},{"question":"The weather is ______ today. (sun)","options":["sun","sunny","suny","sunn"],"answer":1,"explanation":"此处描述天气，且应该填描述天气的形容词，sun相应的形容词为sunny。","source":"original"},{"question":"Among the students, Sally made the ______ mistakes in the exams on February 2nd, 2017.","options":["fewer","fewest","less","least"],"answer":1,"explanation":"考查形容词最高级。在所有同学当中，Sally在2017年2月2号的考试中犯的错最少。首先mistake是个可数名词，先排除C和D，再根据这里的意思是要用最高级，故答案选B。","source":"original"},{"question":"This apple is ______ big to eat.","options":["too much","too many","too","many"],"answer":2,"explanation":"too + adj. to 太...以至于。","source":"original"},{"question":"It's 29 °C. It's ______ (热的).","options":["hot","cold","warm","cool"],"answer":0,"explanation":"hot意为\"热的\"。","source":"original"},{"question":"—Where is the red book? —______.","options":["It's on the floor.","It's so big!","It's a book."],"answer":0,"explanation":"略。","source":"original"},{"question":"I'm ______ than my friend, Jim.","options":["short","shortest","shorter","the shortest"],"answer":2,"explanation":"than前面用比较级,表示\"比......更......\"。short比较级形式为shorter。","source":"original"},{"question":"The Yangtze River is one of ______ in the world.","options":["the longest river","longer river","the longest rivers","longer rivers"],"answer":2,"explanation":"考查形容词最高级。当相互比较的物体是三个或三个以上时，我们就要用形容词或副词的最高级。","source":"original"},{"question":"My sister ______ a blog.","options":["sometimes write","sometimes writes","write sometimes"],"answer":1,"explanation":"频率副词位于实义动词之前，实义动词三单需变形。故选B。","source":"original"},{"question":"Eat your food ______ please. You don't need to hurry!","options":["slow","slowly","quick"],"answer":1,"explanation":"考查副词。句意为：因为你不赶时间，所以请慢点吃东西。slowly为副词，修饰eat这个动词。","source":"original"},{"question":"The more exercise you take, ______ you will be.","options":["healthier","happier","the healthier","the weaker"],"answer":2,"explanation":"本题考查比较级句型。比较级句型结构为：“The+比较级...，the+比较级...”。再结合句意“你锻炼的越多，就会越健康”，所以选C。","source":"original"},{"question":"Pandas are ______.","options":["blue and black","white and yellow","white and black"],"answer":2,"explanation":"考查形容词。A. blue and black, 蓝黑相间; B. white and yellow, 白黄相间; C. white and black, 黑白相间。根据常识可知答案。句意: 熊猫是黑白相间的。故选 C。","source":"original"},{"question":"The film is very ______.","options":["interesting","interested","interest"],"answer":0,"explanation":"事物作主语用interesting修饰。","source":"original"},{"question":"He found a phrase book and read it ______.","options":["slow","to be slow","slowly","being slow"],"answer":2,"explanation":"考查副词。副词slowly用于修饰动词read, 表示一种程度。","source":"original"},{"question":"There must be ______ with the machine. It cannot work.","options":["something wrong","wrong something","anything wrong","wrong anything"],"answer":0,"explanation":"形容词修饰不定代词后置。","source":"original"},{"question":"Today is very ______. I want to go swimming.","options":["rainy","hot","windy"],"answer":1,"explanation":"考查形容词。根据后半句go swimming可知天气应该挺热的, 故应该选B。","source":"original"},{"question":"Mike is ______ than me. He is the ______ in our class.","options":["tall; taller","tallest; taller","taller; tallest"],"answer":2,"explanation":"Mike比我高,他是我们班最高的。第一空用比较级,第二空用最高级,选C。","source":"original"},{"question":"I swim ______ but she swims ______.","options":["badly; well","good; badly","bad; well","well; bad"],"answer":0,"explanation":"考查副词。句意:我游泳游地很差,但她游地很好。动词后接副词,故答案选A。","source":"original"},{"question":"The cake looks ______. Yes, and it tastes even ______.","options":["well; good","good; better","good; worse","better; best"],"answer":1,"explanation":"考查形容词辨析。句意:一这蛋糕看起来很棒。一是的。它尝起来甚至更棒。nice 常指人或物的外观、相貌好;well 常指人的身体好;good 常指人的品行好。good 的比较级为better。故选B。","source":"original"},{"question":"In summer, the sun rises early and sets ______.","options":["quick","early","late","high"],"answer":2,"explanation":"选C。考查副词。句意:夏天,太阳很早就升起来了,很晚才落下。故选C。","source":"original"},{"question":"Tom is ______ than Jack. But I am the ______ of the three.","options":["short; shortest","shorter; shortest","short; the shortest"],"answer":1,"explanation":"此题考查形容词的比较级和最高级。根据句意：Tom比Jack矮，但我是三个中最矮的。两者之间用形容词的比较级，short的比较级是shorter；short的最高级是shortest。故选B。","source":"original"},{"question":"This rice is ______ hot to eat.","options":["too much","too many","too","many more"],"answer":2,"explanation":"too + adj. + to.","source":"original"}]},{"levelName":"常用介词","questions":[{"question":"The cat is ______ the table.","options":["in","on","under","at"],"answer":2,"explanation":"猫在桌子下面，用 under 表示在…下面。","source":"ai"},{"question":"I usually get up ______ 7 o'clock.","options":["in","on","at","for"],"answer":2,"explanation":"具体时间点前用 at。","source":"ai"},{"question":"My birthday is ______ May.","options":["in","on","at","for"],"answer":0,"explanation":"月份前用 in。","source":"ai"},{"question":"We have English class ______ Monday.","options":["in","on","at","for"],"answer":1,"explanation":"星期前用 on。","source":"ai"},{"question":"There is a bridge ______ the river.","options":["in","on","over","at"],"answer":2,"explanation":"桥在河上方（不接触），用 over。","source":"ai"},{"question":"She is sitting ______ her mother and father.","options":["in","between","among","at"],"answer":1,"explanation":"两者之间用 between。","source":"ai"},{"question":"The ball is ______ the box.","options":["in","on","at","for"],"answer":0,"explanation":"球在盒子里面，用 in。","source":"ai"},{"question":"I go to school ______ foot.","options":["in","on","at","by"],"answer":1,"explanation":"on foot 是固定搭配，表示步行。","source":"ai"},{"question":"He is good ______ playing football.","options":["in","on","at","for"],"answer":2,"explanation":"be good at 是固定搭配，表示擅长某事。","source":"ai"},{"question":"The picture is ______ the wall.","options":["in","on","at","under"],"answer":1,"explanation":"画在墙上（表面），用 on。","source":"ai"},{"question":"I will wait ______ you at the school gate.","options":["in","on","at","for"],"answer":3,"explanation":"wait for 是固定搭配，表示等待某人。","source":"ai"},{"question":"We go to the park ______ Sundays.","options":["in","on","at","for"],"answer":1,"explanation":"星期前用 on。","source":"ai"},{"question":"The train goes ______ the tunnel.","options":["over","through","on","at"],"answer":1,"explanation":"火车穿过隧道（内部），用 through。","source":"ai"},{"question":"She is afraid ______ dogs.","options":["in","on","at","of"],"answer":3,"explanation":"be afraid of 是固定搭配，表示害怕。","source":"ai"},{"question":"I live ______ Beijing.","options":["in","on","at","for"],"answer":0,"explanation":"大城市前用 in。","source":"ai"},{"question":"He arrived ______ the airport at 8 o'clock.","options":["in","on","at","for"],"answer":2,"explanation":"小地点（机场、车站）前用 at。","source":"ai"},{"question":"The book is ______ the desk.","options":["in","on","at","under"],"answer":1,"explanation":"书在桌子上（表面），用 on。","source":"ai"},{"question":"She is looking ______ her keys.","options":["in","on","at","for"],"answer":3,"explanation":"look for 是固定搭配，表示寻找。","source":"ai"},{"question":"I was born ______ 2014.","options":["in","on","at","for"],"answer":0,"explanation":"年份前用 in。","source":"ai"},{"question":"There is a park ______ front of my house.","options":["in","on","at","for"],"answer":0,"explanation":"in front of 是固定搭配，表示在…前面。","source":"ai"},{"question":"We have lunch ______ noon.","options":["in","on","at","for"],"answer":2,"explanation":"at noon 是固定搭配。","source":"original"},{"question":"She is interested ______ music.","options":["in","on","at","for"],"answer":0,"explanation":"be interested in 是固定搭配。","source":"original"},{"question":"The bird flew ______ the window.","options":["over","through","on","at"],"answer":1,"explanation":"鸟从窗户飞过（内部穿过），用 through。","source":"original"},{"question":"c案 解析 考查介词辨析。 arrive in +大地点 arrive at +小地点 北京为大地点 所以用in。at +钟点 on+日期 所以答案选择0。 Mrs。White arrived London SIX this morning。 in,at","options":["at at","at; at"],"answer":0,"explanation":"考查介词辨析。句意 星期天上午九点有一节烹饪课。i表示 \"在某世纪/年1度/月1周或上 午/午晚上\" on表示 \"在具体的某-天\" 其后接特定日期 或者特定日期的上午/午/晚 上 ;a表示 \"在某一时刻\" 故选8。 He didn't go to the party not because of because the time but he was i。 because because because, because of because of because of","source":"original"},{"question":"选择0。 Mrs。White arrived London SIX this morning。 in,at A.at at at On in, for 笞案 解析 考查介词搭配 in + 大地点 at + 小地点 时间介词中 at + 具体时间点 故选C。 38 There isa cooking class in; on Sunday morning on;at 9.00.","options":["at at","at; at"],"answer":0,"explanation":"考查介词辨析。句意 星期天上午九点有一节烹饪课。i表示 \"在某世纪/年1度/月1周或上 午/午晚上\" on表示 \"在具体的某-天\" 其后接特定日期 或者特定日期的上午/午/晚 上 ;a表示 \"在某一时刻\" 故选8。 He didn't go to the party not because of because the time but he was i。 because because because, because of because of because of","source":"original"},{"question":"壮壮看到这些玩具在床上，应该说：","options":["Look! They are near the bed.","Look! They are on the bed.","Oh! It's here."],"answer":1,"explanation":"根据情景中的关键词“在床上（on the bed）”可知选B。","source":"original"},{"question":"He likes to play ______ football ______ Sunday.","options":["the; at","/; on","/; at","/; in"],"answer":1,"explanation":"考察冠词和介词。球类运动零冠词；星期前面用介词on。","source":"original"},{"question":"They ______ have a party ______ seven o'clock.","options":["is going to; on","are going to; in","are going to; at"],"answer":2,"explanation":"此题考查一般将来时和时间介词。一般将来时：主语+be going to+动词原形。they主语为复数，谓语用be动词are；具体的时间点用介词at，故选C。","source":"original"},{"question":"He goes to work ______ every day.","options":["by their bikes","by his bike","by the bike","on his bike"],"answer":3,"explanation":"考查介词。by+交通工具表示乘坐某种交通工具，中间不能加冠词或者代词，故ABC均排除，on his bike也表示骑自行车，故答案为D。","source":"original"},{"question":"Excuse ______, could you tell me the way ______ the park?","options":["me; on","me; to","I; to"],"answer":1,"explanation":"考查人称代词和介词。动词后加宾格，所以用me, the way to...到...的路。故答案选B。","source":"original"},{"question":"My home is ______ the post office.","options":["far","near","near from"],"answer":1,"explanation":"考查固定搭配。句意：我家离邮局 ______。表示“离得远”要用far from，far是形容词，后不能直接跟地点名词；near“接近于”，介词，后可直接跟地点名词；near from搭配错误。故选B。","source":"original"},{"question":"I was born ______ 2004.","options":["in","on","at"],"answer":0,"explanation":"考查介词。in接年份，故答案选A。","source":"original"},{"question":"Will you ______ fish ______ me? Yes, I ______.","options":["cooking; to; will","cook; for; do","cook; for; will"],"answer":2,"explanation":"考查一般疑问句。根据will后用动词原形，排除A选项；根据一般疑问句Will you do...？其回答为Yes, I will. /No, I won't. 故排除B选项。故答案选C。","source":"original"},{"question":"What do you have ______ Thursdays?","options":["at","on","in"],"answer":1,"explanation":"考查介词。空格后是Thursdays周四，具体的天用介词on（即使这里是复数），具体的时间点用at，月份年份用in，所以选B。","source":"original"},{"question":"We don't go to school ______ Friday.","options":["at","in","on","by"],"answer":2,"explanation":"星期几用on。","source":"original"},{"question":"—______ do you go to Beijing from New York? —______ plane.","options":["Where; By","How; On","How; By"],"answer":2,"explanation":"问方式用how，by plane乘飞机。","source":"original"},{"question":"You should ______ your books ______ order.","options":["putting; in","put; in","puts; on"],"answer":1,"explanation":"考查动词形式和固定搭配。\"should\"后接动词原形，故第一空答案为put，且根据句意\"把......放整齐\"put sth. in order，故选B。","source":"original"},{"question":"Look, the cinema is ______ the restaurant.","options":["next","next to","to"],"answer":1,"explanation":"考查介词。next to...在...旁边。故答案为B。","source":"original"},{"question":"Photos are ______ the wall.","options":["on","in","under","at"],"answer":0,"explanation":"考查介词辨析。根据句意，表示“挂在、贴在”墙上的时候，用介词on，故选A。","source":"original"},{"question":"Please turn right ______ the crossing.","options":["at","in","on"],"answer":0,"explanation":"at the crossing 在十字路口。","source":"original"},{"question":"—Where ______ my sunglasses? —They're ______ the floor.","options":["are; in","is; on","are; on"],"answer":2,"explanation":"考查介词。sunglasses为复数，谓语动词使用are；on the floor.在地板上。故答案为C。","source":"original"},{"question":"They arrived ______ the shop at 8 am.","options":["to","along","beside","at"],"answer":3,"explanation":"考查地点介词,at+小地点,arrive at到达,故选D。","source":"original"},{"question":"It's warm ______ September.","options":["in","on","at","for"],"answer":0,"explanation":"考查介词。月份前面加上in。","source":"original"},{"question":"You should walk ______ the street.","options":["along","for","with","at"],"answer":0,"explanation":"along沿着。","source":"original"},{"question":"The cat is ______ the door.","options":["behind","next","in"],"answer":0,"explanation":"你的猫在门后,用behind。","source":"original"},{"question":"He is ______ the bathroom.","options":["in","under","on"],"answer":0,"explanation":"in the bathroom意为\"在浴室\"。in表示的是在某个空间的里面,符合句意。故选A。","source":"original"},{"question":"Helen is in front of me. I am ______ her.","options":["behind","in front of","beside","next"],"answer":0,"explanation":"考查介词。根据句意,Helen在我的前面,因此我在他的后面,behind表示在......的后面,in front of表示在......的前面,beside表示在......旁边。","source":"original"},{"question":"Steve Jobs died ______ 2011.","options":["on","in","at"],"answer":1,"explanation":"考查介词。年份前用介词in。故答案选B。","source":"original"},{"question":"Mike usually gets up ______ 8 o'clock ______ Saturday.","options":["at, on","on, on","in, at","at, in"],"answer":0,"explanation":"考查时间介词。句意:麦克周六经常八点起床。具体某一时间点用介词at;在星期几用介词on。选择A。","source":"original"},{"question":"I get up ______ 10 o'clock every morning.","options":["in","on","at"],"answer":2,"explanation":"考查时间介词。10点钟为特定的某个时刻，故使用介词at。故选C。","source":"original"},{"question":"______ you tell me the way ______ the lake?","options":["Could, on","Could, to","Are, to"],"answer":1,"explanation":"考查固定句型。你能告诉我去......的路吗？Could you tell me the way to...？，故答案选B。","source":"original"},{"question":"We can meet ______ the park gate ______ 3:00 p.m.","options":["at, on","on, at","at, at"],"answer":2,"explanation":"at the gate是固定搭配，3:00p.m.为具体时间点，at后加具体时间点，所以选择C。","source":"original"},{"question":"The birds are flying ______ the rivers and mountains.","options":["over","to","on"],"answer":0,"explanation":"考查介词。over在正上方，on在上面，与物体接触。所以选over。选A。","source":"original"},{"question":"—Do you usually go to school ______ foot, Jane? —Yes, but I'd like to go ______ car.","options":["on; /","on; a","by; /","by; a"],"answer":0,"explanation":"on foot步行；by car乘汽车。","source":"original"},{"question":"I usually get up ______ 9:00 am.","options":["at","in","on","with"],"answer":0,"explanation":"考查介词的用法。在具体的时刻前要用时间介词at,故答案选A。","source":"original"},{"question":"Ann's birthday is ______ January 11th.","options":["in","on","at"],"answer":1,"explanation":"考查介词。几月几号用介词on。故答案选B。","source":"original"},{"question":"Lucy arrives in Shijiazhuang ______ 11:00 ______ the morning ______ February 2.","options":["in; on; at","at; at; on","at; in; on"],"answer":2,"explanation":"考查时间介词。时刻前使用介词at; 一天中的早中晚前使用介词in; 具体年月日前使用介词on。故答案为C。","source":"original"},{"question":"The young men walked ______ the forest and came to a big river at last.","options":["on","over","through","across"],"answer":2,"explanation":"考查介词辨析。\"穿过树林\"是从空间内部穿过, 需用介词through, 故选C。","source":"original"},{"question":"It's cold in Guangzhou ______ January.","options":["in","for","of"],"answer":0,"explanation":"考查介词。介词in与月份搭配。选A。","source":"original"},{"question":"He arrived ______ Beijing ______ 10:30 ______ May 12.","options":["at; in; at","to; on; at","in; on; at","in; at; on"],"answer":3,"explanation":"考查介词辨析。arrive in + 大地点，arrive at + 小地点，北京为大地点，所以用 in。at + 钟点，on + 日期，所以答案选择 D。","source":"original"},{"question":"Mrs. White arrived ______ London ______ six this morning.","options":["at, at","at, on","in, at","in, for"],"answer":2,"explanation":"考查介词搭配，in + 大地点，at + 小地点；时间介词中，at + 具体时间点，故选 C。","source":"original"},{"question":"There is a cooking class ______ Sunday morning ______ 9:00.","options":["in; on","on; at","at; at"],"answer":1,"explanation":"考查介词辨析。句意：星期天上午九点有一节烹饪课。in 表示“在某世纪/年/季度/月/周或上午/下午/晚上”；on 表示“在具体的某一天”，其后接特定日期，或者特定日期的上午/下午/晚上；at 表示“在某一时刻”。故选 B。","source":"original"},{"question":"He didn't go to the party not ______ the time but ______ he was ill.","options":["because of, because","because, because","because, because of","because of, because of"],"answer":0,"explanation":"考查原因介词和原因状语从句。句意：他没有参加派对，不是因为时间，而是因为他生病了。前一空使用介词，后一空是原因状语从句。选择 A。","source":"original"},{"question":"A cat is running after a mouse. The cat is ______ the mouse.","options":["in front of","behind","in"],"answer":1,"explanation":"考查方位介词。在后面用behind。","source":"original"},{"question":"A lot of people ______ different cities come to visit Shenzhen every year.","options":["on","at","from"],"answer":2,"explanation":"选C。考查介词。根据题意是每年有很多来自不同城市的人们来深圳，故选C。","source":"original"},{"question":"We'll have a meeting at Hilton Hotel ______ May, 2015.","options":["on","in","at","from"],"answer":1,"explanation":"考查介词。月份前用介词in。故选B。","source":"original"},{"question":"—Excuse me. ______ can I get to the restaurant? —You can turn left ______ the bookstore.","options":["Where; at","How; on","How; at"],"answer":2,"explanation":"问路用how，在书店处用at。","source":"original"},{"question":"______ the morning of June 27, they visited the Great Wall.","options":["In","At","From","On"],"answer":3,"explanation":"考查介词。在具体某天早、中、晚要用on，故答案为D。","source":"original"},{"question":"Sun is a tall girl ______ glasses. Do you know ______?","options":["with, her","in, she","by, herself","at, she"],"answer":0,"explanation":"考查介词和人称代词。with表示带有，接具体有形的东西。know为动词，动词后要用宾格her，故答案选A。","source":"original"},{"question":"They live ______ the ______ floor.","options":["in; ninth","in; nine","on; ninth","on; nineth"],"answer":2,"explanation":"考查介词和数词辨析。在第几层楼用介词on，因为是表达第几的意思，用序数词，the ninth floor = Floor Nine.故选C。","source":"original"},{"question":"Sue ______ born ______ 2012.","options":["is, in","was, in","were, on","was, on"],"answer":1,"explanation":"考查时态以及介词in。短语：be born，这里2012年表过去，所以应用系动词was，时间介词in + 年份。故选B。","source":"original"},{"question":"When were you born? I was born ______ May 1st, 1990.","options":["in","at","on","for"],"answer":2,"explanation":"考查介词。在具体的某一天用介词on。","source":"original"},{"question":"He usually goes to school ______ bus, but he went to school ______ his father's car today.","options":["by; in","by; by","on; by","in; by"],"answer":0,"explanation":"考查介词。by后直接加交通工具，若交通工具前有修饰词，要用on或in，故答案为A。","source":"original"},{"question":"______ Monday we go to school ______ seven o'clock.","options":["In; at","At; in","On; at","On; for"],"answer":2,"explanation":"考查介词。在星期几用介词on，具体在几点钟用介词at。故答案选C。","source":"original"}]},{"levelName":"情态动词","questions":[{"question":"You ______ finish your homework first.","options":["can","may","must","need"],"answer":2,"explanation":"must 表示必须，语气最强，表达必要的要求。","source":"ai"},{"question":"______ I borrow your pen, please?","options":["Can","Must","Need","Should"],"answer":0,"explanation":"Can I...? 是礼貌请求允许的常用表达。","source":"ai"},{"question":"She ______ speak English very well.","options":["can","must","should","need"],"answer":0,"explanation":"can 表示能力，她会说英语。","source":"ai"},{"question":"You ______ eat too much candy. It's bad for your teeth.","options":["can","should","shouldn't","must"],"answer":2,"explanation":"shouldn't 表示不应该，提出建议。","source":"ai"},{"question":"______ I come in?","options":["May","Must","Need","Should"],"answer":0,"explanation":"May I...? 是更正式的请求允许的表达。","source":"ai"},{"question":"You ______ be quiet in the library.","options":["can","may","must","need"],"answer":2,"explanation":"must 表示必须遵守的规则。","source":"ai"},{"question":"I ______ ride a bike when I was five.","options":["can","could","must","should"],"answer":1,"explanation":"过去的能力用 could（can 的过去式）。","source":"ai"},{"question":"You ______ drink more water. It's good for you.","options":["can","may","should","must"],"answer":2,"explanation":"should 表示建议，应该做某事。","source":"ai"},{"question":"______ you help me carry this box?","options":["Can","Must","Need","Should"],"answer":0,"explanation":"Can you...? 请求帮助的常用表达。","source":"ai"},{"question":"Students ______ wear school uniforms at school.","options":["can","may","must","should"],"answer":2,"explanation":"must 表示校规的要求，必须穿校服。","source":"ai"},{"question":"You ______ not play with fire. It's dangerous.","options":["can","may","must","should"],"answer":2,"explanation":"must not 表示禁止，千万不要玩火。","source":"ai"},{"question":"She ______ be at home. The light is on.","options":["can","must","should","need"],"answer":1,"explanation":"must 表示肯定的推测，灯亮着说明她一定在家。","source":"ai"},{"question":"I ______ not go to the party because I'm sick.","options":["can","may","must","should"],"answer":0,"explanation":"cannot 表示不能/无法去，因为生病了。","source":"ai"},{"question":"You ______ look both ways before crossing the road.","options":["can","may","should","need"],"answer":2,"explanation":"should 表示安全建议，过马路前应该看两边。","source":"ai"},{"question":"______ I have some water, please?","options":["Can","Must","Need","Should"],"answer":0,"explanation":"Can I have...? 礼貌请求的常用表达。","source":"ai"},{"question":"We ______ protect the environment.","options":["can","may","should","need"],"answer":2,"explanation":"should 表示责任和义务，我们应该保护环境。","source":"ai"},{"question":"He ______ play the piano when he was six.","options":["can","could","must","may"],"answer":1,"explanation":"过去的能力用 could。","source":"ai"},{"question":"You ______ not talk loudly in the hospital.","options":["can","may","must","should"],"answer":2,"explanation":"must not 表示医院的规定，禁止大声喧哗。","source":"ai"},{"question":"______ I open the window? It's hot here.","options":["Must","Need","Should","May"],"answer":3,"explanation":"May I...? 礼貌请求允许的表达。","source":"ai"},{"question":"You ______ be tired after the long walk.","options":["can","must","should","need"],"answer":1,"explanation":"must 表示肯定的推测，走了这么久一定累了。","source":"ai"},{"question":"You ______ not smoke here. It's not allowed.","options":["can","may","must","should"],"answer":2,"explanation":"must not 表示禁止。","source":"original"},{"question":"______ I use your phone? Mine is broken.","options":["Must","Need","Should","Could"],"answer":3,"explanation":"Could I...? 比 Can I...? 更委婉的请求。","source":"original"},{"question":"We ______ help our parents with housework.","options":["can","may","should","need"],"answer":2,"explanation":"should 表示应该，表达责任和义务。","source":"original"}]}];

function $(id){return document.getElementById(id)}
function lsGet(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch(e){return d}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v))}
function uk(s){return curUser?curUser+'_'+s:s}
function hashPwd(p){var h=btoa(p),a=h.split('');for(var i=0;i<a.length;i+=2){var c=a[i].charCodeAt(0);a[i]=String.fromCharCode(((c^42)%94)+33)}return a.join('')}
function toast(m){var d=document.createElement('div');d.className='toast';d.textContent=m;$('toastContainer').appendChild(d);setTimeout(function(){d.remove()},2800)}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(a){var arr=[].concat(a);for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}
function playSound(t){try{if(t){var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.4);o.frequency.setValueAtTime(523,ctx.currentTime);o.frequency.setValueAtTime(659,ctx.currentTime+0.15);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.4)}else{if('speechSynthesis' in window){var u=new SpeechSynthesisUtterance('再试试');u.lang='zh-CN';u.rate=0.9;speechSynthesis.speak(u)}}}catch(e){}}
function spawnStar(){var s=document.createElement('div');s.className='star-burst';s.textContent='⭐';s.style.left=(40+Math.random()*30)+'%';s.style.top=(30+Math.random()*20)+'%';document.body.appendChild(s);setTimeout(function(){s.remove()},800)}

function initQB(){var qb=lsGet('questionBank',null);if(!qb||!Array.isArray(qb)||qb.length===0||!qb[0].levelName)lsSet('questionBank',DEFAULT_QUESTION_BANK)}
function getQB(){return lsGet('questionBank',DEFAULT_QUESTION_BANK)}
function getLevelNames(){return getQB().map(function(l){return l.levelName})}
function getLevelByName(name){return getQB().find(function(l){return l.levelName===name})}
function getLevelQuestions(name){var l=getLevelByName(name);return l?l.questions:[]}

function getUsers(){return lsGet('users',[])}
function saveUsers(u){lsSet('users',u)}
function initAdmin(){var u=getUsers();if(!u.find(function(x){return x.username==='admin'})){u.push({username:'admin',passwordHash:hashPwd('admin123'),isAdmin:true});saveUsers(u)}}
function isAdmin(){var u=getUsers().find(function(x){return x.username===curUser});return u&&u.isAdmin}
function doRegister(){var n=$('regUser').value.trim(),p=$('regPass').value,p2=$('regPass2').value,e=$('regError');if(n.length<2){e.textContent='用户名至少2个字符';return}if(!/^[\w\u4e00-\u9fa5]+$/.test(n)){e.textContent='用户名只能包含中英文/数字/下划线';return}if(p.length<4){e.textContent='密码至少4位';return}if(!/^[a-zA-Z0-9]+$/.test(p)){e.textContent='密码只能包含数字或字母';return}if(p!==p2){e.textContent='两次密码不一致';return}var u=getUsers();if(u.find(function(x){return x.username===n})){e.textContent='用户名已存在';return}u.push({username:n,passwordHash:hashPwd(p),isAdmin:false});saveUsers(u);toast('注册成功！请登录');showScreen('loginScreen')}
function doLogin(){var n=$('loginUser').value.trim(),p=$('loginPass').value,e=$('loginError');if(!n||!p){e.textContent='请输入用户名和密码';return}var u=getUsers(),user=u.find(function(x){return x.username===n});if(!user){e.textContent='用户不存在';return}if(user.passwordHash!==hashPwd(p)){e.textContent='密码错误';return}curUser=user.username;if($('rememberMe').checked){lsSet(uk('loginState'),true)}else{lsSet(uk('loginState'),false)}toast('欢迎回来，'+curUser+'！');showScreen('mainScreen');initMain()}
function doLogout(){if(curUser){lsSet(uk('loginState'),false)}curUser=null;curGrammar=null;examMode=false;showScreen('welcomeScreen')}

function getStars(){return lsGet(uk('stars'),0)}
function addStars(n){var s=getStars()+n;lsSet(uk('stars'),s);return s}
function getPts(){return lsGet(uk('pts'),0)}
function addPts(n){var p=getPts()+n;lsSet(uk('pts'),p);return p}
function getDailyStars(){var t=new Date().toISOString().slice(0,10),ds=lsGet(uk('ds'),{});return{today:ds[t]||0,data:ds}}
function addDailyStar(){var t=new Date().toISOString().slice(0,10),ds=lsGet(uk('ds'),{});ds[t]=(ds[t]||0)+1;lsSet(uk('ds'),ds)}

function renderQuiz(q,isW){
var area=isW?$('wrongQuizArea'):$('quizArea');
var total=isW?wQueue.length:getLevelQuestions(curGrammar).length;
var idx=isW?wIdx+1:(getProg(curGrammar).answered+1);
var tag=q.source==='ai'?'<span class="quiz-tag ai">AI生成</span>':'<span class="quiz-tag original">原题</span>';
var h='<div class="quiz-progress">'+(isW?'📝 错题训练 '+idx+'/'+total+' | 已掌握 '+wMastered+' 道':'📊 '+curGrammar+' | 第 '+idx+' 题 '+tag)+'</div>';
h+='<div class="quiz-question">'+q.question+'</div>';
h+='<div class="quiz-options" id="quizOpts">';
var labels=['A','B','C','D'];
for(var i=0;i<q.options.length;i++){h+='<button class="quiz-option" onclick="doAnswer('+i+','+isW+')"><strong>'+labels[i]+'.</strong> '+q.options[i]+'</button>'}
h+='</div>';
h+='<div id="nextBtnArea" style="display:none;margin-top:10px"><button class="btn btn-next" onclick="goNext('+isW+')">▶ 下一题</button></div>';
h+='<div id="explanationArea" style="display:none"></div>';
area.innerHTML=h;quizLocked=false}

function doAnswer(si,isW){
if(quizLocked)return;quizLocked=true;
var q=isW?wQueue[wIdx]:curQuestion;
var ci=q.answer,isC=(si===ci);
var opts=document.querySelectorAll('#quizOpts .quiz-option');
for(var i=0;i<opts.length;i++){opts[i].style.pointerEvents='none';if(i===ci)opts[i].classList.add('correct');if(i===si&&!isC)opts[i].classList.add('wrong');if(i===ci&&!isC)setTimeout(function(o){o.classList.add('flash-correct')},200,opts[i])}
if(isC){playSound(true);if(!isW)settle(true);$('nextBtnArea').style.display='block';$('explanationArea').style.display='none';$('nextBtnArea').innerHTML='<div style="font-size:1.2rem;color:#00b894;margin-bottom:8px">✨ 太棒了！✅</div><button class="btn btn-next" onclick="goNext('+isW+')">▶ 下一题</button>'}
else{playSound(false);if(!isW){addWB(q);settle(false)}$('nextBtnArea').style.display='block';var expDiv=$('explanationArea');expDiv.style.display='block';expDiv.innerHTML='<div class="explanation-box"><strong>📖 解析：</strong>'+q.explanation+'</div>';$('nextBtnArea').innerHTML='<button class="btn btn-next" onclick="goNext('+isW+')">▶ 下一题</button>'}
if(isW){var wb=getWB(),w=wb.find(function(x){return x.key===q.key});if(isC){if(w){w.consecutiveCorrect++;if(w.consecutiveCorrect>=2){w.mastered=true;wMastered++;addPts(2);toast('✅ 错题已掌握！+2积分')}}wCorrect++}else{if(w){w.wrongCount++;w.consecutiveCorrect=0;w.lastWrong=Date.now()}}saveWB(wb)}else{var p=getProg(curGrammar);p.answered++;saveProg(curGrammar,p)}updateTopBar()}

function goNext(isW){if(isW){wIdx++;if(wIdx>=wQueue.length){finishWT();return}curQuestion=wQueue[wIdx];renderQuiz(curQuestion,true);updateWTProg()}else{nextQ()}}

function nextQ(){
if(!curGrammar)return;
var qs=getLevelQuestions(curGrammar);
if(qs.length===0){$('quizArea').innerHTML='<h2>该关卡暂无题目</h2>';return}
var uk2=uk('used_'+curGrammar),used=lsGet(uk2,[]);
var avail=[];for(var i=0;i<qs.length;i++){if(used.indexOf(i)===-1)avail.push(i)}
if(avail.length===0){lsSet(uk2,[]);curQuestion=qs[ri(0,qs.length-1)]}
else{var idx=avail[ri(0,avail.length-1)];curQuestion=qs[idx];used.push(idx)}
if(used.length>qs.length*2)lsSet(uk2,[]);else lsSet(uk2,used);
renderQuiz(curQuestion,false);updateTopBar()}

function getProg(g){return lsGet(uk('prog_'+g),{answered:0})}
function saveProg(g,p){lsSet(uk('prog_'+g),p)}

function settle(correct){groupTotal++;if(correct)groupCorrect++;if(groupTotal>=5){var stars=0,pts=0;if(groupCorrect===5){stars=1;pts=10;consecutiveFull++;if(consecutiveFull>=3){pts+=20;toast('🔥 连续3组全对！额外+20积分！');consecutiveFull=0}spawnStar();addDailyStar()}else if(groupCorrect===4){pts=5;consecutiveFull=0}else if(groupCorrect===3){pts=2;consecutiveFull=0}else{consecutiveFull=0}if(stars>0)addStars(stars);if(pts>0){addPts(pts);toast('🎉 获得 '+pts+' 积分！'+(stars>0?' +1⭐':''))}groupCorrect=0;groupTotal=0}}

function getWB(){return lsGet(uk('wb'),[])}
function saveWB(w){lsSet(uk('wb'),w)}
function addWB(q){var wb=getWB(),k=curGrammar+'|||'+q.question;var ex=wb.find(function(w){return w.key===k});if(ex){ex.wrongCount++;ex.lastWrong=Date.now();ex.consecutiveCorrect=0}else{wb.push({key:k,grammar:curGrammar,question:q.question,options:q.options,answer:q.answer,source:q.source||'original',wrongCount:1,consecutiveCorrect:0,mastered:false,lastWrong:Date.now()})}saveWB(wb)}
function getWrongCount(){return getWB().filter(function(w){return !w.mastered}).length}
function getWrongByG(g){return getWB().filter(function(w){return w.grammar===g&&!w.mastered})}

function startWT(fg){wMode=true;var wb=getWB().filter(function(w){return !w.mastered});if(fg)wb=wb.filter(function(w){return w.grammar===fg});if(wb.length===0){toast('没有待训练的错题！');wMode=false;return}wb.sort(function(a,b){if(b.wrongCount!==a.wrongCount)return b.wrongCount-a.wrongCount;return b.lastWrong-a.lastWrong});wQueue=wb.slice(0,20);wIdx=0;wCorrect=0;wMastered=0;showScreen('wrongTrainingScreen');curQuestion=wQueue[0];renderQuiz(curQuestion,true);updateWTProg()}
function updateWTProg(){$('wrongTrainingProgress').textContent='第 '+(wIdx+1)+'/'+wQueue.length+' 题'}
function finishWT(){wMode=false;var rate=wQueue.length>0?Math.round(wCorrect/wQueue.length*100):0;var o=document.createElement('div');o.className='level-up-overlay';o.innerHTML='<div class="level-up-box"><h2>📝 训练结束</h2><p>正确率：'+rate+'%</p><p>新掌握：'+wMastered+' 道错题</p><button class="btn btn-success" onclick="this.parentElement.parentElement.remove();showScreen(\'mainScreen\');initMain()">返回</button></div>';document.body.appendChild(o)}
function exitWT(){wMode=false;showScreen('mainScreen');initMain();if(curGrammar)nextQ()}

function startExam(){var bank=getQB(),allQs=[];for(var i=0;i<bank.length;i++){allQs=allQs.concat(bank[i].questions)}if(allQs.length===0){toast('题库为空，无法考试！');return}examSettings=lsGet('examSettings',DEFAULT_EXAM_SETTINGS);var total=examSettings.totalQuestions||100;if(total>allQs.length)total=allQs.length;examQueue=shuffle(allQs).slice(0,total);examIdx=0;examCorrect=0;examMode=true;showScreen('examScreen');renderExamQuestion();if(examSettings.showTimer){examSeconds=0;$('examTimer').style.display='block';examTimer=setInterval(function(){examSeconds++;var m=Math.floor(examSeconds/60),s=examSeconds%60;$('examTimer').textContent='⏱ '+(m<10?'0':'')+m+':'+(s<10?'0':'')+s},1000)}}
function renderExamQuestion(){if(examIdx>=examQueue.length){submitExam();return}var q=examQueue[examIdx];$('examProgress').textContent='第 '+(examIdx+1)+'/'+examQueue.length+' 题';var h='<div class="quiz-question">'+q.question+'</div>';h+='<div class="quiz-options" id="examOpts">';var labels=['A','B','C','D'];for(var i=0;i<q.options.length;i++){h+='<button class="quiz-option" onclick="doExamAnswer('+i+')"><strong>'+labels[i]+'.</strong> '+q.options[i]+'</button>'}h+='</div>';$('examQuizArea').innerHTML=h}
function doExamAnswer(si){if(!examMode)return;var q=examQueue[examIdx];if(si===q.answer)examCorrect++;examIdx++;renderExamQuestion()}
function submitExam(){examMode=false;if(examTimer){clearInterval(examTimer);examTimer=null}var total=examQueue.length,rate=total>0?Math.round(examCorrect/total*100):0;var settings=examSettings||DEFAULT_EXAM_SETTINGS;var reward=null;for(var i=0;i<settings.scoreRewards.length;i++){var r=settings.scoreRewards[i];if(rate>=r.min&&rate<=r.max){reward=r;break}}var stars=reward?reward.stars:0,pts=reward?reward.points:0;if(stars>0)addStars(stars);if(pts>0)addPts(pts);if(stars>0)addDailyStar();saveExamRecord(total,examCorrect,rate,examSeconds);var o=document.createElement('div');o.className='level-up-overlay';var msg='';if(rate>=90)msg='🏆 太厉害了！';else if(rate>=80)msg='👍 表现不错！';else if(rate>=60)msg='📚 继续加油！';else msg='💪 别灰心，多练习！';o.innerHTML='<div class="level-up-box"><h2>'+msg+'</h2><p>总分：'+examCorrect+'/'+total+' 分</p><p>正确率：'+rate+'%</p>'+(stars>0?'<p>🌟 获得 '+stars+'⭐ + '+pts+' 积分</p>':'<p>未达到奖励标准，继续努力！</p>')+'<button class="btn btn-success" onclick="this.parentElement.parentElement.remove();showScreen(\'mainScreen\');initMain()">返回</button></div>';document.body.appendChild(o)}
function confirmExitExam(){if(confirm('确定退出考试吗？退出后成绩将作废。')){examMode=false;if(examTimer){clearInterval(examTimer);examTimer=null}showScreen('mainScreen');initMain()}}
function saveExamRecord(total,correct,rate,seconds){var records=lsGet(uk('examRecords'),[]);records.unshift({date:new Date().toISOString(),total:total,correct:correct,rate:rate,seconds:seconds||0});if(records.length>10)records=records.slice(0,10);lsSet(uk('examRecords'),records)}

function getShop(){return lsGet('shopItems',DEFAULT_SHOP)}

function getInv(){return lsGet(uk('inv'),[])}

function checkInvExpiry(){var inv=getInv(),now=Date.now(),ch=false;for(var i=0;i<inv.length;i++){var e=inv[i];if(e.expiresAt>0&&now>e.expiresAt&&e.active!==false){e.active=false;e.using=false;ch=true}}if(ch)saveInv(inv)}
function buyItem(id){var items=getShop(),item=items.find(function(i){return i.id===id});if(!item||!item.active)return;if(getPts()<item.cost){toast('积分不足！');return}var inv=getInv();if(inv.find(function(i){return i.itemId===id&&i.active!==false})){toast('已拥有该商品！');return}addPts(-item.cost);inv.push({itemId:id,acquiredAt:Date.now(),expiresAt:item.type==='limited'&&item.days>0?Date.now()+item.days*86400000:0,using:false,active:true});saveInv(inv);toast('兑换成功：'+item.name+'！');renderShop()}

function showScreen(id){var screens=document.querySelectorAll('.screen');for(var i=0;i<screens.length;i++){screens[i].classList.remove('active')}var sc=$(id);if(sc)sc.classList.add('active')}

function openModal(t,c,w){var ex=document.querySelector('.modal-overlay');if(ex)ex.remove();var o=document.createElement('div');o.className='modal-overlay';o.onclick=function(e){if(e.target===o)o.remove()};var bs=w?'style="max-width:'+w+'px"':'';o.innerHTML='<div class="modal-box" '+bs+'><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h3 style="margin:0">'+t+'</h3><button class="btn btn-sm btn-gray" onclick="this.closest(\'.modal-overlay\').remove()">✕</button></div>'+c+'</div>';document.body.appendChild(o)}

function renderShop(){checkInvExpiry();var items=getShop(),inv=getInv(),pts=getPts();var h='<p style="text-align:center;margin-bottom:10px">💰当前积分：<strong style="color:#fdcb6e">'+pts+'</strong></p><div class="shop-grid">';for(var i=0;i<items.length;i++){var item=items[i];if(!item.active)continue;var owned=inv.find(function(x){return x.itemId===item.id&&x.active!==false}),status='';if(owned){if(owned.using){status='<div class="owned">🟢 使用中</div>'}else{status='<div class="owned">✅ 已拥有</div>'}}h+='<div class="shop-card"><div class="icon">'+item.icon+'</div><div class="name">'+item.name+'</div><div class="cost">💰 '+item.cost+' 积分</div><div style="font-size:.75rem;opacity:.7;margin-bottom:8px">'+item.desc+'</div><div style="font-size:.75rem;opacity:.6;margin-bottom:6px">'+(item.type==='permanent'?'永久':item.days+'天')+'</div>';if(status){h+=status;if(owned&&!owned.using)h+='<button class="btn btn-sm btn-success" style="margin-top:5px" onclick="useItem('+item.id+')">使用</button>'}else h+='<button class="btn btn-sm '+(pts>=item.cost?'btn-primary':'btn-gray')+'" '+(pts>=item.cost?'onclick="buyItem('+item.id+')"':'disabled')+'>'+(pts>=item.cost?'兑换':'积分不足')+'</button>';h+='</div>'}h+='</div>';h+='<h3 style="margin-top:25px">🎒 我的背包</h3><div class="inventory-grid">';var hasInv=false;for(var i=0;i<inv.length;i++){var e=inv[i],item=items.find(function(x){return x.id===e.itemId});if(!item)continue;var now=Date.now(),exp=e.expiresAt>0&&now>e.expiresAt,using=e.using&&!exp,act=e.active!==false&&!exp;if(!act&&!exp)continue;hasInv=true;h+='<div class="inventory-card"><div style="font-size:2rem">'+item.icon+'</div><div style="font-weight:bold">'+item.name+'</div>';if(exp)h+='<div class="status" style="color:#636e72">⏰ 已过期</div>';else if(using)h+='<div class="status" style="color:#00b894">🟢 使用中</div>';else if(act){h+='<div class="status" style="color:#fdcb6e">✅ 可用</div><button class="btn btn-sm btn-success" style="margin-top:5px" onclick="useItem('+e.itemId+');renderShop()">使用</button>'}h+='</div>'}if(!hasInv)h+='<p style="grid-column:1/-1;text-align:center;opacity:.5">背包空空如也~</p>';h+='</div>';openModal('🎁 积分商城',h,650)}

function openWTSetup(){var wb=getWB().filter(function(w){return !w.mastered});if(wb.length===0){toast('没有待训练的错题！');return}var h='<div class="wrong-training-setup"><p>共 <strong>'+wb.length+'</strong> 道错题</p><p>掌握1道 <strong style="color:#fdcb6e">+2积分</strong></p>';h+='<button class="btn btn-danger" onclick="closeModalWT(\'all\')" style="margin:5px">训练全部</button><br>';var gs=[];var seen={};for(var i=0;i<wb.length;i++){if(!seen[wb[i].grammar]){seen[wb[i].grammar]=true;gs.push(wb[i].grammar)}}for(var i=0;i<gs.length;i++){var g=gs[i],c=wb.filter(function(w){return w.grammar===g}).length;h+='<button class="btn btn-sm btn-warning" onclick="closeModalWT(\''+g.replace(/'/g,"\\'")+'\')">'+g+' ('+c+')</button> '}h+='</div>';var ago=Date.now()-7*86400000,old=wb.filter(function(w){return w.lastWrong<ago});if(old.length>0)h+='<p style="color:#fdcb6e;text-align:center;margin-top:10px">⚠️ '+old.length+' 道超过7天未复习</p>';if(wb.length>20)h+='<p style="color:#ffa502;text-align:center">⚠️ 你有 '+wb.length+' 道未掌握错题，赶紧复习吧！</p>';openModal('📝 错题训练',h,500)}

function saveEditItem(id){var items=getShop(),item=items.find(function(i){return i.id===id});if(!item)return;item.icon=$('aIcon')?$('aIcon').value:'🎁';item.name=$('aName')?$('aName').value:'商品';item.cost=parseInt($('aCost')?$('aCost').value:50);item.type=$('aType')?$('aType').value:'permanent';item.days=parseInt($('aDays')?$('aDays').value:0);item.desc=$('aDesc')?$('aDesc').value:'';item.active=$('aActive')?$('aActive').value==='1':true;saveShop(items);var modals=document.querySelectorAll('.modal-overlay');for(var i=0;i<modals.length;i++)modals[i].remove();openAdmin();toast('商品已更新')}
function delItem(id){if(!confirm('确定删除该商品？'))return;var items=getShop();saveShop(items.filter(function(i){return i.id!==id}));renderAShop();toast('商品已删除')}

function renderAQBank(){var bank=getQB(),total=0;for(var i=0;i<bank.length;i++)total+=bank[i].questions.length;var h='<p>📊 总题数：<strong>'+total+'</strong> | 关卡数：<strong>'+bank.length+'</strong></p>';h+='<table class="admin-table"><thead><tr><th>关卡</th><th>题数</th><th>AI题</th><th>原题</th><th>操作</th></tr></thead><tbody>';for(var i=0;i<bank.length;i++){var l=bank[i],ai=l.questions.filter(function(q){return q.source==='ai'}).length,og=l.questions.length-ai;h+='<tr><td>'+l.levelName+'</td><td>'+l.questions.length+'</td><td>'+ai+'</td><td>'+og+'</td><td><button class="btn btn-sm btn-primary" onclick="viewLevelDetail('+i+')">查看</button> <button class="btn btn-sm btn-danger" onclick="delLevel('+i+')">删除</button></td></tr>'}h+='</tbody></table>';h+='<h4 style="margin-top:15px">📥 导入题库</h4><p style="font-size:.8rem;opacity:.7">粘贴JSON数组，每个元素包含 levelName 和 questions 字段，新题目会追加到对应关卡</p>';h+='<textarea id="impTxt" placeholder=\'[{"levelName":"一般现在时","questions":[{"question":"...","options":["A","B","C","D"],"answer":0,"explanation":"...","source":"original"}]}]\'></textarea>';h+='<button class="btn btn-primary" onclick="preImport()" style="margin-top:8px">预览导入</button><div id="impPre"></div>';h+='<h4 style="margin-top:15px">📤 导出题库</h4><button class="btn btn-success" onclick="exportQB()">导出全部题库 JSON</button> ';h+='<button class="btn btn-danger" onclick="if(confirm(\'确定清空全部题库？此操作不可恢复！\')){lsSet(\'questionBank\',[]);renderAQBank();toast(\'题库已清空\')}">🗑️ 清空题库</button>';var t=$('aQBank');if(t)t.innerHTML=h}
function viewLevelDetail(idx){var bank=getQB(),level=bank[idx];if(!level)return;var h='<table class="admin-table"><thead><tr><th>#</th><th>题干</th><th>答案</th><th>来源</th><th>操作</th></tr></thead><tbody>';for(var i=0;i<level.questions.length;i++){var q=level.questions[i],qt=q.question.length>50?q.question.slice(0,50)+'...':q.question;h+='<tr><td>'+(i+1)+'</td><td>'+qt+'</td><td>'+['A','B','C','D'][q.answer]+'</td><td>'+(q.source==='ai'?'AI':'原题')+'</td><td><button class="btn btn-sm btn-danger" onclick="delQFromLevel('+idx+','+i+')">删除</button></td></tr>'}h+='</tbody></table>';openModal('📋 '+level.levelName+' 题目详情',h,780)}
function delQFromLevel(li,qi){if(!confirm('确定删除该题目？'))return;var bank=getQB();bank[li].questions.splice(qi,1);lsSet('questionBank',bank);toast('题目已删除');viewLevelDetail(li);renderAQBank()}
function delLevel(li){if(!confirm('确定删除整个关卡？此操作不可恢复！'))return;var bank=getQB();bank.splice(li,1);lsSet('questionBank',bank);renderAQBank();toast('关卡已删除')}
function preImport(){var txt=$('impTxt')?$('impTxt').value:'';try{var data=JSON.parse(txt);if(!Array.isArray(data)){throw new Error('必须是数组')}pendingImport=data;var c=0;for(var i=0;i<data.length;i++){if(data[i].questions)for(var j=0;j<data[i].questions.length;j++)c++}var h='<p>预览：将导入 <strong>'+data.length+'</strong> 个新关卡内容，共 <strong>'+c+'</strong> 道题</p>';h+='<button class="btn btn-primary" onclick="cfmImport()">确认导入</button>';$('impPre').innerHTML=h}catch(e){$('impPre').innerHTML='<p style="color:#ff6b6b">JSON格式错误：'+e.message+'</p>'}}
function cfmImport(){if(pendingImport.length===0)return;var bank=getQB();for(var i=0;i<pendingImport.length;i++){var item=pendingImport[i];var found=bank.find(function(l){return l.levelName===item.levelName});if(found){if(item.questions)for(var j=0;j<item.questions.length;j++){var q=item.questions[j];if(!q.source)q.source='original';found.questions.push(q)}}else{if(item.questions)for(var j=0;j<item.questions.length;j++){if(!item.questions[j].source)item.questions[j].source='original'}bank.push(item)}}lsSet('questionBank',bank);pendingImport=[];$('impPre').innerHTML='<p style="color:#00b894">✅ 导入成功！</p>';renderAQBank();renderGramBar();toast('题库已更新')}
function exportQB(){var bank=getQB(),json=JSON.stringify(bank,null,2);var blob=new Blob([json],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='questionBank_backup.json';a.click();toast('题库已导出')}

function renderAExam(){var settings=lsGet('examSettings',DEFAULT_EXAM_SETTINGS);var bank=getQB(),total=0;for(var i=0;i<bank.length;i++)total+=bank[i].questions.length;var h='<p>题库总题数：<strong>'+total+'</strong></p>';h+='<label>考试总题数：<input id="examTotal" type="number" value="'+(settings.totalQuestions||100)+'" min="1" max="'+total+'" style="width:100px;padding:6px;border-radius:10px;background:rgba(10,10,40,.8);color:#e0e0ff;border:1px solid rgba(100,150,255,.3);font-family:inherit"></label>';h+='<label style="margin-left:15px">显示计时器：<input type="checkbox" id="examTimerCb" '+(settings.showTimer?'checked':'')+' style="accent-color:#6c5ce7"></label>';h+='<h4 style="margin-top:15px">📊 得分奖励规则</h4><div id="rewardRows">';for(var i=0;i<settings.scoreRewards.length;i++){var r=settings.scoreRewards[i];h+='<div style="margin:5px 0">最低分：<input type="number" value="'+r.min+'" class="rMin" style="width:60px"> 最高分：<input type="number" value="'+r.max+'" class="rMax" style="width:60px"> ⭐：<input type="number" value="'+r.stars+'" class="rStars" style="width:50px"> 积分：<input type="number" value="'+r.points+'" class="rPts" style="width:50px"> <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">删除</button></div>'}h+='</div>';h+='<button class="btn btn-sm btn-success" onclick="addRewardRow()">+ 添加奖励行</button>';h+='<br><button class="btn btn-primary" onclick="saveExamSettings()" style="margin-top:10px">💾 保存考试设置</button>';var t=$('aExam');if(t)t.innerHTML=h}
function addRewardRow(){var d=document.createElement('div');d.style.margin='5px 0';d.innerHTML='最低分：<input type="number" value="0" class="rMin" style="width:60px"> 最高分：<input type="number" value="0" class="rMax" style="width:60px"> ⭐：<input type="number" value="0" class="rStars" style="width:50px"> 积分：<input type="number" value="0" class="rPts" style="width:50px"> <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">删除</button>';$('rewardRows').appendChild(d)}
function saveExamSettings(){var total=parseInt($('examTotal')?$('examTotal').value:100);var bank=getQB(),allTotal=0;for(var i=0;i<bank.length;i++)allTotal+=bank[i].questions.length;if(total<1){toast('题数至少为1');return}if(total>allTotal){toast('题数不能超过题库总题数('+allTotal+')');return}var rewards=[];var mins=document.querySelectorAll('.rMin');var maxes=document.querySelectorAll('.rMax');var stars=document.querySelectorAll('.rStars');var pts=document.querySelectorAll('.rPts');for(var i=0;i<mins.length;i++){rewards.push({min:parseInt(mins[i].value)||0,max:parseInt(maxes[i].value)||0,stars:parseInt(stars[i].value)||0,points:parseInt(pts[i].value)||0})}var settings={totalQuestions:total,showTimer:$('examTimerCb')?$('examTimerCb').checked:false,levelRatios:{},scoreRewards:rewards};lsSet('examSettings',settings);toast('考试设置已保存')}

function init(){
initAdmin();initQB();
if(!lsGet('shopItems',null))lsSet('shopItems',DEFAULT_SHOP);
if(!lsGet('examSettings',null))lsSet('examSettings',DEFAULT_EXAM_SETTINGS);
var users=getUsers();
for(var i=0;i<users.length;i++){if(lsGet(users[i].username+'_loginState',false)){curUser=users[i].username;showScreen('mainScreen');initMain();return}}
showScreen('welcomeScreen');
var canvas=$('starsCanvas'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
var starsArr=[];
for(var i=0;i<80;i++){starsArr.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.5,a:Math.random()*0.5+0.5,sp:Math.random()*0.02+0.005})}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);for(var i=0;i<starsArr.length;i++){var s=starsArr[i];s.a+=s.sp;if(s.a>1||s.a<0.2)s.sp=-s.sp;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+s.a+')';ctx.fill()}requestAnimationFrame(animate)}
animate();
}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
