<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>🚀 英语语法大闯关 - 选择题版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Comic Sans MS","YouYuan",sans-serif;background:#0a0a2e;color:#e0e0ff;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,#1a1a4e 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,#0d0d3a 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,#151545 0%,transparent 50%);z-index:-2}
.stars-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
.btn{display:inline-block;padding:12px 28px;border:none;border-radius:25px;font-size:1.05rem;cursor:pointer;font-family:inherit;transition:all .25s;font-weight:bold;outline:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,#4a90ff,#6c5ce7);color:#fff}
.btn-success{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff}
.btn-warning{background:linear-gradient(135deg,#fdcb6e,#e17055);color:#fff}
.btn-danger{background:linear-gradient(135deg,#d63031,#e17055);color:#fff}
.btn-gray{background:linear-gradient(135deg,#636e72,#b2bec3);color:#fff}
.btn-sm{padding:6px 14px;font-size:.85rem;border-radius:18px}
.btn-lg{padding:16px 40px;font-size:1.3rem;border-radius:30px}
.btn-next{padding:16px 50px;font-size:1.3rem;border-radius:30px;background:linear-gradient(135deg,#ff6b6b,#ffa502);color:#fff;animation:nextPulse 1.5s ease-in-out infinite}
@keyframes nextPulse{0%,100%{box-shadow:0 0 10px rgba(255,107,107,.4)}50%{box-shadow:0 0 30px rgba(255,165,2,.8)}}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
.welcome-screen{justify-content:center;align-items:center;gap:20px;text-align:center}
.welcome-screen h1{font-size:2.5rem;text-shadow:0 0 20px rgba(100,150,255,.6)}
.welcome-screen .subtitle{font-size:1.1rem;opacity:.8;margin-bottom:10px}
.welcome-planets{display:flex;gap:30px;margin:20px 0;font-size:3rem}
.welcome-planets span{animation:float 3s ease-in-out infinite}
.welcome-planets span:nth-child(2){animation-delay:.5s}
.welcome-planets span:nth-child(3){animation-delay:1s}
.welcome-planets span:nth-child(4){animation-delay:1.5s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.auth-form{background:rgba(20,20,60,.9);border-radius:20px;padding:30px;width:380px;max-width:95vw;display:flex;flex-direction:column;gap:15px;border:2px solid rgba(100,150,255,.3)}
.auth-form input{width:100%;padding:12px 16px;border-radius:25px;border:2px solid rgba(100,150,255,.3);background:rgba(10,10,40,.8);color:#e0e0ff;font-size:1rem;font-family:inherit;outline:none;transition:border .3s}
.auth-form input:focus{border-color:#6c5ce7}
.auth-form .error-msg{color:#ff6b6b;font-size:.85rem;min-height:20px;text-align:center}
.auth-form .btn{width:100%}
.auth-form .remember-row{display:flex;align-items:center;gap:8px;font-size:.85rem;color:#b0b0d0}
.auth-form .remember-row input[type=checkbox]{width:auto;accent-color:#6c5ce7}
.top-bar{background:linear-gradient(135deg,rgba(20,20,80,.95),rgba(30,30,70,.95));padding:12px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:10px 20px;border-bottom:2px solid rgba(100,150,255,.3);position:sticky;top:0;z-index:100}
.top-bar .title{font-size:1.3rem;font-weight:bold;white-space:nowrap}
.top-bar .info-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.top-bar .stat{background:rgba(100,150,255,.15);border-radius:15px;padding:4px 12px;font-size:.85rem;white-space:nowrap}
.top-bar .btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}
.grammar-bar{display:flex;flex-wrap:wrap;gap:10px;padding:15px 20px;justify-content:center}
.grammar-btn{position:relative;background:rgba(40,40,100,.7);border:2px solid rgba(100,150,255,.3);border-radius:15px;padding:10px 16px;color:#c0c0ff;cursor:pointer;font-family:inherit;font-size:.9rem;transition:all .25s;white-space:nowrap}
.grammar-btn:hover{background:rgba(60,60,140,.8);border-color:#6c5ce7;transform:translateY(-2px)}
.grammar-btn.active{background:rgba(80,60,180,.8);border-color:#a29bfe;color:#fff;box-shadow:0 0 15px rgba(108,92,231,.4)}
.grammar-btn .badge{position:absolute;top:-6px;right:-6px;width:10px;height:10px;background:#ff4757;border-radius:50%}
.quiz-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:20px}
.quiz-progress{font-size:.95rem;opacity:.7}
.quiz-question{font-size:1.5rem;text-align:center;max-width:650px;line-height:1.5;background:rgba(20,20,60,.7);border-radius:18px;padding:20px 30px;border:1px solid rgba(100,150,255,.2)}
.quiz-tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
.quiz-tag.ai{background:rgba(255,165,0,.3);color:#ffa502}
.quiz-tag.original{background:rgba(0,184,148,.3);color:#00b894}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:600px;width:100%}
.quiz-option{background:rgba(30,30,80,.8);border:2px solid rgba(100,150,255,.3);border-radius:16px;padding:16px;font-size:1.1rem;color:#d0d0ff;cursor:pointer;font-family:inherit;transition:all .25s;text-align:left}
.quiz-option:hover{background:rgba(50,50,120,.8);border-color:#6c5ce7}
.quiz-option.correct{background:rgba(0,184,148,.5)!important;border-color:#00b894!important;animation:pulse .5s}
.quiz-option.wrong{background:rgba(214,48,49,.5)!important;border-color:#d63031!important;animation:shake .4s}
.quiz-option.flash-correct{animation:flashGreen .8s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes flashGreen{0%,100%{background:rgba(30,30,80,.8)}50%{background:rgba(0,184,148,.6)}}
.explanation-box{background:rgba(255,165,0,.15);border:2px solid rgba(255,165,0,.4);border-radius:15px;padding:15px 20px;max-width:600px;width:100%;text-align:center;font-size:1rem;margin-top:10px}
.star-burst{position:fixed;pointer-events:none;font-size:2rem;animation:starUp .8s ease-out forwards;z-index:200}
@keyframes starUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}
.level-up-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300}
.level-up-box{background:linear-gradient(135deg,#2d1b69,#6c5ce7);border-radius:20px;padding:40px;text-align:center;animation:bounceIn .5s;border:3px solid #fdcb6e}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:250;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:rgba(20,20,60,.97);border-radius:20px;padding:25px;max-width:700px;width:95vw;max-height:85vh;overflow-y:auto;border:2px solid rgba(100,150,255,.3)}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:15px}
.shop-card{background:rgba(30,30,80,.8);border-radius:15px;padding:18px;text-align:center;border:1px solid rgba(100,150,255,.2);transition:all .25s}
.shop-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.calendar-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:.85rem;cursor:default}
.calendar-cell.star-day{background:rgba(253,203,110,.3);border:2px solid #fdcb6e}
.calendar-cell.empty{opacity:.3}
.calendar-cell.today{border:2px solid #6c5ce7}
.calendar-header{font-size:.8rem;opacity:.6;text-align:center}
.admin-tabs{display:flex;gap:5px;margin-bottom:15px}
.admin-tab{padding:8px 18px;border-radius:15px 15px 0 0;background:rgba(40,40,100,.5);border:none;color:#c0c0ff;cursor:pointer;font-family:inherit;font-size:.9rem}
.admin-tab.active{background:rgba(80,60,180,.7);color:#fff}
.admin-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.85rem}
.admin-table th,.admin-table td{border:1px solid rgba(100,150,255,.2);padding:8px 10px;text-align:left}
.admin-table th{background:rgba(40,40,100,.6)}
.admin-table tr:hover{background:rgba(40,40,120,.3)}
.inventory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:10px}
.inventory-card{background:rgba(30,30,80,.8);border-radius:12px;padding:14px;text-align:center;font-size:.85rem}
@media(max-width:600px){.quiz-options{grid-template-columns:1fr}.welcome-screen h1{font-size:1.6rem}.top-bar{flex-direction:column;align-items:flex-start}.top-bar .btn-row{margin-left:0}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,80,.95);border:2px solid rgba(100,150,255,.4);border-radius:25px;padding:12px 28px;font-size:1rem;z-index:400;animation:toastIn .3s ease-out,toastOut .3s 2.5s ease-in forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-30px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-30px)}}
</style>
</head>

<canvas class="stars-canvas" id="starsCanvas"></canvas>
<div class="screen active" id="welcomeScreen"><div class="welcome-screen">
<div class="welcome-planets"><span>🌍</span><span>🪐</span><span>🚀</span><span>⭐</span></div>

<button class="btn btn-primary" onclick="showScreen('registerScreen')">✨ 新用户注册</button>

uestion":"People like to enjoy ______ homes.","options":["them","they","their","theirs"],"answer":2,"explanation":"考查形容词性物主代词。句子中缺少定语，形容词性物主代词their相当于形容词来修饰名词homes做定语，因此选C。","source":"original"},{"question":"This is not ______ English book. ______ is in the classroom.","options":["my; My","my; Mine","me; Mine","mine; My"],"answer":1,"explanation":"第一个空后面有名词，选形容词性物主代词；第二空后没有所指名词，需要名词性物主代词。","source":"original"},{"question":"I love Alice. I love ______.","options":["it","her","him","them"],"answer":1,"explanation":"本题考查人称代词宾格。her，“她”的宾格。Alice是女孩，应用her指代。","source":"original"},{"question":"—Where ______ my dogs? —______ in the bedroom.","options":["is; It's","are; They're","is; They're"],"answer":1,"explanation":"考查代词和主谓一致。根据主语my dogs为复数，be动词选are，并且用they代替，故选B。","source":"original"},{"question":"—Excuse me. What's ______ name, please? —______ name is Jerry.","options":["you; Your","your; My","his; My","her; Your"],"answer":1,"explanation":"考查形容词性物主代词。句意：一打扰一下，请问你叫什么名字？一我的名字是杰瑞。故选B。","source":"original"},{"question":"My uncle is funny and cool. We all like ______.","options":["you","he","him"],"answer":2,"explanation":"like后接宾格。","source":"original"},{"question":"My mom loves my grandma. Yes, ______ loves ______ very much!","options":["she; her","she; him","her; her"],"answer":0,"explanation":"like是动词，前面用代词的主格形式，后面用人称代词的宾格形式，mom用she，主格为she；my grandma用she，宾格为her。所以选择A。","source":"original"},{"question":"那是你的尺子吗？ Is that ______ ruler?","options":["you","your","yours","me"],"answer":1,"explanation":"考查形容词性物主代词。你的your。故填your。","source":"original"},{"question":"______ this book yours? No, it's not ______ book. It is ______.","options":["Is, my, her","Is, my, hers","Are, mine, her","Are, my, her"],"answer":1,"explanation":"考查动词和物主代词。第一个由于主语是this，所以动词应该是is；第二个表示“我的书”，由于后面有名词，应用形容词性物主代词；第三个表示“她的书”，由于后面没有名词，应该用名词性物主代词。故答案为B。","source":"original"},{"question":"Miss Li is ______ music teacher. We all like her very much.","options":["we","us","our","ours"],"answer":2,"explanation":"考查代词。We是主格。Us是宾格，our是形容词性物主代词。Ours是名词性物主代词。","source":"original"},{"question":"I have ______ to tell you, please help ______ to fish, children.","options":["something important; yourselves; some","important something; yourselves; some","important everything; yourself; little","something important; us; some"],"answer":0,"explanation":"考查代词。形容词修饰不定代词时要放在不定代词的后面，something important一些重要的事情，help yourselves请随便吃。故选A。","source":"original"},{"question":"What are ______ going to do on Sunday?","options":["them","they","their"],"answer":1,"explanation":"考查代词用法。一般将来时疑问句的结构是\"Be动词+主语+going to+动原\"。因此这里be动词后要填主语，要用主格。故答案选B。","source":"original"},{"question":"—Whose toys ______? —______.","options":["are these; It's mine","is it; They're mine","are these; They're mine"],"answer":2,"explanation":"问句中是toys，可数名词复数，所以后面的be动词和代词都应用复数，同时答句也应该用They're，所以选择C。","source":"original"},{"question":"Hello! I'm Linda. ______ eyes are big.","options":["My","Me","I"],"answer":0,"explanation":"考查代词。句意：你好！我是琳达。我的眼睛很大。A：我的；B：我；C：我。根据句子结构可知空格处应填形容词性物主代词，即A项。B项为宾格，C项为主格。故答案为：A。","source":"original"},{"question":"He doesn't have any son or daughter, so he lives by ______.","options":["his","him","he","himself"],"answer":3,"explanation":"考查反身代词。by oneself表示“由某人自己”。故选D。","source":"original"},{"question":"—Is the model plane ______, Andy? —No, it isn't. ______ is at home.","options":["yours; Mine","yours; My","yours; Her","my; His"],"answer":0,"explanation":"“你的（飞机模型）”，“我的（飞机模型）”都需要用名词性物主代词yours，mine。","source":"original"},{"question":"There isn't ______ food in the fridge. Let's go to the supermarket to buy ______.","options":["any; some","any; any","some; any"],"answer":0,"explanation":"否定句用any，肯定句表示“一些”用some。","source":"original"},{"question":"Dinner is ready, Help ______, kids! Wow! It ______ delicious.","options":["yourself; looks","yourselfs; feels","yourselves; sounds","yourselves; tastes"],"answer":3,"explanation":"考反身代词和动词。固定搭配help oneself to sth.表示“随便吃喝”，由于后面是kids，所以应该是复数yourselves；第二个由于是食物，因此是“尝起来”。故答案为D。","source":"original"},{"question":"Lily was 9 years old. ______ was old enough to go to school by ______.","options":["She, herself","She, she","Her, herself","Her, she"],"answer":0,"explanation":"考查人称代词和反身代词辨析。从题目Lily was 9 years old. was old enough to go to school.可知她是足够大了可以自己去上学，其中第一个空缺的是主语要用人称代词主格，第二空，某人自己做可直接用反身代词，by可以不要。故答案选A。","source":"original"},{"question":"Our friend Wang Fang ______ a book and then she told ______ something interesting.","options":["read, we","read, us","reads, we","reading, us"],"answer":1,"explanation":"考查动词时态和固定搭配。根据后半句的谓语动词tell用了过去时可知，因为是and连接的两个并列成分，因此此处也应该用过去时；tell sb. sth.告诉某人某事，动词后用代词宾格形式。句意：我们的朋友王芳读了一本关于作者沈石溪的书，并且之后她给我们讲了一些里面有意思的事。故填：read；us。","source":"original"},{"question":"The dog can eat with ______ mouth.","options":["their","it's","its"],"answer":2,"explanation":"狗用它的嘴吃东西。its它的。","source":"original"},{"question":"Lele loves robots and ______ favourite robot is always Kuan.","options":["his","their","her"],"answer":0,"explanation":"Lele是男孩名，用his。","source":"original"},{"question":"Miss Li is an English teacher. ______ teaches ______ English.","options":["He; we","His; us","She; us"],"answer":2,"explanation":"考查人称代词。根据teach sb sth可知第二个空应用宾格做teach的宾语，可排除A选项；又，根据teaches为谓语动词，缺少主语。故答案选C。","source":"original"},{"question":"—Is ______ in the study? —Yes, she is.","options":["he","she","her"],"answer":1,"explanation":"句意：——在书房里吗？一是的，她在。问句缺主语，her不能作主语，排除C。又根据回答中的“she”可知，问句的主语是“她”，故选B。","source":"original"},{"question":"Tommy is a friend of ______.","options":["I","my","mine","me"],"answer":2,"explanation":"考查代词。A代词主格；B形容词性物主代词；C名词性物主代词；D代词宾格。mine=my friends。故选C。","source":"original"},{"question":"______ have a new schoolbag. ______ schoolbag is heavy.","options":["I, my","I, My","My, I"],"answer":1,"explanation":"考查代词，前者是人称代词，后者是物主代词，首字母大写。","source":"original"},{"question":"Is this your suitcase? No, it isn't ______. It's ______.","options":["mine; hers","my; she's","mine; her","my; hers"],"answer":0,"explanation":"考察物主代词。mine表示“我的”；hers表示“她的”。","source":"original"},{"question":"______ is a policeman. ______ English name is John.","options":["He; Her","Her; His","He; His","His; Her"],"answer":2,"explanation":"考查代词。第一个空缺主语，选he；第二个空缺定语可以用形容词性物主代词来修饰，he的形容词性物主代词是his，因此选C。","source":"original"},{"question":"This is ______ (our/we) classroom.","options":["our","we","us","ours"],"answer":0,"explanation":"句意为：这是我们的教室。后接名词classroom，表示我们的教室，应该使用形容词性物主代词our。故答案为our。","source":"original"},{"question":"This is my mom. I love ______.","options":["she","him","her"],"answer":2,"explanation":"考查人称代词，前文是mom，宾格用her。","source":"original"},{"question":"Please come in and make ______ at home.","options":["you","your","yours","yourself"],"answer":3,"explanation":"本题考查反身代词。make yourself at home别客气。","source":"original"},{"question":"Mike is my pen pal. I often help him with ______ Chinese.","options":["he","his","him","himself"],"answer":1,"explanation":"考查物主代词，因为横线后有名词，所以用形容词性物主代词，他的，选B。","source":"original"},{"question":"This is my uncle. ______ is a policeman.","options":["She","He","It"],"answer":1,"explanation":"考查人称代词。句意：这是我的叔叔。他是一名警察。根据句意可知空格处是替代uncle的，叔叔，男性，要用人称代词He，故选B。","source":"original"},{"question":"The writer is very famous. I like ______ books very much.","options":["he","his","him"],"answer":1,"explanation":"后面有名词books，用形容词性物主代词his。","source":"original"},{"question":"There is a new library in ______ school.","options":["they","them","their"],"answer":2,"explanation":"考查代词。根据句意：在他们学校有一座新的图书馆，“他们的学校”用their，故选择C。","source":"original"},{"question":"My sister is a clerk. ______ works in a bank near here.","options":["She","He","I","You"],"answer":0,"explanation":"考查代词。我的妹妹是个职员，后面肯定说她在银行工作，动词work前应该用主格she。因此选A项。","source":"original"},{"question":"Lily is a beautiful girl. ______ is very thin.","options":["He","Him","She","Her"],"answer":2,"explanation":"\"Lily很漂亮，她很瘦。“考查代词使用，she代替Lily。","source":"original"},{"question":"______ pen is red. ______ pencil is green.","options":["Those; This","This; Those","That; Those","This; That"],"answer":3,"explanation":"考查指示代词。句意：这支笔是红色的，那只铅笔是绿色的。由于pen和pencil均为单数，故而指示代词均需为单数。选择D。","source":"original"},{"question":"Excuse me, is this ______ school? No, ______ is next to the post office.","options":["your; our","yours; ours","your; ours","you; our"],"answer":2,"explanation":"第一个空后有名次，填形容词性物主代词，第二个空后没有名词，填名词性物主代词。故选C。","source":"original"},{"question":"Mike, what is ______? It's a kite.","options":["this","these","those"],"answer":0,"explanation":"问近处的单个物品用this。","source":"original"},{"question":"—Here's a postcard for you, Jim! —Oh, ______ is from my friend, Mary.","options":["he","it","she","it's"],"answer":1,"explanation":"句意：—这里有一张明信片给你，吉姆！—哦，它是从我的朋友玛丽那儿寄来的。a postcard 意为“一张明信片”，属于单数，用人称代词it来代替，因而选B。","source":"original"},{"question":"Is this ______ book?","options":["your","you","yours"],"answer":0,"explanation":"询问这是你的书吗？用形容词性物主代词your。","source":"original"},{"question":"Can ______ show me ______ hands?","options":["you; you","you; your","your; you"],"answer":1,"explanation":"考查代词。句意：你可以给我看看你的手吗？第一空，是句子主语，填写人称代词主格you；第二空，使用形容词性物主代词，后接名词，表示某人的，使用your；故选B。","source":"original"},{"question":"Eating too many sweets is bad for ______.","options":["we","I","us","our"],"answer":2,"explanation":"考查代词。根据for为介词可知后面应为宾格。句意：吃太多的糖对我们不好。故选：C。","source":"original"},{"question":"I'm going skating. Would you like to go with ______?","options":["me","I","my","mine"],"answer":0,"explanation":"考查人称代词宾格。with后面缺宾语，根据句义是填“我”在句子中做宾语，所以填人称代词“我”的宾格形式me。","source":"original"},{"question":"The teachers are happy when ______ students win the prize.","options":["they","their","theirs"],"answer":1,"explanation":"后面有名词students，用形容词性物主代词their。","source":"original"},{"question":"I love our teachers. ______ are always ready to help us.","options":["They","You","We","He"],"answer":0,"explanation":"考查代词。句意为：我喜欢我的老师们。……总是乐于帮助我们。根据句意，可知空处指的是前文的老师们，用they指代，选A。","source":"original"},{"question":"Pass ______ a fork, please.","options":["me","my","I"],"answer":0,"explanation":"表示“递给某人某物”的句型：pass sb. sth. 其中，sb. 用的是人称代词的宾格。故选A。","source":"original"},{"question":"Tomorrow is our teacher's birthday and we are going to give ______ a big surprise.","options":["him","his","himself"],"answer":0,"explanation":"考查人称代词,给他一个惊喜,他为宾格用him。","source":"original"},{"question":"What's ______ telephone number? ______ telephone number is 6872-36.","options":["your; My","you; My","his; Her","her; His"],"answer":0,"explanation":"考查形容词性物主代词。句意:一你的电话号码是多少?一我的电话号码是6872- 3651。选择A。","source":"original"},{"question":"Let ______ see your new picture.","options":["I","me","my"],"answer":1,"explanation":"考查人称代词,let后用宾格,故选B。","source":"original"},{"question":"Do you know ______?","options":["she","her","he"],"answer":1,"explanation":"know动词后跟人称代词宾格,A和C都是主格,故选B。","source":"original"},{"question":"Don't worry. I can do it ______.","options":["by me","in me","in myself","by myself"],"answer":3,"explanation":"考查代词。By myself表示\"我自己\",句意是:我可以自己做。","source":"original"},{"question":"______ my English book and ______ books are theirs.","options":["This is; that","This is; those","These are; that","These are; those"],"answer":1,"explanation":"第一空单数。第二空复数。","source":"original"},{"question":"Do you like ______ ring? It was my birthday present.","options":["this","those","these"],"answer":0,"explanation":"单数用this。","source":"original"},{"question":"Whose ______? I guess they are ______.","options":["is this; hers","are these; her","is this; her","are these; hers"],"answer":3,"explanation":"考查指示代词和物主代词。根据这裤子是谁的？我猜是她的。第一空因为裤子是复数，所以指示代词单复数要和它保持一致，故答案是are these；第二空她的，后面没有名词，可知此处应该填名词性物主代词hers，表示她的（裤子）。故答案选D。","source":"original"},{"question":"______ two girls are Mary and Linda.","options":["This","That","These"],"answer":2,"explanation":"近的,复数名词用these。","source":"original"},{"question":"朋友到你家做客,你怎样介绍你的爸爸?","options":["This is my sister.","This is my father."],"answer":1,"explanation":"考查情景问答,介绍某人用this is。","source":"original"},{"question":"I haven't got any small change.","options":["So do I","So have I","Neither I have","Neither have I"],"answer":3,"explanation":"考查代词。\"Neither + 倒装句\"结构表示\"某某也不(是)……\"。","source":"original"},{"question":"Will you please give the boy ______ to eat?","options":["favorite something","different anything","popular everything","something delicious"],"answer":3,"explanation":"考查不定代词。根据句意,你能给这个男孩一些吃的吗?复合不定代词与形容词连用,要把形容词放在后面,故答案为D。","source":"original"},{"question":"There must be something wrong with my ear. I can't hear ______.","options":["nothing","anything","something","somebody"],"answer":1,"explanation":"考查代词辨析。根据句意可知,表达的是\"我听不到任何声音\",anything表示\"任何事、物等\",故选B。","source":"original"},{"question":"Let's give them ______ to drink.","options":["something different","different something","anything different","different anything"],"answer":0,"explanation":"考查形容词。形容词修饰不定代词放在不定代词之后,因此B、D排除,因为something用于肯定句,anything用于否定句,因此选A。","source":"original"},{"question":"I have ______ toilet paper. But I don't have ______ shampoo.","options":["any; some","some; any","any; any"],"answer":1,"explanation":"考查不定代词。some用于陈述句，any用于疑问句和否定句。故答案为B。","source":"original"},{"question":"John's father is hungry, but there is ______ for dinner.","options":["something","nothing","anything","everything"],"answer":1,"explanation":"晚饭没有其他的了选B。","source":"original"},{"question":"I can go back home. There's ______ to do here.","options":["thing","nothing","all things"],"answer":1,"explanation":"表示\"我可以回家了，这里没有事情可做了\"。","source":"original"},{"question":"______ lovely the roses are! Would you like to buy ______?","options":["How; some","How; much","What; any","What; some"],"answer":0,"explanation":"感叹句how引导形容词，此处some表建议。","source":"original"},{"question":"______ of my parents are on holiday in Hainan now.","options":["All","Some","Any","Both"],"answer":3,"explanation":"这题考察代词, 我的父母都在海南度假。父母就是指两者, 两者都, 用both表示, 选D。A选项All表示三者或三者以上都, B选项表示一些, C选项any表示否定句中的一些或任何。","source":"original"},{"question":"Come here! I have ______ to tell you.","options":["something important","important something","Some important thing","very important something"],"answer":0,"explanation":"考查复合不定代词和形容词用法。当两者连用时, 形容词后置, 所以选A。","source":"original"},{"question":"— Would you like ______ orange juice? — Yes, please.","options":["some","any","an","many"],"answer":0,"explanation":"考查代词辨析。因为句型Would you like...?是表示委婉请求, 用some而不是any。故选A。","source":"original"},{"question":"The teacher has ______ to tell us.","options":["something important","important something","some important"],"answer":0,"explanation":"考查不定代词用法。something的定语要后置, 选A。","source":"original"},{"question":"Larry asks Bill and Peter to go on a picnic with him, but ______ of them wants to, because they have work to do.","options":["either","any","neither","none"],"answer":2,"explanation":"考查不定代词。根据句意，Larry请求Bill和Peter一起去野餐，但是他们两都不想去，因为他们有工作去做，neither表示两者都不，故答案为C。","source":"original"},{"question":"Everything here ______ very good and healthy.","options":["is","are","am"],"answer":0,"explanation":"考查复合不定代词。根据everything作主语，可知动词应用单数形式is。故答案选A。","source":"original"},{"question":"I had looked ______ but I couldn't find my glasses.","options":["nowhere","anywhere","everywhere","where"],"answer":2,"explanation":"考查词汇辨析，nowhere意为“无处”，具有否定含义；anywhere指的是“任何地方”，用于疑问句和否定句；everywhere指的是“每个地方”；where指的是“哪里”。句意是：我查看了每个地方，都没能找到我的眼镜。故而选择C。","source":"original"},{"question":"—What are you? —I am ______.","options":["nation; China","national; Chinese","nationality; China","nationality; Chinese"],"answer":3,"explanation":"考查名词。nationality是国籍的意思，通常与what构成特殊疑问句询问国籍。Chinese是中国人。","source":"original"},{"question":"______ in your schoolbag? A maths book and a pencil box.","options":["What","What's","what's"],"answer":1,"explanation":"问书包里有什么？What's in...?","source":"original"},{"question":"______ I do? You should do more exercise.","options":["What should","How should","What do"],"answer":0,"explanation":"What should I do? 我该做什么？","source":"original"},{"question":"Mum, I'm hungry. ______ for dinner?","options":["What's","What","Where"],"answer":0,"explanation":"询问\"三餐吃什么？\"的句型：What's for+三餐？句意：妈妈，我很饿。晚餐吃什么？故选A。","source":"original"},{"question":"______ broke the window? It's Li Ming.","options":["Who","What","Which","Where"],"answer":0,"explanation":"考查who引导的疑问句。Who是对人提问，这里问谁打破了窗户？","source":"original"},{"question":"______ nationality is Hans?","options":["Where","What","How","Which"],"answer":1,"explanation":"对表语nationality这个名词提问。","source":"original"},{"question":"—______? —It's 11 o'clock.","options":["How's the time","What the time","What's the time"],"answer":2,"explanation":"句意：现在十一点了。可知问的是现在的时间，提问时间可用What's the time，故答案为C项。","source":"original"},{"question":"______ in our new classroom? Many desks and chairs.","options":["Where's","What's","Who's"],"answer":1,"explanation":"问新教室里有什么？","source":"original"},{"question":"______ is Mr Wang? He is our PE teacher.","options":["Why","How","Who"],"answer":2,"explanation":"问职业或身份用who。","source":"original"},{"question":"______ one do you like, the blue one or the red one? — The red one, please.","options":["Which","What","Where"],"answer":0,"explanation":"你喜欢哪一个,蓝色的还是红色的?which哪一个。","source":"original"},{"question":"连词成句 on chair the What is ?","options":["What is on the chair?","What on the chair is?","Is what on the chair?"],"answer":0,"explanation":"考查特殊疑问句。What is on the chair?在椅子上是什么?","source":"original"},{"question":"______ pencils are these? Are they Li Ming's?","options":["Who","Whose","What","Where"],"answer":1,"explanation":"考察疑问代词。这些铅笔是谁的?是李明的吗?Whose表示谁的。","source":"original"},{"question":"I like that ______. Do you like ______?","options":["pictures; it","picture; it","picture; picture"],"answer":1,"explanation":"考查名词和代词。根据上句语境：你喜欢那幅图片吗，that后接单数名词，排除A；又根据下句语境：你喜欢它吗？所以选择it来代替那幅图片。故答案选B。","source":"original"},{"question":"______ is very cold today.","options":["It is","Its","It's","It"],"answer":3,"explanation":"考查代词it。无人称动词主语通常用it，表示天气、时间、季节、距离等，A、C项谓语动词重复，排除A和C；its意为“它的”，不是主格，排除B；故选D。","source":"original"},{"question":"Why does he like running? Because ______ cool!","options":["they are","it is","they is"],"answer":1,"explanation":"跑步“这件事”用it，所以be动词用is，故选择B。","source":"original"},{"question":"Is that your cousin?","options":["Yes, it is.","No, he isn't.","Yes, it isn't."],"answer":0,"explanation":"指代不明身份的人时，常用it。","source":"original"},{"question":"Whose cap is this?","options":["It's Amy.","It's Amy's.","They're Amy's."],"answer":1,"explanation":"考查特殊疑问句的回答。根据问句Whose cap is this? 一般回答It's...后面接名词性物主代词做表语。所以选项B.It's Amy's。它是Amy的。符合题意。句意：这是谁的帽子？是Amy的。故选：B。","source":"original"},{"question":"The woman bought a pet dog for ______ son and he likes ______ very much.","options":["her; it","her; its","she; it"],"answer":0,"explanation":"第一个空用her，形容词性物主代词修饰son；第二个空用it指代pet dog。","source":"original"},{"question":"Tony is a boy. (He/she) is my cousin.","options":["He","She","It"],"answer":0,"explanation":"考查人称代词。句意：Tony是一个男孩。他是我的表弟。根据第一句中boy可知，应选择表示男性的人称代词He。故答案为：He。","source":"original"},{"question":"This new kind of ice cream tastes so delicious that I must share with my friends. Please give me two ______.","options":["other","the other","another","the others"],"answer":2,"explanation":"考查代词。other，泛指其他所有的。the other，特指其他的，有范围的。another，又一个，在原来的基础上再来一个。the others，相当于the other的名词性物主代词。根据句意可知已经尝过了，所以是在原来的基础上再来两个，所以用another。故答案为C。","source":"original"},{"question":"At Christmas people like to give e o gifts.（互相）","options":["each other","one another","each others"],"answer":0,"explanation":"考查固定短语。固定短语each other，“互相，彼此”。句意：在圣诞节人们喜欢互相送礼物。故答案为：each other。","source":"original"},{"question":"They made the machine by ______.","options":["themselves","I","himself"],"answer":0,"explanation":"by oneself，独自地。句意：他们是自己做的那个机器。","source":"original"},{"question":"Peter learned English by ______. (he)","options":["him","his","himself"],"answer":2,"explanation":"by oneself，独自地。","source":"original"},{"question":"I could look after ______ when I was six.","options":["herself","myself","yourself","himself"],"answer":1,"explanation":"考查反身代词。我6岁的时候，就能自己照顾自己，look after oneself表示“照顾自己”，主语是I，故选myself。","source":"original"},{"question":"Peter and his sister Amy enjoyed ______ at the dancing party.","options":["themself","himself","herself","themselves"],"answer":3,"explanation":"考查反身代词。句意:在舞蹈派对上Peter和他的妹妹Amy玩得很开心。考查固定短语enjoy oneself玩得的开心。同义于have a good time,前面提及两个人,因此反身代词用他们自己,故答案选D。","source":"original"},{"question":"Help ______, Linda.","options":["youself","yourself","yourselves"],"answer":1,"explanation":"固定搭配help yourself，主语为单数Linda。","source":"original"},{"question":"Boys, don't touch the machine, ______ you may hurt ______.","options":["or; myself","and; themselves","so; yourself","or; yourselves"],"answer":3,"explanation":"考查连词、反身代词。男孩们，别碰这个机器，否则你可能会伤到自己。or否则，要不然；yourselves你们自己，故选D。","source":"original"},{"question":"Help ______ to some fish, children.","options":["yourselves","your","yours","yourself"],"answer":0,"explanation":"考查反身代词。句意为：孩子们，给你们自己拿些鱼吃。Help yourself/yourselves表示\"请自便，别客气\"。选A。","source":"original"},{"question":"They all enjoyed ______ in the birthday party last night.","options":["them","themself","themselves","themselves"],"answer":2,"explanation":"考查反身代词，enjoy oneself 意为“玩得开心”。句意：他们昨晚在生日聚会上玩得都很开心。故选C。","source":"original"},{"question":"—Did you find ______ in the park? —No, I found ______ there.","options":["somebody, everybody","anybody, nobody","anybody, somebody","everybody, anybody"],"answer":1,"explanation":"考查不定代词。anybody用于否定句和疑问句中，根据题意后面一空是没有发现任何人，所以是nobody，故答案选B。","source":"original"},{"question":"Boys and girls, help ______ to some steak.","options":["yourselves","themselves","yourself"],"answer":0,"explanation":"固定搭配help oneself，主语为boys and girls是复数，要使用yourself的复数形式。","source":"original"}]},{"levelName":"一般现在时","questions":[{"question":"She ______ to school by bus every day.","options":["go","goes","going","went"],"answer":1,"explanation":"主语 She 是第三人称单数，一般现在时动词需加 -es。","source":"ai"},{"question":"They ______ football after school.","options":["play","plays","playing","played"],"answer":0,"explanation":"主语 They 是复数，一般现在时动词用原形。","source":"ai"},{"question":"My father ______ TV in the evening.","options":["watch","watches","watching","watched"],"answer":1,"explanation":"主语 My father 是第三人称单数，watch 加 -es。","source":"ai"},{"question":"We ______ in Beijing.","options":["live","lives","living","lived"],"answer":0,"explanation":"主语 We 是复数，一般现在时动词用原形。","source":"ai"},{"question":"The sun ______ in the east.","options":["rise","rises","rising","rose"],"answer":1,"explanation":"主语 The sun 是第三人称单数，表示客观事实。","source":"ai"},{"question":"I ______ milk for breakfast every morning.","options":["drink","drinks","drinking","drank"],"answer":0,"explanation":"主语 I 是第一人称，一般现在时动词用原形。","source":"ai"},{"question":"Tom ______ his homework after dinner.","options":["do","does","doing","did"],"answer":1,"explanation":"主语 Tom 是第三人称单数，do 变为 does。","source":"ai"},{"question":"Cats ______ fish.","options":["like","likes","liking","liked"],"answer":0,"explanation":"主语 Cats 是复数，一般现在时动词用原形。","source":"ai"},{"question":"My mother ______ delicious food.","options":["cook","cooks","cooking","cooked"],"answer":1,"explanation":"主语 My mother 是第三人称单数，动词加 -s。","source":"ai"},{"question":"______ you like ice cream?","options":["Do","Does","Is","Are"],"answer":0,"explanation":"主语 you 不是第三人称单数，疑问句用助动词 Do。","source":"ai"},{"question":"______ he speak English?","options":["Do","Does","Is","Are"],"answer":1,"explanation":"主语 he 是第三人称单数，疑问句用 Does + 动词原形。","source":"ai"},{"question":"She ______ not like swimming.","options":["do","does","is","are"],"answer":1,"explanation":"主语 She 是第三人称单数，否定句用 does not。","source":"ai"},{"question":"Water ______ at 100 degrees Celsius.","options":["boil","boils","boiling","boiled"],"answer":1,"explanation":"主语 Water 是不可数名词，视为第三人称单数，表示科学事实。","source":"ai"},{"question":"My friends and I ______ to the park on Sundays.","options":["go","goes","going","went"],"answer":0,"explanation":"主语 My friends and I 是复数，动词用原形。","source":"ai"},{"question":"The bird ______ in the sky.","options":["fly","flies","flying","flew"],"answer":1,"explanation":"主语 The bird 是第三人称单数，fly 变 y 为 i 加 -es。","source":"ai"},{"question":"I ______ not like getting up early.","options":["do","does","am","is"],"answer":0,"explanation":"主语 I 是第一人称，否定句用 do not。","source":"ai"},{"question":"______ your parents work in a hospital?","options":["Do","Does","Is","Are"],"answer":0,"explanation":"主语 your parents 是复数，疑问句用助动词 Do。","source":"ai"},{"question":"A doctor ______ sick people.","options":["help","helps","helping","helped"],"answer":1,"explanation":"主语 A doctor 是第三人称单数，动词加 -s。","source":"ai"},{"question":"We ______ not have class on Saturday.","options":["do","does","is","are"],"answer":0,"explanation":"主语 We 是复数，否定句用 do not。","source":"ai"},{"question":"The earth ______ around the sun.","options":["move","moves","moving","moved"],"answer":1,"explanation":"主语 The earth 是第三人称单数，表示客观真理。","source":"ai"},{"question":"He ______ to school by bus every day.","options":["go","goes","going","went"],"answer":1,"explanation":"every day 提示一般现在时，主语第三人称单数用 goes。","source":"original"},{"question":"______ your mother ______ in a hospital?","options":["Do...work","Does...works","Does...work","Is...work"],"answer":2,"explanation":"一般现在时疑问句，主语第三人称单数用 Does + 动词原形。","source":"original"},{"question":"I ______ not like coffee. I prefer tea.","options":["do","does","am","is"],"answer":0,"explanation":"主语 I 第一人称，否定句用 do not。","source":"original"},{"question":"\" 本题考查原因状语从句连接词 句意为 我们最好快点 因为天要黑了。and 和but 为并列连 词 句意不对。 35 因为 unless除非。故选C。 like Song Qingling because she was great。 S0 but 答案 解析 考查连词。 Because 因为 50 因此 but 但是。根据句意 这里想要表达的是 \"我喜欢 宋庆龄因为她很棒\" 故答案选A。 He was about to go to bed While 35 the doorbell rang。 C。 before When 答案","options":["while当 时 后接延续性动词 8.as边 。","before 在。 前 0. when当_ 时 后边动词 既可短暂又可延续。 故选0。"],"answer":0,"explanation":"","source":"original"},{"question":"她快 点 unless除非。 准时到达机场的前提是要 题目句意 苏珊无法准时到达机构 快一点。 don't have nice :0,"explanation":"考查连词。Because，因为；so，因此；but，但是。根据句意，这里想要表达的是“我喜欢宋庆龄因为她很棒”。故答案选A。","source":"original"},{"question":"He was about to go to bed ______ the doorbell rang.","options":["while","as","before","when"],"answer":3,"explanation":"考查时间状语从句连接词。句意为：当门铃响的时候，他正要上床睡觉。A.while当...时，后接延续性动词；B.as一边...；C.before在...前；D.when当...时，后边动词既可短暂又可延续。故选D。","source":"original"},{"question":"I ______ work hard, I ______ pass my exam.","options":["If; will","If; won't","Unless; will"],"answer":0,"explanation":"如果努力学习，就会通过考试。","source":"original"},{"question":"Susan will not arrive at the airport on time ______ she hurries up.","options":["when","if","once","unless"],"answer":3,"explanation":"题目句意：苏珊无法准时到达机构 ______ 她快一点，unless除非。准时到达机场的前提是要快一点。","source":"original"},{"question":"I don't have ______ nice clothes ______ shoes.","options":["some, and","any, and","any, or"],"answer":2,"explanation":"考查代词和连词辨析。some用于肯定句中，any用于否定句与疑问句中，在否定句中and应该变为or，表也。","source":"original"},{"question":"______ you ______ I like art, so let's go to art club together.","options":["And, and","Either, or","Both, and"],"answer":2,"explanation":"考查连词。And, and和；Either, or要么，要么；Both, and两者都。句意：因为你和我都喜欢艺术，所以让我们一起去艺术俱乐部吧。故选C。","source":"original"},{"question":"He likes English, ______ it's easy.","options":["and","or","because"],"answer":2,"explanation":"考查连词。A：和；B：或者；C：因为。句意：他喜欢英语，因为它比较简单。故选答案C。","source":"original"},{"question":"I hurried ______ I wouldn't be late for class.","options":["since","so that","as if","unless"],"answer":1,"explanation":"我要快点，这样就不会上课迟到了。so that\"为了”；since\"既然”；as if\"好像”；unless\"除非\"。","source":"original"},{"question":"The shops were closed ______ I didn't get any milk.","options":["so","but","or"],"answer":0,"explanation":"so表\"因果\"译为\"所以\"。","source":"original"},{"question":"I learned a little Russian ______ I was at middle school.","options":["though","although","as if","when"],"answer":3,"explanation":"考查时间状语从句连接词。句意为：当我读中学的时候，我学了一点俄语。A. though尽管；B. although尽管；C. as if好像；D. when当......时候。故选D。","source":"original"},{"question":"My hobby is swimming, ______ my favourite season is summer.","options":["so","but","if"],"answer":0,"explanation":"考查连词。根据句意，我的爱好是游泳，因此我最喜欢的季节是夏天。故该题答案为A。","source":"original"},{"question":"I like music ______ my brother likes video games.","options":["or","but","so"],"answer":1,"explanation":"考查连词。前后有转折，应该用but。","source":"original"},{"question":"You'll miss the train ______ you hurry up.","options":["unless","as","if","until"],"answer":0,"explanation":"考查条件状语从句连接词。句意为：你会错过火车的，除非你快点。A.unless除非；B.as因为；C.if如果；D.until直到。故选A。","source":"original"},{"question":"My grandpa is 67 years old, ______ he looks young.","options":["so","but","and","however"],"answer":1,"explanation":"考查连词。根据语境，我的爷爷67岁了，但是他看起来很年轻。前后是转折关系，并且为句内转折，故答案填but。A.so因此，表示因果关系；C.and并且，表示递进关系；D.however但是，同样表转折，但是是句间转折，并且是副词，不是连词。故答案选B。","source":"original"},{"question":"I'll let you know ______ he comes back.","options":["before","because","as soon as","although"],"answer":2,"explanation":"考查时间状语从句连接词。句意为：他一回来我就会让你知道的。A.before在...前；B.because因为；C.as soon as...就；D.although尽管。故选C。","source":"original"},{"question":"The children can't read ______ write.","options":["and","to","or"],"answer":2,"explanation":"考查连词 or 用于否定句和疑问句；and 用于肯定句。句意：那个孩子既不会阅读也不会写。否定句，故选 C。","source":"original"},{"question":"They went to the ocean park ______ they got up.","options":["before","after","when"],"answer":1,"explanation":"意义为他们起床后去了海洋公园。","source":"original"},{"question":"—______ does the car stop? —______ an old man is crossing the road.","options":["What; so","Why; Because","Why; So","What; because"],"answer":1,"explanation":"考查句意。根据回答可知此句是问原因，因此第一个空填Why后一个空回答用because。","source":"original"},{"question":"Which would you like, sir, tea ______ coffee?","options":["all","and","or"],"answer":2,"explanation":"选择疑问句用or。","source":"original"},{"question":"I like fish ______ I ______ like carrots.","options":["but; don't","but; doesn't","and; doesn't"],"answer":0,"explanation":"考查连词及助动词辨析。句意：我喜欢鱼肉，但我不喜欢胡萝卜。结合选项可知，前后句成转折关系。but为连词，意为“但是”，表示转折关系；and为连词，意为“和”，表示并列关系。故第一空应填but。该句主语是I，且该句有谓语动词like，故其否定形式为“don't+动词原形”。故选A。","source":"original"},{"question":"I don't like lemons ______ they are too sour.","options":["but","or","because"],"answer":2,"explanation":"why提问,because回答。","source":"original"},{"question":"I don't have any pens ______ pencils.","options":["and","or","too","also"],"answer":1,"explanation":"考查连词。根据否定句中表示和用or。句意：我没有钢笔和铅笔。故选：B。","source":"original"},{"question":"A: Is the school on your right ______ on your left? B: On my right.","options":["and","or","but"],"answer":1,"explanation":"考查连词。疑问句为选择疑问句，故答案为B。","source":"original"},{"question":"I like spring, ______ I like the beautiful flowers.","options":["why","to","because","for"],"answer":2,"explanation":"考查连词。我喜欢春天因为我喜欢漂亮的花。because表示原因。故答案为C。","source":"original"},{"question":"He ______ home ______ she was satisfied ______ his answer yesterday.","options":["didn't go; until; with","wasn't go; after to","doesn't go; before; with","didn't go; until, to"],"answer":0,"explanation":"考查连词。not ... until 直到才，be satisfied with 对...满足，昨天直到她满足他的答案他才回家，故答案选 A。","source":"original"},{"question":"Tom doesn't like spicy food ______ I don't like spicy food, either.","options":["and","or","so"],"answer":0,"explanation":"选 A。考查连词。根据题意 Tom 和我都不喜欢吃辣，连接两个并列的句子，故选 A。","source":"original"},{"question":"I live in Canada, ______ I'm not a Canadian.","options":["but","and","so","because"],"answer":0,"explanation":"考查连词，此处表示转折。句意：我住在加拿大，但我不是加拿大人。故选 A。","source":"original"},{"question":"I don't like singing ______ dancing. What about you? I don't like dancing ______ I like singing.","options":["or, and","and, but","or, but"],"answer":2,"explanation":"or 表“和”译为“和”用于否定句；but 表“转折”译为“但是”。","source":"original"},{"question":"Call a taxi, ______ you will miss the train.","options":["and","though","because","or"],"answer":3,"explanation":"考查连词。or意为\"否则\",句意为\"打个的吧,否则你会赶不上火车的\"。","source":"original"},{"question":"Is your art teacher tall ______ short?","options":["for","and","or"],"answer":2,"explanation":"考查疑问句。表示选择时用or或者,因此选C。","source":"original"},{"question":"I'd like to go with you, ______ I'm too busy.","options":["and","or","but","so"],"answer":2,"explanation":"考查连词。根据语境是前后表转折关系。我想跟你一起去,但是我太忙了。And表示并列,or表示选择,so表示因果,故选C。","source":"original"},{"question":"______ most of the earth's surface is covered by water, fresh water is very rare and precious.","options":["As","Once","If","Although"],"answer":3,"explanation":"考查让步状语从句连接词。句意为:尽管地球上大部分地方都被水覆盖,但是淡水是很稀少也很珍贵的。A. As像;B. Once一旦;C. If如果;D. Although尽管。故选D。","source":"original"},{"question":"Can you play basketball ______ ping-pong?","options":["and","or","but","with"],"answer":1,"explanation":"考查并列连词。你能打篮球还是乒乓球，对二者选择用的是or。故选B。","source":"original"},{"question":"My mother likes little animals ______ they are friendly and gentle.","options":["but","and","or","because"],"answer":3,"explanation":"考查连词。but，但是，表示转折；and，和，表示递进；or，否则；because，因为，表示因果。这里想要表达的是“我妈妈很喜欢小动物因为他们非常的友好和温和。”表示因果关系，故答案选D。","source":"original"},{"question":"I wanted to be a scientist ______ I was a little girl.","options":["after","before","since","when"],"answer":3,"explanation":"当我是小女孩的时候。","source":"original"},{"question":"______ we are old, we still work in the fields every day.","options":["Although","But","However","Because"],"answer":0,"explanation":"考查连词。...我们老，我们仍然每天在田里工作，根据句意可知A.although“尽管”符合意思，故答案选A。","source":"original"},{"question":"I like ______ because they can ______ mice.","options":["cats; catch","cat; catching","cat; catch"],"answer":0,"explanation":"like后加可复, they can后加动词原形。","source":"original"},{"question":"The sandwiches ______ very hot.","options":["is","am","are"],"answer":2,"explanation":"考查be动词。根据\"我是am,你是are,is跟着他她它,复数都用are\"可知答案为C。","source":"original"},{"question":"What ______ those? They ______ ducks.","options":["are; is","are; are","is; are"],"answer":1,"explanation":"考查主谓一致。those是that的复数,ducks名词复数,所以动词要用复数。故选B。","source":"original"},{"question":"I like ______ because they can ______ and they are ______.","options":["rabbits; hop; cute","rabbits; hopping; cute","rabbits; cute; hop"],"answer":0,"explanation":"like后加可复,they can+动词原形,they are+形容词。","source":"original"},{"question":"______ you Japanese? — Yes, ______.","options":["Is; I am","Are; I am not","Are; I am"],"answer":2,"explanation":"问句\"你是日本人吗？you的be动词用are搭配，疑问句将be动词提至句首，答语有Yes，应用肯定形式I am。","source":"original"},{"question":"I ______ a boy. My name ______ Tom. My friends ______ in the playground.","options":["am; is; are","are; am; is","am; are; is"],"answer":0,"explanation":"主谓一致。","source":"original"},{"question":"After he finished school, he ______ a bank manager in 1919.","options":["works as","worked","worked as"],"answer":2,"explanation":"考查动词。根据1999过去式，work as作为...而工作。故答案选C。","source":"original"},{"question":"Jack ______ get up late, but now he ______ getting up early.","options":["used to; is used to","used to; used to","is used to; used to","is used to; is used to"],"answer":0,"explanation":"考查动词固定搭配。根据句意，杰克过去经常起床晚，但是现在他习惯起早了。used to do sth 表示过去常常做某事，be used to doing sth 表示习惯做某事，故选A。","source":"original"},{"question":"The coat ______ be Lily's. She wears it very often.","options":["may","might","must"],"answer":2,"explanation":"must表示肯定推测。","source":"original"},{"question":"My mother is ______ a cake ______ my birthday.","options":["making; to","making; for","doing; to","doing; for"],"answer":1,"explanation":"考查时态，从题目My mother is a cake my birthday.中的is可知考的是现在进行时态。for表示“为了”，故选B。","source":"original"},{"question":"______ they ______ any children?","options":["Have; got","Has; got","Have; get"],"answer":0,"explanation":"have got表示拥有。","source":"original"},{"question":"Harry's been driving all day, he ______ be tired.","options":["need","can","shall","must"],"answer":3,"explanation":"考查情态动词must。前面说Harry已经开车一天了，后面说他一定很累。这里的must是表示肯定的猜测。","source":"original"},{"question":"Jane and Tom ______ my friends.","options":["am","is","are"],"answer":2,"explanation":"两人共同做主语，用are。","source":"original"},{"question":"Where ______ you from?","options":["is","do","are","be"],"answer":2,"explanation":"考查where引导的特殊疑问句。主谓一致，主语是you，谓语用are；where are you from表示问人来自哪里。","source":"original"},{"question":"______ this ______ car?","options":["Am; Italian","Is; Korea","Is; English"],"answer":2,"explanation":"根据this选择is，形容车应该用表国家的形容词English。","source":"original"},{"question":"—______ you like some beef? —Yes, please.","options":["Can","Would","Are"],"answer":1,"explanation":"Would you like...? 表示委婉请求。","source":"original"},{"question":"What would you like ______ dinner?","options":["for","of","in"],"answer":0,"explanation":"for dinner作为晚餐。","source":"original"},{"question":"Here you ______.","options":["am","is","are"],"answer":2,"explanation":"Here you are. 给你。","source":"original"},{"question":"We ______ some fish and rice.","options":["have","has","to have"],"answer":0,"explanation":"we have我们吃。","source":"original"},{"question":"Can I ______ some juice?","options":["have","has","like"],"answer":0,"explanation":"can+动词原形。","source":"original"},{"question":"My sister ______ (be) a student. She ______ (have) some good friends.","options":["is; has","are; have","am; has"],"answer":0,"explanation":"主语是单数，be用is，have用has。","source":"original"},{"question":"My father can ______ (drive) a car. He ______ (be) a good driver.","options":["drive; is","drives; is","driving; are"],"answer":0,"explanation":"can后加动词原形；he后用is。","source":"original"},{"question":"Eddie, ______ (close) the door, please. It's cold.","options":["close","closes","closing"],"answer":0,"explanation":"祈使句用动词原形。","source":"original"},{"question":"My brother likes ______ (ride) a bicycle in the park.","options":["ride","riding","to ride"],"answer":1,"explanation":"like doing sth. 喜欢做某事。","source":"original"},{"question":"Lucy ______ (walk) to school every day.","options":["walk","walks","walking"],"answer":1,"explanation":"主语三单，谓语加s。","source":"original"},{"question":"I ______ (be) a cook. I can ______ (cook) nice food.","options":["am; cook","is; cooks","be; cooking"],"answer":0,"explanation":"I am；can后加原形。","source":"original"},{"question":"Here ______ (be) some books.","options":["is","am","are"],"answer":2,"explanation":"books复数，用are。","source":"original"},{"question":"What can you do for the party, Chen Jie? I can ______. Wonderful. Let's dance together.","options":["draw cartoons","play the pipa","dance"],"answer":2,"explanation":"根据第三个一起跳舞可知,只有C符合要求。","source":"original"},{"question":"We ______ be quiet in the library.","options":["must","mustn't","don't"],"answer":0,"explanation":"考查情态动词, 句意: 我们在图书管里必须保持安静。A. 必须, B. 不许, 禁止, C. 不要。故选 A。","source":"original"},{"question":"She can clean the classroom. (改为否定句)","options":["She can't clean the classroom.","She doesn't clean the classroom.","Don't she clean the classroom."],"answer":0,"explanation":"含有情态动词can, 直接在情态动词后加not即可。","source":"original"},{"question":"Are there any apples on the tree? No, ______.","options":["they are","there aren't","are"],"answer":1,"explanation":"考查there be 句型的简略回答。句意: 一树上有一些苹果吗? 一不, 没有。there be 句型的一般疑问句, 否定回答用No, there aren't; 肯定回答用Yes, there are。故正确答案为B。","source":"original"},{"question":"What colour is it? It ______ red.","options":["was","is","are"],"answer":1,"explanation":"考查be动词的用法, 主语是It第三人称单数, be动词应该用is, 故选B。","source":"original"},{"question":"Kate ______ five hundred English words so far.","options":["has learned","learned","is learning","learns"],"answer":0,"explanation":"考查时态辨析。有标志性词so far可知：应为现在完成时have/has done。故选A。","source":"original"},{"question":"Sam ______ Chinese food very much.","options":["like","had like","likes"],"answer":2,"explanation":"考查主谓一致。Sam，第三人称单数，谓语动词使用第三人称单数。故答案为C。","source":"original"},{"question":"—______ she ______ home at six every day? —Yes.","options":["Is; leave","Does; leave","Does; left"],"answer":1,"explanation":"考查一般疑问句。根据she可知助动词是用does，加了助动词后，后面的动词用原形。故选B。","source":"original"},{"question":"May ______ for a walk after dinner every evening.","options":["go","goes","going"],"answer":1,"explanation":"考查一般现在时。主语为第三人称单数的情况，关键词May, every evening。故答案选B。","source":"original"},{"question":"Helen ______ early every day. But she ______ late this morning.","options":["gets up; was","get up; is","is getting up; was"],"answer":0,"explanation":"考查时态。根据时间标志词every day每天，可知此处应用一般现在时。故答案选A。","source":"original"},{"question":"______ your father ______ his car every Sunday?","options":["Does; wash","Do; wash","Is; washing"],"answer":0,"explanation":"通过every Sunday可以判断是经常性和习惯性发生的动作，应该用一般现在时。主语是your father，故应该用第三人称单数，所以答案为A项。","source":"original"},{"question":"How ______ Tom come to school? He often ______ by car.","options":["do; come","is; come","does; comes"],"answer":2,"explanation":"一般现在时，主语三单。","source":"original"},{"question":"Listen! Who ______ in the next room?","options":["sing","sings","singing","is singing"],"answer":3,"explanation":"考查动词时态。本题考查在何种情况下用进行时态，通常来说 Listen! Now, where is sb? 都可以成为判断时态的标志，看：听！之时，某人一定正在进行某个动作。Listen! 为一种提示，意为提示注意正在发生的动作或行为。","source":"original"},{"question":"He had a cold because he ______ wet clothes yesterday.","options":["wear","wore","wears"],"answer":1,"explanation":"考查时态。根据句末的yesterday，可知动词应用过去式，故选B。","source":"original"},{"question":"You ______ all the chores. You can go to play outside.","options":["have done","will do","do"],"answer":0,"explanation":"考查现在完成时。根据句意可知，这里要用完成时。have done sth.表示动作从过去发生持续到现在，对现在有一定影响。句意：你已经做完了全部的杂物。你能去外面玩了。故选：A。","source":"original"},{"question":"They often have a picnic.（用she改写句子）______ often ______ a picnic.","options":["She; have","She; has","She; having"],"answer":1,"explanation":"考查一般现在时。句意：她经常野餐。often为一般现在时的标志词，主语she为第三人称单数，谓语动词应用三单形式，have的三单形式为has，故填She；has。","source":"original"},{"question":"It ______ me about 15 minutes to get to school every day.","options":["takes","took","taking"],"answer":0,"explanation":"考查一般现在时。根据every day可知句子是一般现在时。故选A。","source":"original"},{"question":"The tiger ______ angry and he wanted to eat the monkey.","options":["is","was","were"],"answer":1,"explanation":"考查时态辨析。and连接两个简单句，前后两个简单句时态须一致。","source":"original"},{"question":"The bus is ______.","options":["come","coming","comes"],"answer":1,"explanation":"主语+be动词+动词的-ing形式。","source":"original"},{"question":"I ______ Space Museum in Moon Town before.","options":["have been","have been to","have gone to","have gone"],"answer":1,"explanation":"考查时态。指“去过”，用have been to。","source":"original"},{"question":"My aunt often ______ the old woman ______ clothes.","options":["help, wash","helps, wash","helps, washes"],"answer":1,"explanation":"考查动词help的固定搭配和一般现在时。根据my aunt可知后面谓语动词应用第三人称单数形式。且help sb. do sth.意为“帮助某人做某事”，故后面的动词要用动词原形。故答案选B。","source":"original"},{"question":"She ______ busy for three weeks.","options":["has be","has been","is","was"],"answer":1,"explanation":"本题考查现在完成时。","source":"original"},{"question":"—What ______ Miss Wang ______? —She's cooking.","options":["are; working","is; doing","does; do","are; doing"],"answer":1,"explanation":"考查动词时态和主谓一致。Miss Wang 一个人用be动词is，问某人正在做什么句型结构为What be sb doing？故答案选B。","source":"original"},{"question":"Bobby is rude, and he always ______ his friends.","options":["shout at","shouting at","shouts at"],"answer":2,"explanation":"考查动词词组。Shout at sb朝某人叫喊，这里always是一般现在时，所以注意he，第三人称单数的形式，故选C。","source":"original"},{"question":"We often ______ our grandparents at weekends.","options":["visit","visits","visiting"],"answer":0,"explanation":"句意：我们经常周末拜访我们的祖父母。visit sb.拜访某人，故填visit。","source":"original"},{"question":"They go to school every day.（改为一般疑问句）______ they go to school every day?","options":["Do","Does","Are"],"answer":0,"explanation":"考查疑问词。对动词提问应借用助动词do的相应形式，根据原句为一般现在时时态，故答案为：Do。","source":"original"},{"question":"Do they ______ apples?","options":["like","likes","to like"],"answer":0,"explanation":"此题考查Do/Does...like...?句型。主语为they，需要使用like。","source":"original"},{"question":"Lily ______ many English novels since she went to the middle school.","options":["read","reads","has read","is reading"],"answer":2,"explanation":"考查现在完成时。由标志词since可知：应用现在完成时have/has done。故选C。","source":"original"},{"question":"He usually ______ his homework at eight.","options":["finish","finishes","finishing"],"answer":1,"explanation":"考查动词形式。根据主语\"he\"可知动词用三单，故答案为finishes。","source":"original"},{"question":"______ the young girl ______ the old man clean his room every day? Yes, she does.","options":["Does, help","Has, helped","Did, help","Do, helps"],"answer":0,"explanation":"考查一般现在时。every day为一般现在时的时间标志词，故选A。","source":"original"},{"question":"Sally's mother usually ______ clothes in the morning.","options":["wash","washing","washes"],"answer":2,"explanation":"考查一般现在时。从标志词“usually”可知此题是一般现在时，主语Sally's mother是三单，后面动词也要用三单形式，故答案选C。","source":"original"},{"question":"I'm ______ him, but I can ______ nothing, because there is something wrong with my ______.","options":["seeing; look; eyes","listening to; hear; ears","hearing; listen; ears","listening to; hear; ears"],"answer":3,"explanation":"考查动词辨析。根据第一空表示动作听用listen to，但是没听到，表示听到的内容用hear，最后用耳朵ears来听。故答案选B。","source":"original"}]},{"levelName":"现在进行时","questions":[{"question":"Look! The boy ______ a kite.","options":["fly","flies","is flying","flew"],"answer":2,"explanation":"Look! 提示动作正在进行，用现在进行时。","source":"ai"},{"question":"I ______ my homework now.","options":["do","am doing","does","doing"],"answer":1,"explanation":"now 提示现在进行时，主语 I 用 am + doing。","source":"ai"},{"question":"She ______ a book at the moment.","options":["read","reads","is reading","reading"],"answer":2,"explanation":"at the moment 提示现在进行时，主语 She 用 is reading。","source":"ai"},{"question":"They ______ basketball in the playground.","options":["play","plays","are playing","playing"],"answer":2,"explanation":"描述正在进行的动作，主语 They 用 are playing。","source":"ai"},{"question":"Listen! The birds ______ in the tree.","options":["sing","sings","are singing","singing"],"answer":2,"explanation":"Listen! 提示动作正在发生，主语复数用 are singing。","source":"ai"},{"question":"My mother ______ dinner in the kitchen.","options":["cook","cooks","is cooking","cooking"],"answer":2,"explanation":"描述正在进行的动作，主语单数用 is cooking。","source":"ai"},{"question":"______ you ______ TV now?","options":["Do...watch","Are...watching","Is...watching","Does...watch"],"answer":1,"explanation":"now 提示现在进行时疑问句，主语 you 用 Are you watching。","source":"ai"},{"question":"He ______ not ______ to music right now.","options":["is...listen","is...listening","does...listen","do...listening"],"answer":1,"explanation":"right now 提示现在进行时否定句，主语 He 用 is not listening。","source":"ai"},{"question":"The dog ______ after the cat.","options":["run","runs","is running","running"],"answer":2,"explanation":"描述正在进行的动作，run 双写 n 加 -ing。","source":"ai"},{"question":"We ______ an English class now.","options":["have","has","are having","having"],"answer":2,"explanation":"now 提示现在进行时，主语 We 用 are having。","source":"ai"},{"question":"Be quiet! The baby ______.","options":["sleep","sleeps","is sleeping","sleeping"],"answer":2,"explanation":"Be quiet! 提示动作正在进行，is sleeping。","source":"ai"},{"question":"It ______ outside. Take an umbrella.","options":["rain","rains","is raining","raining"],"answer":2,"explanation":"描述正在下雨，用 is raining。","source":"ai"},{"question":"______ she ______ a letter to her friend?","options":["Is...writing","Does...write","Do...write","Are...writing"],"answer":0,"explanation":"现在进行时疑问句：Is + 主语单数 + writing。","source":"ai"},{"question":"The children ______ in the garden.","options":["play","plays","are playing","playing"],"answer":2,"explanation":"描述正在进行的动作，主语复数用 are playing。","source":"ai"},{"question":"I ______ not ______ to the teacher.","options":["am...listen","am...listening","do...listen","is...listening"],"answer":1,"explanation":"现在进行时否定句，主语 I 用 am not listening。","source":"ai"},{"question":"Look at the picture. The man ______.","options":["swim","swims","is swimming","swimming"],"answer":2,"explanation":"Look at... 提示动作正在进行，swim 双写 英语课，用现在进行时，选A。","source":"original"},{"question":"Listen! The children ______ in the music room.","options":["sing","sings","are singing"],"answer":2,"explanation":"考查现在进行时。注意句子开头“listen”标志词，可知是现在进行时结构是be(am,is,are)+doing。故答案选C。","source":"original"},{"question":"She is ______ now. She can ______ well.","options":["dance; dancing","dancing; dance","dancing; dances"],"answer":1,"explanation":"考查现在进行时和情态动词。第一句表示“她现在正在跳舞”，故应为is dancing；第二句表示“她能跳得很好”，情态动词后用动词原形，即dance。故答案为B。","source":"original"},{"question":"What are those men doing?","options":["They were very happy.","They are planting trees.","He is cutting grass."],"answer":1,"explanation":"考查动词时态。句意：—那些男人们正在做什么？由问句可知问的是正在进行的动作，应用现在进行时。又，问句中为复数人称those men，答句也应用复数人称代词。故答案选B。","source":"original"},{"question":"Look! The boys ______ on the playground.","options":["run","running","runs","ran"],"answer":1,"explanation":"考察现在进行时，be+doing结构。","source":"original"},{"question":"My parents ______ me to Beijing last weekend.","options":["are visiting","visit","visited"],"answer":2,"explanation":"由last weekend（上周末）可知，其谓语动词应使用过去式。A选项表示现在进行时，B选项表示一般现在时，故选C。","source":"original"},{"question":"Koko ______ bananas, but now she ______ a banana.","options":["doesn't like; eats","don't like; is eating","doesn't like; is eating"],"answer":2,"explanation":"第一空表示某人的性格和喜好，用一般现在时，主语是Koko，是第三人称且为单数，故应用doesn't like。第二空通过now可以判断是正在发生的动作，应该用现在进行时。综上，答案应该为C项。","source":"original"},{"question":"Be quiet! The babies ______.","options":["sleep","are sleeping","slept"],"answer":1,"explanation":"考查现在进行时，安静，婴儿们在睡觉呢，表示目前正在进行的动作。故选B。","source":"original"},{"question":"Does Ben often ______ his mother do housework? Yes. Look! He ______ the table.","options":["helps; clean","help; cleaning","help; cleans"],"answer":1,"explanation":"考查动词时态。句意：一本经常帮他妈妈做家务吗？一是的，你看！他正在擦桌子呢。第一空，根据does可知是一般现在时，三单由does承担，空格处填动词原形；第二空，根据look可知此处使用现在进行时，用be doing结构；故选B。","source":"original"},{"question":"I am ______ my favourite film on TV.","options":["watch","watching","watches"],"answer":1,"explanation":"考查现在进行时。根据I am提示可知用现在进行时，选择B。","source":"original"}]},{"levelName":"一般过去时","questions":[{"question":"I ______ to the zoo yesterday.","options":["go","goes","went","going"],"answer":2,"explanation":"yesterday 提示过去时，go 的过去式是 went（不规则变化）。","source":"ai"},{"question":"She ______ her homework last night.","options":["finish","finishes","finished","finishing"],"answer":2,"explanation":"last night 提示过去时，finish 的过去式加 -ed。","source":"ai"},{"question":"They ______ a movie last weekend.","options":["watch","watches","watched","watching"],"answer":2,"explanation":"last weekend 提示过去时，watch 的过去式加 -ed。","source":"ai"},{"question":"He ______ born in 2014.","options":["is","was","were","be"],"answer":1,"explanation":"过去的事情用过去时，主语 He 单数用 was。","source":"ai"},{"question":"We ______ very happy at the party.","options":["is","was","were","be"],"answer":2,"explanation":"过去的事情用过去时，主语 We 复数用 were。","source":"ai"},{"question":"My mother ______ me a story last night.","options":["tell","tells","told","telling"],"answer":2,"explanation":"last night 提示过去时，tell 的过去式是 told。","source":"ai"},{"question":"______ you ______ to school yesterday?","options":["Do...go","Did...went","Did...go","Does...go"],"answer":2,"explanation":"过去时疑问句用助动词 Did，后面动词用原形 go。","source":"ai"},{"question":"She ______ not ______ to the party.","options":["did...went","did...go","does...go","was...go"],"answer":1,"explanation":"过去时否定句用 did not + 动词原形。","source":"ai"},{"question":"I ______ an apple this morning.","options":["eat","eats","ate","eating"],"answer":2,"explanation":"this morning 提示过去时，eat 的过去式是 ate。","source":"ai"},{"question":"The cat ______ a mouse yesterday.","options":["catch","catches","caught","catching"],"answer":2,"explanation":"yesterday 提示过去时，catch 的过去式是 caught。","source":"ai"},{"question":"______ there many people at the concert?","options":["Is","Was","Were","Are"],"answer":2,"explanation":"过去时疑问句，主语复数用 Were there。","source":"ai"},{"question":"My father ______ a new car last month.","options":["buy","buys","bought","buying"],"answer":2,"explanation":"last month 提示过去时，buy 的过去式是 bought。","source":"ai"},{"question":"She ______ her keys on the table.","options":["put","puts","putted","putting"],"answer":0,"explanation":"put 的过去式和原形相同，都是 put。","source":"ai"},{"question":"The children ______ in the park all day.","options":["play","plays","played","playing"],"answer":2,"explanation":"描述过去的事情，play 的过去式加 -ed。","source":"ai"},{"question":"I ______ not at home yesterday.","options":["am","is","was","were"],"answer":2,"explanation":"yesterday 提示过去时，主语 I 过去时用 was。","source":"ai"},{"question":"He ______ to Beijing last summer.","options":["travel","travels","traveled","traveling"],"answer":2,"explanation":"last summer 提示过去时，travel 的过去式加 -ed。","source":"ai"},{"question":"______ she ______ the exam?","options":["Did...passed","Did...pass","Does...pass","Was...pass"],"answer":1,"explanation":"过去时疑问句，Did + 主语 + 动词原形。","source":"ai"},{"question":"We ______ a great time at the beach.","options":["have","has","had","having"],"answer":2,"explanation":"描述过去的事情，have 的过去式是 had。","source":"ai"},{"question":"The students ______ not ______ the answer.","options":["did...knew","did...know","do...know","were...know"],"answer":1,"explanation":"过去时否定句，did not + 动词原形 know。","source":"ai"},{"question":"I ______ my first English teacher, Miss Li.","options":["remember","remembers","remembered","remembering"],"answer":2,"explanation":"描述过去的事情，remember 的过去式加 -ed。","source":"ai"},{"question":"We ______ a great time at the party last night.","options":["have","has","had","having"],"answer":2,"explanation":"last night 提示过去时，have 的过去式是 had。","source":"original"},{"question":"______ you ______ the movie yesterday?","options":["Did...saw","Did...see","Do...see","Were...see"],"answer":1,"explanation":"过去时疑问句，Did + 主语 + 动词原形 see。","source":"original"},{"question":"She ______ not at school last Monday.","options":["is","was","were","did"],"answer":1,"explanation":"last Monday 提示 ":"考查名词辨析。根据\"Wet Floor\"为标示语可知排除C和D选项；又根据mean可知前名词应为复数形式，所以应选择signs。句意：墙上的标示语意思是\"小心地滑！\"故选B。","source":"original"},{"question":"My mum is cooking in the ______. She is cooking fish and tofu.","options":["living room","kitchen","bathroom"],"answer":1,"explanation":"考查名词辨析。A.living room起居室，B.kitchen厨房，C.bathroom浴室。根据前面\"cooking做饭\"及句意\"我的妈妈正在厨房做饭，她正在做鱼和豆腐\"。故选：B。","source":"original"},{"question":"Who's the woman with ______ hair? She's my ______.","options":["long; brother","short; uncle","short; aunt"],"answer":2,"explanation":"考查形容词和名词。句意：短头发那个女人是谁？她是我的阿姨。A.长的；哥哥B.短的；舅舅C.短的；阿姨根据句意可知是询问的短发女人是谁，不可能是哥哥和舅舅，所以排除AB选项，故选C。","source":"original"},{"question":"I have two long ______ and two big ______.","options":["feet; leg","legs; foot","legs; feet"],"answer":2,"explanation":"考查名词复数。句意：我有两条长腿和两只大脚。leg和foot都是可数名词，前面有two，用复数形式。leg的复数是legs，foot的复数是feet。","source":"original"},{"question":"Shanghai is a famous ______.","options":["country","city","street"],"answer":1,"explanation":"考查名词辨析。句意：上海是个著名的城市。A.country国家；B.city城市；C.street街道。根据前面“Shanghai上海”属于市，故选B。","source":"original"},{"question":"Can I help you? Please show me the ______. It's ______ today.","options":["raincoat; sunny","sweater; snowy","T-shirt; cold"],"answer":1,"explanation":"考查名词和形容词。将A、B、C三项代入原句。A项请给我雨衣，今天是晴天。B项请给我毛衣。今天下雪了。C项请给我T恤，今天很冷。只有B项符合逻辑。故答案为：B。","source":"original"},{"question":"I have ______ orange and some ______.","options":["a; peach","an; peaches","an; peaches","a; peaches"],"answer":1,"explanation":"考查不定冠词和名词的数。根据orange橘子，以元音/ɒ/开头，可知第一空须用an，排除C、D选项；又根据peach桃子，为可数名词，some修饰可数名词的复数，以ch结尾的名词在变为复数时须加es，可知第二空为peaches，排除C选项，故答案选B。","source":"original"},{"question":"This is our Chinese teacher. Her ______ are so big.","options":["nose","mouth","eyes"],"answer":2,"explanation":"考查名词。句意是这是我们的语文老师。根据空白处后面的be动词是复数形式are可知前面的名词应该使用复数形式eyes，句意是她的眼睛非常大。故选：C。","source":"original"},{"question":"—Who is the ______ of our school? —Mr. Doing is.","options":["leading","leader","lead"],"answer":1,"explanation":"考查词义辨析。根据回答可知，问句缺少的是主语，此处应填一个名词。A. leading，形容词，领先的；B. leader，名词，领导；C. lead，动词，率领。句意：——谁是我们学校的领导？—Mr. Dong 是学校领导。故选 B。","source":"original"},{"question":"These are not my drinks. They are my two ______.","options":["brothers","brother's","brothers'","Brother"],"answer":2,"explanation":"考查名词所有格。two brothers是复数形式，且以s结尾，所以直接在复数形式后加'。故答案选C。","source":"original"},{"question":"My brother and I both like ______. He likes volleyball and I like badminton.","options":["sport","books","animals"],"answer":0,"explanation":"考查名词辨析。A. sport 运动；B. books 书；C. animals 动物。根据后面“He likes volleyball and I like badminton. 他喜欢排球，我喜欢羽毛球。”，排球和羽毛球都属于运动器材，再结合句意“我的哥哥和我都喜欢运动，他喜欢排球，我喜欢羽毛球”。故选：A。","source":"original"},{"question":"Mother's day is on the ______ Sunday in ______.","options":["second; May","third; May","third; June"],"answer":0,"explanation":"考查常识。句意：母亲节在五月的第二个星期日。根据常识可知母亲节在每年五月的第二个星期日，second意为第二，third意为第三，May意为五月，June意为六月，故B，C均错误，故选：A。","source":"original"},{"question":"The rabbit has four ______.","options":["foot","foots","feet"],"answer":2,"explanation":"考查名词复数。句意：兔子有四只脚。根据数词four的提示可知使用复数形式；foot，名词，“脚”，其复数形式为feet。故答案为：feet。","source":"original"},{"question":"I'm in my ______. I'm washing my hair.","options":["bathroom","bedroom","living room"],"answer":0,"explanation":"考查常识和名词辨析。根据常识可知，洗头应该在浴室里。句意：我在我的浴室里。我正在洗头。bathroom，浴室，厕所，盥洗室。bedroom，卧室。故答案为：bathroom。","source":"original"},{"question":"Don't play too many ______. It's bad for your eyes.","options":["computer game","computer games","computers game"],"answer":1,"explanation":"考查单词拼写和名词。too many，太多的，修饰可数名词；computer game，电脑游戏，其复数形式为computer games；句意：不要玩太多的电脑游戏。它对你的眼睛不好。故答案为：computer games.","source":"original"},{"question":"The ______ are eating grass on the hill now.","options":["sheep","sheeps","sheepes"],"answer":0,"explanation":"考查名词。结合图片提示，羊的英文为sheep，其次sheep是单复数同型。句意：这些绵羊现在正在山丘上吃草。故答案为sheep。","source":"original"},{"question":"These are my ______.","options":["friend","friends","a friend"],"answer":1,"explanation":"考查可数名词的复数形式。frien
