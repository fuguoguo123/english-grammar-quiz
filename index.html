ns":["bottle","bottles","bottle's"],"answer":0,"explanation":"考查可数名词单数。a bottle of...一瓶。","source":"original"},{"question":"The ______ is mine.","options":["bag","bags","bag's"],"answer":0,"explanation":"考查可数名词单数。the bag这个包。","source":"original"},{"question":"There are many ______ in the classroom.","options":["student","students","student's"],"answer":1,"explanation":"考查名词复数。many修饰可数名词复数。","source":"original"},{"question":"He ate a ______ of chips.","options":["bag","bags","bag's"],"answer":0,"explanation":"考查可数名词单数。a bag of...一袋。","source":"original"},{"question":"She has a beautiful ______.","options":["voice","voices","voice's"],"answer":0,"explanation":"考查可数名词单数。a beautiful voice一个美丽的声音。","source":"original"},{"question":"I need a ______ of paper.","options":["piece","pieces","piece's"],"answer":0,"explanation":"考查可数名词单数。a piece of...一张。","source":"original"},{"question":"The ______ are sleeping.","options":["baby","babys","babies"],"answer":2,"explanation":"考查名词复数。baby以辅音+y结尾，变y为i加es。","source":"original"},{"question":"My son is ______. Today is his ______ birthday.","options":["twelve; twelfth","twelve; twelve","twelfth; twelve","twelfth; twelfth"],"answer":0,"explanation":"考查基数词和序数词，区分12岁twelve和第12个twelfth。故选A。","source":"original"},{"question":"There are ______ months in a year, and September is the ______ month.","options":["twelve; nineth","twelfth; nineth","twelve; ninth","twelfth; ninth"],"answer":2,"explanation":"考查数词。根据句意，在一年有12个月，九月是第九个月份。第一空需要用基数词，第二空用序数词，nine的序数词为ninth，故答案为C。","source":"original"},{"question":"What time is it? (8:40)","options":["It is twenty to eight","It is twenty to nine","It is forty to eight","It is eight to forty"],"answer":1,"explanation":"A: 7:40; C 只有时刻是大于30分钟的时候, 才能用to; D 意思是差8分钟到40点, 表达错误。故答案为B。","source":"original"},{"question":"Their English teacher is teaching them ______ lesson.","options":["first","the first","one","the one"],"answer":1,"explanation":"考查数词。他们的英语老师正在教他们第一课。选择序数词first表示第一, 加定冠词the表示特指, 选B。","source":"original"},{"question":"How to say 6:35 in English?","options":["Twenty five to six.","Twenty-five to seven.","Thirty five to six.","Thirty five to seven."],"answer":1,"explanation":"考查时间的表达。几点差几分用...to...的固定结构。","source":"original"},{"question":"Turn to page ______ and look at the ______ picture.","options":["twenty-third; second","twenty-three; second","twenty-three; two"],"answer":1,"explanation":"此题考查基数词和序数词。句意为打开23页看第2张图片，page twenty- three是用基数词加在名词后来表示第23页，the second picture是用序数词加在名词前来表示第几，所以答案选B。","source":"original"},{"question":"The boy is only ______ and today is his ______ birthday.","options":["nine; nine","ninth; nine","nine; ninth","ninth; ninth"],"answer":2,"explanation":"某人多少岁直接用基数词，九是nine。某人的第几个生日用的是序数词，第九是ninth。","source":"original"},{"question":"How much is this CD player? ______ dollars.","options":["Two hundreds","Two-hundreds","Two hundred"],"answer":2,"explanation":"考查数词。200应该为two hundred。","source":"original"},{"question":"______ students watch this film.","options":["Hundreds of","Hundred","Hundred of"],"answer":0,"explanation":"hundreds of表示成百上千的。","source":"original"},{"question":"What time is it? It's 6:45.","options":["six forty","a quarter to six","a quarter to seven"],"answer":2,"explanation":"A 6:40; B 5:45。","source":"original"},{"question":"______ of people were homeless after the storm.","options":["Hundred","Hundreds","Two hundred","Two hundreds"],"answer":1,"explanation":"确数用法 one hundred / two hundred...，表示几百；概数用法 hundreds of，表示数以百计的。","source":"original"},{"question":"She went to the bookstore and bought ______.","options":["dozen books","dozens books","dozen of books","dozens of books"],"answer":3,"explanation":"考查数词。根据句意，她去书店买了很多书，dozens of+可数名词复数，表示很多...，故答案为D。","source":"original"},{"question":"—How many plates? —______.","options":["Fine, thanks.","Four.","I'd like some cake."],"answer":1,"explanation":"问数量用数字回答。","source":"original"},{"question":"There are hundreds of teachers in our school and ______ of them are ______ teachers.","options":["three hundreds, woman","three hundred, woman","three hundreds, women","three hundred, women"],"answer":3,"explanation":"考查数词和名词。表示具体几百的数量，为基数词加hundred，其中hundred不能加s；复合名词woman teacher变成复数时两个名词都要变。故答案选D。","source":"original"},{"question":"How many books are there on your bookshelf? — About ______.","options":["one hundreds five","one hundred five","one hundred and five","one hundred fives"],"answer":2,"explanation":"考查数词。句意：你的书架上有多少本书？大约一百零五本。英语中表达几百零几：基数词 + hundred + and + 基数词。因此选C项。","source":"original"},{"question":"Does the movie begin at 8:30? — Yes. It's ______ now. We still have twenty minutes.","options":["ten eight","ten to eight","ten past eight","ten to nine"],"answer":2,"explanation":"考查数词里面的时刻逆读法。因为距离8点30还有20分钟，所以现在应该是8点10分，故答案选C。","source":"original"},{"question":"How old is this tree? — It's ______ years old.","options":["three hundreds","third hundred","three hundred"],"answer":2,"explanation":"考查数词,300用\"three hundred\"。","source":"original"},{"question":"It's 7:45. It is ______.","options":["a quarter to eight","a quarter past eight","a quarter on eight"],"answer":0,"explanation":"考查时间表达法。7:45可以用a quarter to eight或seven forty- five, fifteen to eight表示。故答案选A。","source":"original"},{"question":"There are ______ seconds in a minute.","options":["six","sixteen","sixty","sixth"],"answer":2,"explanation":"考查数词,根据句意一分钟有60秒。因此选择sixty。A、B、C都是基数词。six\"六\";sixteen\"十六\";D是序数词,sixty\"第六\"。故选C。","source":"original"},{"question":"How much ______ these clothes? They're ______.","options":["are; ninety","is; ninety yuan","are; ninety yuan"],"answer":2,"explanation":"考查数词。这些衣服多少钱?他们是九十块钱。衣服是复数用are,九十元用数词,故选C。","source":"original"},{"question":"eight - five = ( )","options":["two","three","four","five"],"answer":1,"explanation":"考查数量词1-10, 熟记这些数量词即可。","source":"original"},{"question":"She has nine ______ yuan. What about you?","options":["hundreds","hundred","hundreds of"],"answer":1,"explanation":"考查数词的用法。九百, hundred有数字无s, 有of有s。故选B。","source":"original"},{"question":"—How old are you? —I'm ______ old.","options":["six","six year","six years"],"answer":2,"explanation":"考查固定搭配。句意: 一你多大了? 一我六岁了。数词+year(s)old意为\"......岁\", 选项中数词均为six(六), 所以year需要使用复数形式years。故答案为:C。","source":"original"},{"question":"The next two numbers after thirty- nine are ______.","options":["forty and forty-one","thirty-nine and forty","thirty-eight and thirty-seven","forty, forty-two"],"answer":0,"explanation":"考查数词。句意: 39之后的两个数字分别是40和41。选择A。","source":"original"},{"question":"There are ______ months in a year.","options":["twelve","ten","thirteen"],"answer":0,"explanation":"常识，一年12个月。","source":"original"},{"question":"There are ______ days in a week.","options":["7th","seventh","seven"],"answer":2,"explanation":"句意:一周有七天。\"七\"是基数词。故答案为C。","source":"original"},{"question":"The teacher wanted us to write a ______ article.","options":["five-hundred-words","five-hundreds-word","five-hundred-word","five-hundreds-words"],"answer":2,"explanation":"考查复合形容词。根据句意老师要求我们写一篇五百字的文章。带连字符的名词不加s,故答案为C。","source":"original"},{"question":"The students have ______.","options":["three hundreds book","three hundred books","three hundreds books","three hundreds'book"],"answer":1,"explanation":"考查数词。hundreds of成百上千,具体的几百hundred后面不加s。故选B。","source":"original"},{"question":"—Excuse me, how many students are there in your art club? —There are ______.","options":["twelve","twelfth","the twelfth","twentieth"],"answer":0,"explanation":"考查基数词和复数词。How many是对数字提问，问有多少，回答要用基数词回答，并且不需要任何定冠词修饰，因此选A。","source":"original"},{"question":"There are ______ days in April, and today is the ______ day.","options":["three; third","thirty; thirtieth","thirtieth; thirty"],"answer":1,"explanation":"考查基数词和序数词辨析。句意：四月有三十天，今天是第三十天。结合常识可知，四月有三十天。根据前半句中的be动词are和复数名词days可知，第一空应填基数词“thirty”，表示“三十天”。根据后半句中的冠词the和单数名词day可知，第二空应填序数词“thirtieth”，表示“第三十天”。故选B。","source":"original"},{"question":"There are six ______ students in that school.","options":["hundred","hundreds","hundreds of","hundred of"],"answer":0,"explanation":"考查数词。在“百”这个数字单位前有具体的数字，所以只能选择hundred。若没有具体数字才会在数字单位后既加s，也用of。","source":"original"},{"question":"______ people watched Beijing Olympic Games on TV in 2008.","options":["Thousand of","Thousands of","Thousands","/"],"answer":1,"explanation":"考查数词辨析。thousand这类词，前无实数，应变复数并且后面加of。thousands of成千上万的。所以选择B。","source":"original"},{"question":"The school has eight ______ students.","options":["hundred","hundreds","hundred of","hundreds of"],"answer":0,"explanation":"具体数字+ hundred。","source":"original"},{"question":"There are ______ days in a year.","options":["three hundred and sixty five","three hundred and sixty-five","three hundreds and sixty five","three hundreds and sixty-five"],"answer":1,"explanation":"考查基数词的用法。句意\"一年有365天\"。百位数字与十位数字之间应使用and连接,十位数字与各位数字之间应使用- 连接,表达具体的数目时, hundred后不加s。故答案为B。","source":"original"},{"question":"What time is it? A quarter to eleven.","options":["10:45","11:15","11:00"],"answer":0,"explanation":"考查时间表达法。句意为:一现在几点了?一10:45。数字 + to + 数字常表示,差几分钟几点。故答案为A。","source":"original"},{"question":"How do you say the year \"1809\"?","options":["One eight O nine.","One thousand eight hundred and nineteen","Eighteen O nine.","One thousand eighty-nine."],"answer":2,"explanation":"考查数词年份表达,根据。可知年份分两两读法Eighteen O nine,故答案选C。","source":"original"},{"question":"About ______ of the workers in the factory were born in the ______.","options":["two thirds; 1970","two thirds; 1970s","two third; 1970","two third; 1970s"],"answer":1,"explanation":"考查数词。根据句意，在这个工厂里面大约有三分之二的工人出生在20世纪70年代，表达分数时，分子大于1时，分母要用复数形式，三分之二表达为two thirds，表示世纪和年代时，用in the + 年份s，故答案为B。","source":"original"},{"question":"Each of us has to write a ______ report every two weeks.","options":["two-hundred-word","two-hundreds-word","two-hundreds-words","two-hundred-words"],"answer":0,"explanation":"考查形容词。根据句意，我们每个人隔两周都不得不写一篇200字的报道，用连字符连接起来的名词，需要用单数的形式，故答案为A。","source":"original"},{"question":"Go straight ahead and take ______ right.","options":["second","third","the second"],"answer":2,"explanation":"考查序数词。序数词在表示顺序时前面需用定冠词the。此题是说直走，然后在第二个路口右转。故答案选C。","source":"original"},{"question":"I live on ______ floor.","options":["the five","the fiveth","the fifth"],"answer":2,"explanation":"五楼表示第五层，应使用序数词the fifth，故选C。","source":"original"},{"question":"There are ______ months in a year. The ______ month is December.","options":["twelve, twelve","twelfth, twelve","twelve, twelfth"],"answer":2,"explanation":"考查数词。数词有基数词和序数词，基数词表示数量多少，序数词表示顺序，12个月，第12个月，故答案选C。","source":"original"},{"question":"你想告诉妈妈你的书包在二楼，你会说：","options":["My schoolbag is on the second floor.","My schoolbag is on two floors."],"answer":0,"explanation":"二楼用the second floor。","source":"original"},{"question":"To many foreigners, Guangzhou is becoming their ______ hometown.","options":["two","second","the second","the two"],"answer":1,"explanation":"考查数词。句意为“对很多外国人来说，广州渐渐的变成他们的第二故乡”，所以应该用序数词，又因为前面有物主代词her，所以不用the，故答案为B。","source":"original"},{"question":"This is Jerry's ______ birthday. I want to buy him a present.","options":["twelve","twelfths","twelfth","twelfth"],"answer":2,"explanation":"考查序数词。根据句意：这是杰瑞的第十二个生日。第十二个应该用twelve的序数词，把ve变成f再加th。故选D。","source":"original"},{"question":"______ month is September.","options":["Nine","The nine","Ninth","The ninth"],"answer":3,"explanation":"由句意“第九个月是九月”可知，此处用序数词，故选D。","source":"original"},{"question":"Kylie lives on the ______ floor.","options":["four","fourth","fourteen","forty"],"answer":1,"explanation":"考查序数词，第四层楼。","source":"original"},{"question":"The art room is on the ______ floor.","options":["two","second","one"],"answer":1,"explanation":"\"在第二层\"要用序数词，故选B。","source":"original"},{"question":"Today is my grandpa's ______ birthday.","options":["seventy","seventieth","the seventieth","seventeenth"],"answer":1,"explanation":"第70岁生日，选B。","source":"original"},{"question":"In ______ on ______ floor.","options":["Room 303; the two","303 Room; two","Room 303; the second","303 Room; second"],"answer":2,"explanation":"本题考查专有名词及序数词。根据题干：表达在哪一个房间用room，大写第一个字母，后面跟基数词；而表示在几楼用序数词表示，前面要加定冠词the。故选：C。","source":"original"},{"question":"The teachers' office is on ______ floor.","options":["one","second","the second"],"answer":2,"explanation":"考查序数词。根据句意，教师办公室在二楼。on the+序数词+floor在几楼。故答案选C。","source":"original"},{"question":"The building has ______ floors and I live on the ______ floor.","options":["twenty-first; eighth","twenty-one; eighth","twenty-one; eight","twenty-first; eight"],"answer":1,"explanation":"考查基数词与序数词。根据句意这个楼有21层，我住在8层。故答案选B。","source":"original"},{"question":"How many friends will come to your ______ birthday party?","options":["fifteen","the fifteenth","fifteenth","fifteens"],"answer":2,"explanation":"考查数词辨析。根据语境“你有多少个朋友去你的...生日派对，这里应要表达第十五个。再根据前面有your，所以这里的序数词不能加the.故答案选C。","source":"original"},{"question":"September is ______ of the year.","options":["the ninth month","the ninth month","ninth month","ninth month"],"answer":0,"explanation":"考查序数词辨析。根据九月是一年的第九个月份, 所以选the ninth, 前面有定冠词。故答案选A。","source":"original"},{"question":"How can I ______ to your school? Turn left at the ______ traffic lights.","options":["get; second","get; two","gets; second"],"answer":0,"explanation":"第一个空, get 情态动词后面要用动词原形, 所以用get。第二个空, second, 表示在第二个交通灯处左拐, 要用序数词second。","source":"original"},{"question":"Can you tell me the way to the museum? Walk along this street, turn right at ______ crossing.","options":["the third","three","third"],"answer":0,"explanation":"序数词前加the。","source":"original"},{"question":"Today is my father's ______ birthday.","options":["fourth","fourteenth","fortieth","forty"],"answer":2,"explanation":"考查数词中的序数词解析。从题意可知这是爸爸的生日，应该是选40比14准确，所以排除AB，又因为是爸爸的第40个生日，所以用序数词，故答案选C。","source":"original"},{"question":"In the UK I live on the ground floor, but in the US, it is called the ______ floor.","options":["first","second","one","underground"],"answer":0,"explanation":"考查常识。在英国，第一层叫做ground floor，而在美国叫做the first floor。故选：A。","source":"original"},{"question":"There is a wrong word in Line ______. Where? In the ______ line.","options":["Two, two","Two, second","Second, two","Second, second"],"answer":1,"explanation":"考查数词运用。序号的两种表达方式：放在名词后用基数词，且名词和基数词都要首字母大写；在名词前用序数词，表示第几个。故答案选B。","source":"original"},{"question":"How old is your daughter? She is ______. We had a special party for her ______ birthday last week.","options":["nine; ninth","nine; ninth","ninth; nine","ninth; nine"],"answer":0,"explanation":"考查数词。回答几岁应用基数词，第几个生日应用序数词，故答案选A。","source":"original"},{"question":"— About ______ of the students in our class were born under the Year Horse. — Oh, that is to say they were born in ______.","options":["four-fifths; 2002","four-fifths; the 2000s","four-fifth; the 2000s","four-fifth; 2002"],"answer":0,"explanation":"考查数词。分数表示形式为分子用基数词,分母用序数词,当分子超过1,分母加s;具体某一年表达形式为in 2002,加上s表示某年代。故答案选A。","source":"original"},{"question":"February is the ______ month of the year.","options":["first","second","third","fourth"],"answer":1,"explanation":"考查常识。四个选项意思分别是第一、第二、第三、第四。根据句意:二月是一年中第二个月份。所以选B。","source":"original"},{"question":"Today is my sister's ______ birthday.","options":["twenty","twentieth","twentyth"],"answer":1,"explanation":"序数词表示第几个生日。","source":"original"},{"question":"There are so many new words in the ______ lesson.","options":["twenty-one","twentieth-first","twenty-first"],"answer":2,"explanation":"考查序数词。二十以上的两位数变序数词时,只变个位数。故答案为C。","source":"original"},{"question":"—Which room are you living in? —In ______ on ______ floor.","options":["Room 303; the two","303 Room; two","Room 303; the second","303 Room; second"],"answer":2,"explanation":"考查基数词和序数词。当用基数词表示房间号时,基数词放在名词之后,而且前面的名词首字母要大写;the+序数词,表示\"第几\",第几楼层,要用序数词;句意:一你住在哪个房间？—在第二层的303房间。故选C。","source":"original"},{"question":"I live on the second floor and Tom lives on the ______ floor.","options":["nine","ninth","nineth"],"answer":1,"explanation":"考查序数词。句意：我住在第二层，Tom住在第九层。根据and连接并列结构，其前面为on the second floor，可知后面为on the ninth floor，故答案为ninth。","source":"original"},{"question":"Where is Class ______? It's on the ______ floor.","options":["Six; third","Sixth; third","Six; three","Sixth; three"],"answer":0,"explanation":"考查数词辨析。Class Six, the third floor = Floor Three，故选A。","source":"original"},{"question":"This is the ______ time in ______ days that he has made the same mistake.","options":["second; three","two; three","two; third","second; third"],"answer":0,"explanation":"考查基数词和序数词的用法。表示数目多少的数词叫基数词，表示顺序多少用序数词。句意：这是他在三天时间里，犯的第二次同样的错误。故选A。","source":"original"},{"question":"There are ______ months in a year. The ______ month of a year is December.","options":["twelve; twelve","twelfth; twelfth","twelfth; twelve","twelve; twelfth"],"answer":3,"explanation":"考查数词。根据常识知一年有12个月。第12个月应用序数词。","source":"original"},{"question":"My home is on ______ floor.","options":["five","fifth","the fifth"],"answer":2,"explanation":"在几楼, 用序数词且序数词前加the。故选C。","source":"original"},{"question":"—When's your birthday? —It's on the ______ of October.","options":["thirty-first","thirty first","thirty-one"],"answer":0,"explanation":"考察序数词的写法。句意: 你生日是哪一天? 在10月的第31天。只有A才是第31的正确写法。故选A。","source":"original"},{"question":"Thursday is the ______ day of the week.","options":["third","fifth","sixth"],"answer":1,"explanation":"星期日是第一天，星期四是第五天。","source":"original"},{"question":"—Where is the computer room? —It's on the ______ floor.","options":["/","first","one"],"answer":1,"explanation":"第一层用first。","source":"original"},{"question":"February is the ______ month of a year.","options":["second","third","fourth"],"answer":0,"explanation":"二月是一年的第二个月,故答案为A。","source":"original"},{"question":"There are ______ numbers on the box. The ______ one is 0.","options":["fifth; five","five; five","five; fifth"],"answer":2,"explanation":"考查数词辨析。句意:盒子里由五个数字。第五个是零。第一空中,表示盒子里一共有五个数字,用基数词five;第二空中,表示的是第五个数字,用序数词fifth;故选C。","source":"original"},{"question":"In our class ______ of the students ______ girls.","options":["three-fifth; are","three-fifth; is","three-fifths; are","three-fifths; is"],"answer":2,"explanation":"考查数词。根据题意是五分之三,分数表达three- fifths,谓语动词是复数are。故答案选C。","source":"original"},{"question":"Our classroom is on the ______ floor.","options":["one","first","oneth"],"answer":1,"explanation":"考查序数词。句意:我们的教室在一层。first第一。","source":"original"},{"question":"—Where is the art room? —It's ______.","options":["at the second floor","on the second floor","on the two floor"],"answer":1,"explanation":"在几楼用on the+序数词 floor。","source":"original"},{"question":"Mother's Day is on the ______ Sunday of May.","options":["second","two","twice"],"answer":0,"explanation":"考查序数词。the+序数词，表“第几”；second，第二；句意：母亲节在五月的第二个星期日。故答案为：second。","source":"original"},{"question":"May is the ______ month of a year.","options":["five","fifth","fiveth"],"answer":1,"explanation":"考查序数词。根据句意及the可知，这里应该用序数词。句意：五月是一年中的第五个月。故填：fifth。","source":"original"},{"question":"September is the ______ month of the year.","options":["nine","nineth","ninth"],"answer":2,"explanation":"考查序数词。序数词前面加the，结合句意，九月是一年中第9个月。注意去e，ninth。","source":"original"},{"question":"Tomorrow we are going to learn the ______ lesson.","options":["two","second","twoth"],"answer":1,"explanation":"考查序数词。根据句意可知，这里应该填序数词。句意：明天我们打算学第二节课。故填：second。","source":"original"},{"question":"He is my sister's ______ teacher.","options":["first","the first","one"],"answer":0,"explanation":"他是我姐姐的第一个老师，此处序数词前不加the。","source":"original"},{"question":"My birthday is on July the ______.","options":["one","first","oneth"],"answer":1,"explanation":"七月一日，用序数词first。","source":"original"},{"question":"What's the date today? It's ______.","options":["May the fourth","May four","the May fourth","fourth May"],"answer":0,"explanation":"考查时间的表达。句意为：—今天几号了？表达年月时，可以用月+日（序数词）+年的表达方式；所以应表示为May the fourth。故答案为A。","source":"original"},{"question":"The ______ dinosaur is taller.","options":["one","two","second"],"answer":2,"explanation":"第二只恐龙用second。","source":"original"},{"question":"Osaka is the ______ largest city in Japan.","options":["two","second","twice"],"answer":1,"explanation":"考查序数词。句意：大阪是日本第二大城市。“the+序数词”，表示顺序的次第。two为基数词，二；second为序数词，第二。故答案为：second。","source":"original"},{"question":"Do you know the ______ boy in the picture?","options":["five","fifth","fiveth"],"answer":1,"explanation":"考查序数词。句意：你知道照片里的第五个男孩吗？根据空格前的定冠词the可知，此处要填写数字的序数词形式，故填fifth。","source":"original"},{"question":"When is your birthday? My birthday is on the ______ of October.","options":["eight","eighth","eighty"],"answer":1,"explanation":"考查数词。根据数词。基数词表示数量大小，序数词表示数据顺序，其中序数词可以用于表示生日，结构为；on the+序数词+月份；意为：在几月的第几号。句意：一你的生日是什么时候？一我的生日在10月8日。故答案为B。","source":"original"},{"question":"Today is August ______.","options":["the twelfth","twelve","the twelve","twelveth"],"answer":0,"explanation":"日期用序数词，且加the。","source":"original"},{"question":"It is April ______ today.","options":["twenty-one","twenty-first","twentieth-one"],"answer":1,"explanation":"考查日期的表达。日期需要用序数词来表达，只有B符合。故选B。","source":"original"},{"question":"Christmas Day is on ______ of December.","options":["twenty-five","the twenty-five","twenty-fifth","the twenty-fifth"],"answer":3,"explanation":"考查数词。这里想要表达的是“圣诞节在12月25号。”日期的表达要用序数词。所以可以排除A和B。同时，序数词前要加the。故答案选D。","source":"original"},{"question":"She eats ______ food, so she is ______ fat.","options":["much too; too many","too much; much too","too much; many too","much too; too much"],"answer":1,"explanation":"考查too much, too many, much too的区别。too much 修饰不可数名词, too many 修饰可数名词; much too 中心词是 too, 后面跟形容词或副词, 表示程度。故答案选 B。","source":"original"},{"question":"I have ______ oranges and ______ orange juice.","options":["a little; a few","a few; a little","a few; a few"],"answer":1,"explanation":"oranges 为可数名词, 用 a few 修饰, orange juice 为不可数名词, 用 a little 修饰。","source":"original"},{"question":"I bought ______ exercise books with ______ money.","options":["a few; a few","a few; a little","a little; a few","a little; a little"],"answer":1,"explanation":"考查固定搭配。a few 与 a little 都表示一点, 一些的意思, a few + 可数名词复数, a little + 不可数名词, 故答案为 B。","source":"original"},{"question":"I have some ______ and some ______.","options":["candy; egg","milk; bread","robot; kite"],"answer":1,"explanation":"考查名词复数。some后面要加可数名词复数和不可数名词。A.candy和egg都是可数名词；B.milk和bread都是不可数名词；C.robot和kite都是可数名词，故选B。句意：我有一些牛奶和面包。","source":"original"},{"question":"Eat ______ hot dog and drink ______ milk.","options":["a...a","a...some","some...some"],"answer":1,"explanation":"考查冠词。热狗可数，牛奶不可数。","source":"original"},{"question":"—Are there ______ flowers near the river? —Yes, there are ______.","options":["some; some","any; some"],"answer":1,"explanation":"此题考查there be句型中any和some的用法。一般情况下，肯定句中用some，否定句和疑问句中用any，故选B。","source":"original"},{"question":"Have ______ tea, please.","options":["a cup of","an","a cup"],"answer":0,"explanation":"\"一杯茶\" 可以用 a cup of tea 表示, 故选 A。","source":"original"},{"question":"There's only ______ milk and ______ tomatoes in the fridge.","options":["a little; a little","a few; a little","a little; a few"],"answer":2,"explanation":"考查 little/few 的用法。根据 milk 为不可数名词, 故使用 a little; 又根据 tomato 为可数名词, 故使用 a few。故答案选 C。","source":"original"},{"question":"I was so hungry that I ate two ______.","options":["bowls of noodle","bowls of noodles","bowl of noodles"],"answer":1,"explanation":"考查名词复数。noodles, 不可数名词, 和量词 bowl 配合, two bowls of noodles, 两碗面条。故答案为 B。","source":"original"},{"question":"There's ______ ice-cream in the refrigerator.","options":["any","some","few"],"answer":1,"explanation":"考查不定代词。该句是肯定句, 排除 any; few 修饰可数名词, 而 ice- cream 是不可数名词。","source":"original"},{"question":"Can I have ______ rice?","options":["a","an","some"],"answer":2,"explanation":"rice为不可数名词，前面用some，故选择C。","source":"original"},{"question":"I don't have ______ lessons ______ Sunday morning.","options":["some; on","any; on","any; in"],"answer":1,"explanation":"考查量词any和时间介词。这里意思为周日早上我没有任何课了。lessons是复数，前面+ some/any，出现don't表示否定用any，在具体的某天早上用时间介词on，所以选B。","source":"original"},{"question":"—Can you see ______ apples ______ the tree? —Yes, I can.","options":["some; on","some; in","any; in","any; on"],"answer":3,"explanation":"考查形容词和介词的辨析。句意：—你能看到树上结有一些苹果吗？—是的，我可以。some和any既可以修饰可数名词又可以修饰不可数名词，some常用在肯定句中，而any则常用在否定和疑问句中；in the tree表示的是停留在树上的东西，通常指代有生命的物体，如小鸟之类的；on the tree表示的是原本就长在树上的物体，如苹果、橙子等等。故选D。","source":"original"},{"question":"There isn't ______ meat. Pass me a piece of meat.","options":["some","few","any"],"answer":2,"explanation":"考查不定代词。Some一般用于肯定句，few修饰可数名词。","source":"original"},{"question":"—May I have ______ orange juice? —Here's ______. Here you are.","options":["some; a few","any; some","some; a little","any; a little"],"answer":2,"explanation":"orange juice不可数，用a little。","source":"original"},{"question":"We shouldn't eat too ______ candies, and we shouldn't drink too ______ cold water.","options":["much; much","much; many","many; many","many; much"],"answer":3,"explanation":"too many + n. [C] ; too much + n. [U]","source":"original"},{"question":"Look, there are so ______ cakes on the table. —Yes, but I had too ______ food this morning.","options":["many; many","much; many","many; much","much; much"],"answer":2,"explanation":"考查many & much。根据many后接可数名词复数，much后接不可数名词；又根据cake为可数名词，food为不可数名词，所以为many cakes, much food。故答案选C。","source":"original"},{"question":"Look! ______ sheep ______ grass over there.","options":["A few, eating","A little, eat","A few, are eating","Few, is eating"],"answer":2,"explanation":"考查量词和时态。sheep 单复同形，a few 后接可数名词复数，a little 后接不可数名词；注意现在进行时结构：be + V- ing。选C。","source":"original"},{"question":"We waste ______ food every day, there are still ______ hungry people in the world, we shouldn't do that.","options":["too many; much","too much; many","too many; many"],"answer":1,"explanation":"考查名词和量词。food，仅仅指“食物、食品”的时候是不可数名词；强调食物的种类时就是可数名词。people 为集合名词，表示复数。many 修饰可数名词，much 修饰不可数名词。句意：我们每天浪费太多的食物，世界上仍然有许多饥饿的人，我们不应该那样做。故填：B。","source":"original"},{"question":"I have ______ lessons ______ Monday morning.","options":["some; on","any; on","any; in"],"answer":0,"explanation":"考查量词some和时间介词。some往往用于肯定句，any往往用于否定句和疑问句。这里是肯定句，排除BC。又因为表示具体的某天早上，用时间介词on。故选A。","source":"original"},{"question":"—Do you see ______ birds in the tree? —NO, but I see ______ monkeys in it.","options":["some; any","any; some","any; any"],"answer":1,"explanation":"通常情况下，some用在肯定、表示委婉语气的疑问句或者希望对方给出肯定回答的疑问句中；any用于疑问句或否定句中。","source":"original"},{"question":"—There isn't ______ food in the fridge. —Let's go to the supermarket to buy ______.","options":["any; some","any; any","some; any"],"answer":0,"explanation":"否定句用any，肯定句表示“一些”用some。","source":"original"},{"question":"There are ______ books on the table.","options":["any","some","an","a"],"answer":1,"explanation":"考查不定代词some和any的用法。Some用在肯定句中表示一些，故选B。","source":"original"},{"question":"—Would you like ______ things to drink? —Thank you. But I don't want to drink ______.","options":["some; some","some; any","any; some","some; some"],"answer":1,"explanation":"考查不定代词。Some一般用在肯定句中，any一般用在否定句和疑问句中，但是当某人表示请求时，或者希望得到肯定的回答时，用some。故选B。","source":"original"},{"question":"Do you have ______ toy cars? — Yes. I have ______ toy cars.","options":["some; any","any; any","any; some"],"answer":2,"explanation":"考查量词。any和some表示\"一些\"时，any用于否定句和疑问句中，some用于肯定句中。故选C。","source":"original"},{"question":"I can see a lot of ______ in the street.","options":["tree","car","people"],"answer":2,"explanation":"考查名词单复数。根据\"a lot of\"可知后接可数名词复数，而people属于集体名词，单复数同形，故选C。","source":"original"},{"question":"There is ______ bread in the fridge, let us go to buy some, ______?","options":["little; will you","few; shall we","a few; will you","some; shall we"],"answer":0,"explanation":"考查量词和反义疑问句。bread为不可数名词，用little修饰，little bread一点点面包；let us... + will you表示请求。故选A。","source":"original"},{"question":"She has ______ eggs and ______ milk for breakfast.","options":["a few; a few","a few; a little","a little; a few"],"answer":1,"explanation":"考查量词。a few修饰可数名词，a little修饰不可数名词。根据题干可知，eggs鸡蛋为可数名词，用a few修饰；milk牛奶为不可数名词，用a little修饰。句意：她早餐吃了几个鸡蛋和一些牛奶。故答案为B。","source":"original"},{"question":"— Would you like ______ juice? — Yes, please.","options":["some","any","little","many"],"answer":0,"explanation":"考察不定代词some。some和any表示“一些”的时候，some用在肯定句中、期望得到对方肯定回答的句子中以及在would you like的句式之中。故答案选A。","source":"original"},{"question":"They have ______.","options":["many tea","much oranges","much burgers","much bread"],"answer":3,"explanation":"考查名词的可数和不可数的概念。而且要区分many,much；前者修饰可数名词，而后者修饰不可数名词。所以A.B.C选项的表达是有错误的，只有D：用much修饰不可数的bread是完全正确的。","source":"original"},{"question":"A: Can I help you? B: Some ______ please.","options":["hot dog","noodles","ball"],"answer":1,"explanation":"考查名词单复数。根据some可知应该填可数名词复数或不可数名词原形，A和C均为可数名词单数，故排除。句意：有什么我可以效劳的吗？——请给我一些面条。故答案为B。","source":"original"},{"question":"There are ______ grapes on my uncle's farm.","options":["lot of","lots of","a lot"],"answer":1,"explanation":"考查固定搭配。句意：在我叔叔的农场里有很多葡萄。lots of=a lot of，表示“许多”，为固定搭配，后接可数名词复数或不可数名词，AC选项形式有误。故答案为B。","source":"original"},{"question":"We have ______ rain this year, so the trees and grass don't grow well.","options":["little","a little","few","a few"],"answer":0,"explanation":"考查few和little辨析。few和a few修饰可数名词复数，little和a little修饰不可数名词，由题中的rain（不可数名词）可排除C和D；根据句意可知，我们今年雨水很少，所以树和草都生长地不好。a little表肯定，意为“一点”，little表否定，意为“很少”，故选A。","source":"original"},{"question":"______ did you walk back to the hotel? Because I didn't have ______ money ______ a taxi.","options":["How; no; to","Why; no; for","Why; any; for","When; some; to"],"answer":2,"explanation":"考查特殊疑问句和介词。用Because回答，所以问句应为Why。没钱打出租车，应为have no money for a taxi或者have no money to take a taxi。故答案选C。","source":"original"},{"question":"Drinking too ______ cola is bad for your health. Thank you, Doctor. I just drink ______.","options":["many; a few","many; a little","much; a few","much; a little"],"answer":3,"explanation":"考查副词及量词。短语too much太多 + 不可数名词，too many太多 + 可数名词复数，a little一些 + 不可数名词，a few一些 + 可数名词复数的用法。根据句意可知，喝太多的可乐对你的健康没有好处。谢谢你医生。我只喝了一点儿。故选：D。","source":"original"},{"question":"—I'd like ______ milk. —OK! Here you are.","options":["a","some","an"],"answer":1,"explanation":"milk不可数，用some。","source":"original"},{"question":"Can I have ______ apple juice? Sorry, there isn't ______ apple juice.","options":["any; any","any; some","some; any"],"answer":2,"explanation":"考查some和any的用法。句意：我能喝一些苹果汁吗？对不起，没有苹果汁。some和any都表示一些的意思，some一般用于肯定句或表请求或者希望得到肯定回答的疑问句中，any一般用于否定句和疑问句中。此题中问句为表示请求，所以用some，答句为否定句，所以用any，故选C。","source":"original"}]},{"levelName":"冠词","questions":[{"question":"I have ______ apple every morning.","options":["a","an","the","/"],"answer":1,"explanation":"apple 以元音音素开头，用 an。","source":"ai"},{"question":"______ sun is very bright today.","options":["A","An","The","/"],"answer":2,"explanation":"太阳是独一无二的事物，用定冠词 the。","source":"ai"},{"question":"She is ______ tallest girl in our class.","options":["a","an","the","/"],"answer":2,"explanation":"形容词最高级前用 the。","source":"ai"},{"question":"I want to be ______ teacher.","options":["a","an","the","/"],"answer":0,"explanation":"teacher 以辅音音素开头，表示职业，用 a。","source":"ai"},{"question":"He is ______ honest boy.","options":["a","an","the","/"],"answer":1,"explanation":"honest 的 h 不发音，以元音音素开头，用 an。","source":"ai"},{"question":"______ moon goes around the earth.","options":["A","An","The","/"],"answer":2,"explanation":"月亮是独一无二的事物，用 the。","source":"ai"},{"question":"I have ______ dog and ______ cat.","options":["a...a","a...an","an...a","the...the"],"answer":0,"explanation":"dog 和 cat 都以辅音音素开头，泛指都用 a。","source":"ai"},{"question":"She plays ______ piano every day.","options":["a","an","the","/"],"answer":2,"explanation":"乐器前加 the：play the piano。","source":"ai"},{"question":"I like playing ______ basketball.","options":["a","an","the","/"],"answer":3,"explanation":"球类运动前不加冠词：play basketball。","source":"ai"},{"question":"______ Great Wall is very famous.","options":["A","An","The","/"],"answer":2,"explanation":"专有名词 the Great Wall 用 the。","source":"ai"},{"question":"There is ______ 'u' in the word 'umbrella'.","options":["a","an","the","/"],"answer":0,"explanation":"字母 u 的发音以辅音音素 /juː/ 开头，用 a。","source":"ai"},{"questio 下午是固定短语in the afternoon。 故选 8。 95 computers are very usefulin oUr life_ A A 8 The C","source":"original"},{"question":"There is ______ refrigerator in the kitchen. ______ refrigerator is white.","options":["a; A","a; The","the; A","the; The"],"answer":1,"explanation":"考查冠词。前一个为不定冠词，用a，后一个为特指，用the。","source":"original"},{"question":"We can't see ______ sun at ______ night.","options":["the; the","the; /","a; /"],"answer":1,"explanation":"sun是独一无二，前面使用定冠词，at night为固定搭配。","source":"original"},{"question":"I have ______.","options":["a pencil","pencil"],"answer":0,"explanation":"由选项可知，本句意为“我有一支铅笔。”。可数名词单数前要加上a/an/the，表示“一”或特指，故选A。","source":"original"},{"question":"We're making ______ snowman.","options":["a","an","不填"],"answer":0,"explanation":"考查名词。Snowman是可数名词，且是以辅音开头，所以选a。","source":"original"},{"question":"______ woman over there is ______ teacher in our school.","options":["A; a","The; a","The; the"],"answer":1,"explanation":"第一个空特指那边的那个女人，用the；第二个空泛指一位老师，用a。","source":"original"},{"question":"Mom tells her little daughter ______ old story every night.","options":["a","/","an","the"],"answer":2,"explanation":"old元音音素开头，应该用an。","source":"original"},{"question":"The man in black is ______ engineer.","options":["a","an","the","/"],"answer":1,"explanation":"本题考查冠词的用法。engineer元音开头，用不定冠词an。","source":"original"},{"question":"______ are Lily's neighbours. They are friends too.","options":["Wangs","The Browns","The White"],"answer":1,"explanation":"本题考查定冠词的用法。The+姓氏s，表示一家人。本题A，wangs前没有the，错误。C选项，white后没有s，错误。所以B符合题意，形式正确。句意：布朗一家是Lily的邻居，他们也是朋友。所以答案为：B。","source":"original"},{"question":"—What's that? —It's ______ magazine.","options":["a","an","the","/"],"answer":0,"explanation":"考查冠词。上文问那个是什么，下文说那是一本杂志，并没有特指是哪本或者哪种杂志，因此不用定冠词修饰。杂志是可数名词，需要一个不定冠词来修饰，因此选A。","source":"original"},{"question":"______ man in black is from ______ Australia.","options":["The; the","A; /","The; /","A; the"],"answer":2,"explanation":"考查冠词。特指用定冠词 the，国家前零冠词。","source":"original"},{"question":"—What colour is it? —It is ______.","options":["orange","an orange","a orange"],"answer":0,"explanation":"这里orange表示颜色，前面不加冠词。","source":"original"},{"question":"______ Summer Palace is one of ______ most beautiful parks in ______ world.","options":["/; the; the","The; a; the","The; the; the","A; a; a"],"answer":2,"explanation":"考查冠词。the Summer Palace 特指北京的颐和园, most最高级前面要加the, in the world也是习惯用法: \"在这个世界上\"。故答案为C。","source":"original"},{"question":"I have ______ English book in my bag.","options":["an","a","my"],"answer":0,"explanation":"考查冠词。English为元音音素开头, 故用an, 选A。","source":"original"},{"question":"There is ______ island in the lake.","options":["an","a","the"],"answer":0,"explanation":"考查不定冠词。a后面接以辅音音素开头的单词，an接以元音音素开头的单词，the是定冠词，表示特指。island是元音音素开头，故答案选A。","source":"original"},{"question":"______ are sitting at the table and having their supper.","options":["Green","The Green","Greens","The Greens"],"answer":3,"explanation":"考查定冠词；由be动词are可知主语是复数，句意为格林一家坐在桌子旁吃晚餐，the+姓氏复数是……的一家的意思，故答案选D。","source":"original"},{"question":"I met a group of people from ______ USA on my way to school.","options":["a","an","the","/"],"answer":2,"explanation":"考查冠词。专有名词前用定冠词the。","source":"original"},{"question":"The word \"fish\" has ______ \"f\".","options":["an","a","the","/"],"answer":0,"explanation":"考查冠词。f(音标为/ef/)，是元音音素开头，故用an。故选A。","source":"original"},{"question":"Does your father go to work by ______ car every day? No, he sometimes takes ______ bus.","options":["a, the","the, a","不填, a","a, 不填"],"answer":2,"explanation":"考查冠词；by+交通工具，take+a/the+交通工具，故答案选C。","source":"original"},{"question":"Doing lots of listening practice is one of ______ best ways of becoming ______ good language learner.","options":["the, the","the, a","不填, a","the, 不填"],"answer":1,"explanation":"考查冠词的用法。最高级前面用定冠词the，表示一个的时候用不定冠词a。句子大意：做大量的听力练习是成为一个语言学习者最好的方法。故选B。","source":"original"},{"question":"Eat ______ hot dog or drink ______ milk.","options":["a...a","a...some","Some...some"],"answer":1,"explanation":"考查冠词。热狗可数，牛奶不可数。故选B。","source":"original"},{"question":"This is an ______.","options":["eye","mouth"],"answer":0,"explanation":"eye以元音音素开头，用an。","source":"original"},{"question":"Do you like movie Zootopia? Yes, it is ______ interesting film.","options":["a; an","the; an","a; the"],"answer":1,"explanation":"考查冠词。第一空, movie Zootopia 是特指这个电影, 用定冠词 the 修饰; 第二空, 句子意为 \"这是一个有趣的电影\", 不是特指哪一个, 用不定冠词, 又因为其后单词 interesting 为元音音素开头, 所以用 an。答案选 B。","source":"original"},{"question":"This is ______ egg.","options":["a","an"],"answer":1,"explanation":"egg以元音音素开头，用an。","source":"original"},{"question":"______ UFO landed on ______ earth yesterday morning.","options":["An, the","A, the","A, a","An, a"],"answer":1,"explanation":"考查冠词。字母U发的是辅音音素，第一个空应填a，地球是世界上独一无二的东西，需要特指，第二个空应填the；故答案选B。","source":"original"},{"question":"I have ______ eraser.","options":["a","an","the"],"answer":1,"explanation":"eraser（橡皮），以元音音素开头的单词，其前冠词用an。","source":"original"},{"question":"______ old lady with white hair spoke ______ English well at ______ meeting.","options":["An; an; a","The; /; an","The; /; a","The; /; the"],"answer":3,"explanation":"第一个空填the，是特指那个“白发老太太”；第二个空不填冠词，是因为在语言名称前面一般不加冠词。English后面如有language，就得说the English language。“在会议上”应为at the meeting。","source":"original"},{"question":"It takes Sue ______ half hour to walk to the Bus Stop.","options":["a","an","the"],"answer":1,"explanation":"考查不定冠词a/an。hour的h不发音，所以选an。选B。","source":"original"},{"question":"Eric is not going to Zhengzhou by ______ plane. Instead, he is taking ______ train.","options":["/; a","a; /","a; the","the; a"],"answer":0,"explanation":"考查冠词。根据句意,埃里克将来不会乘坐飞机去郑州。相反,他准备乘坐火车。By+交通工具不用冠词。Take a train 是固定搭配,表示乘坐火车。故答案选A。","source":"original"},{"question":"Lucy is ______ university student. She likes playing ______ piano.","options":["a; /","a; the","an; /","an; the"],"answer":1,"explanation":"考查冠词辨析。university的u发辅音/juː/,故用a,乐器前加the,第二个空用the。故选B。","source":"original"},{"question":"It's ______ ant.","options":["an","a"],"answer":0,"explanation":"ant蚂蚁,这个单词以元音音素开头,表示单数时,前面的冠词用\"an\"。","source":"original"},{"question":"Look at ______ calendar. It's June 22.","options":["a","an","the","/"],"answer":2,"explanation":"考查定冠词。特指双方都知道的日历。","source":"original"},{"question":"We stay at ______ very nice hotel, but I can't remember ______ name.","options":["a, a","the, the","a, the","the, a"],"answer":2,"explanation":"考查冠词。第一次出现的名词前用a/an,表示大家所公知的事物前用定冠词the,故答案选C。","source":"original"},{"question":"At that time Tom was ______ one-year-old baby.","options":["a","an","the","/"],"answer":0,"explanation":"one虽以元音字母开头，但以辅音音素[w]开头，故填a。","source":"original"},{"question":"It's raining. You should take ______ umbrella.","options":["a","an","1"],"answer":1,"explanation":"umbrella是元音发音，所以用an。","source":"original"},{"question":"Would you like a ______?","options":["ice cream","orange skirt","blue T-shirt"],"answer":2,"explanation":"考查名词辨析。ice cream冰淇淋；orange skirt橙色的裙子；blue T-shirt蓝色衬衣。根据题干，空格前为a，AB选项中的首字母发音为元音音标，所以只能用an，所以排除AB。故选C。","source":"original"},{"question":"I have ______ idea. It's ______ good idea.","options":["a; a","an; an","an; a"],"answer":2,"explanation":"idea开头为元音音素[ai]，应用an；good开头为辅音音素[g]，用a。","source":"original"},{"question":"My aunt is pretty. She is ______ driver.","options":["an","a","/"],"answer":1,"explanation":"考查冠词。表\"一个\"用a/an，driver辅音音素开头，用a；译为：我的姑姑很漂亮，她是一名司机。","source":"original"},{"question":"There's ______ apple tree in front of ______ house.","options":["an, /","the, the","an, the","a, the"],"answer":2,"explanation":"考查冠词。不定冠词a用于辅音音素前，an用于元音音素前。Apple前用an；定冠词the特指双方都明白的人或物，the house特指。因此选C项。","source":"original"},{"question":"The boys sometimes play ______ basketball after school.","options":["/","with","the"],"answer":0,"explanation":"考查冠词。play与球类运动前不添加任何冠词。play basketball，打篮球。故答案为A。","source":"original"},{"question":"—Mary, who's ______ woman over there? —She's my aunt, ______ English teacher.","options":["the; the","a; the","the; an","a; an"],"answer":2,"explanation":"考查冠词。a/an为不定冠词，表示泛指。元音音素前用an，辅音音素前用a；the为定冠词，表示特指。第一个空是特指站在那里的那个女人，表示特指，所以要用the。第二个空泛指一个英语老师。English为元音音素开头的单词，所以要用an。故答案选C。","source":"original"},{"question":"My sister likes playing ______ violin while my brother likes playing ______ basketball.","options":["the; the","the; /","the","a; a"],"answer":1,"explanation":"考查冠词。弹奏西洋乐器前要加the，球类运动前不加冠词。故答案选B。","source":"original"},{"question":"______ are my neighbours.","options":["Greens","The Green","The Greens"],"answer":2,"explanation":"考查在姓的复数前面加定冠词the表示这一家人的用法。根据句意可知格林一家人是我的邻居。故选：C。","source":"original"},{"question":"______ useful book it is!","options":["What a","What an","How a","How an"],"answer":0,"explanation":"一本有用的书，useful虽以元音字母开头，但以辅音音素开头，选A。","source":"original"},{"question":"—Do you like ______ movie Zootopia? —Yes, it is ______ interesting film.","options":["a; an","the; an","a; the","the; a"],"answer":1,"explanation":"考查冠词。第一个空后有个电影名字Zootopia，故用定冠词the修饰，表示特指。第二空处是泛指，所以用不定冠词，又因为interesting是以元音音素开头的，所以选B。","source":"original"},{"question":"We like playing ______ violin very much.","options":["the","a","/"],"answer":0,"explanation":"考查冠词。乐器前需要加冠词the；故选A。句意：我们非常喜欢弹小提琴。","source":"original"},{"question":"Joe has ______ e-friend in the UK.","options":["a","an","the"],"answer":1,"explanation":"考查冠词。句意：乔在英国有个网友。这里表示泛指一位网友，因此要用不定冠词a/an，排除C选项；e-friend是以元音音素开头的单词，前面用an来修饰。故选B。","source":"original"},{"question":"New York is ______ important city in ______ America.","options":["an; the","the; /","a; /","an; /"],"answer":3,"explanation":"考查冠词。根据语境，在美国，纽约是一个重要的城市。第一空表示一个，泛指用不定冠词，另根据important是以元音开头，故答案填an；第二空，表示在某个国家，前面不加冠词。故答案选D。","source":"original"},{"question":"______ clever boy.","options":["What a","What an","How a","How an"],"answer":0,"explanation":"感叹句结构：What+a/an+形容词+单数名词！clever以辅音音素开头，用a。","source":"original"},{"question":"Is she a French student? No, she ______. She is ______ English student.","options":["is; an","isn't; a","isn't; an","isn't; /"],"answer":2,"explanation":"考查冠词和动词。一般疑问的否定回答，be+not. English是以元音音素开头，因此前面需要定冠词an来修饰。","source":"original"},{"question":"Look! Who's ______ boy over there? Oh, he's my cousin, Bob. He is ______ honest boy.","options":["a, the","the, a","the, an","a, an"],"answer":2,"explanation":"考查冠词。boy有over there修饰是特指，应使用定冠词，后者是泛指“他是一个诚实的男孩”应使用不定冠词，又因honest音素为元音，用an，故选C。","source":"original"},{"question":"When we were on holiday, we stayed at ______ hotel. Sometimes we had our evening meal at ______ hotel.","options":["a; a","a; the","the; a"],"answer":1,"explanation":"第一次提到用a，第二次提到用the。","source":"original"},{"question":"Do you have ______ pen?","options":["a","any","some"],"answer":0,"explanation":"考查不定冠词的用法。根据句意可知你有一支钢笔吗？故选：A。","source":"original"},{"question":"Mini likes playing ______ football, but she doesn't like playing ______ piano.","options":["/; /","the; /","the; the","/; the"],"answer":3,"explanation":"考查冠词。球类运动前不需要加定冠词the，西洋乐器前要加定冠词the，故选D。","source":"original"},{"question":"This is ______ elephant. That is ______ giraffe.","options":["a; an","an; an","an; a"],"answer":2,"explanation":"考查冠词。elephant是以元音开头，用an；giraffe是以辅音开头，用a。故选C。","source":"original"},{"question":"There's ______ apple tree in our garden. Under ______ tree, there is ______ young man.","options":["a; the; a","an; the; the","an; the; a","the; the; a"],"answer":2,"explanation":"考查冠词辨析。第一个空，初次提及apple tree，而且apple是元音发音，故用不定冠词an。第二个空，再次提及苹果树，故用定冠词the，第三个空，初次提及young man，故用不定冠词a。故选C。","source":"original"},{"question":"Alice is fond of playing ______ piano but her father bought her ______ violin.","options":["the; a","the; the","a; a","a; the"],"answer":0,"explanation":"表示演奏乐器的名词前要加the。表示买了一个小提琴，则用不定冠词。","source":"original"},{"question":"I bought ______ camera last month, and it is ______ useful machine.","options":["a; a","a; an","a; the","the; an"],"answer":0,"explanation":"考查冠词。元音音素开头用an，辅音音素开头用a，第一次出现用a/an，第二次出现用the。camera和machine均为第一次出现并且是辅音音素开头的，故答案选A。","source":"original"},{"question":"I'd like ______.","options":["drink a glass of water","to drink glass of water","to drink a glass of juice"],"answer":2,"explanation":"would like to do sth.，另外一杯果汁或者水，前面要加a，故选择C。","source":"original"},{"question":"One afternoon he found ______ handbag. There was ______ \"s\" on the corner of ______ handbag.","options":["a; an; the","a; a; the","an; an; an","the; a; a"],"answer":0,"explanation":"\"s\" 虽为辅音字母, 但却以元音音素 [e] 开头, 故选 an。","source":"original"},{"question":"When do people usually eat ______ breakfast? They usually eat it in ______ evening.","options":["the; a; the","/; /; the","/; /; an","the; /; the"],"answer":1,"explanation":"考查冠词辨析。一日三餐前不加the, 从题目When do people usually eat breakfast? They usually eat it in evening. 可知第一个空格不用填, 第二个也是, 第三个空考查固定搭配in the evening. 故但选B。","source":"original"},{"question":"There is ______ airport in Xiaoshan. ______ airport is very large.","options":["a; A","an; The","/; The","the; The"],"answer":1,"explanation":"考查冠词a/an/the。句中第一次提到airport的时候用不定冠词, 由于airport是元音音素开头, 所以用不定冠词an。第二次提到的时候为特指, 用定冠词the。故答案选B。","source":"original"},{"question":"Our school has ______ Art Festival every year.","options":["a","an","the","/"],"answer":1,"explanation":"考查冠词。以元音音素开头的单词前用an。","source":"original"},{"question":"Look! Who is ______ beautiful girl in red? —Oh, she is my deskmate.","options":["a","an","the","/"],"answer":2,"explanation":"考查定冠词。The特指上文中提到过的人或者事物，这里特指那个穿红色衣服的女孩。","source":"original"},{"question":"What ______ beautiful flowers!","options":["a","an","/"],"answer":2,"explanation":"感叹句后面是可数名词复数，所以前面不用a或者an，所以不填。选C。","source":"original"},{"question":"This is ______ book. It's ______ English book.","options":["a; a","a; an","an; a"],"answer":1,"explanation":"考查不定冠词。a修饰以辅音音素开头的可数名词单数，an修饰以元音音素开头的可数名词单数。句意：这是一本书。它是一本英语书。故选：B。","source":"original"},{"question":"I want to be ______ engineer one day. I want ______ German car.","options":["a; a","a; an","an; an","an; a"],"answer":3,"explanation":"考查冠词。Engineer是以元音音素开头的因此用an。German是辅音音素开头，所以用a。","source":"original"},{"question":"He is ______ old man. He usually takes a walk after ______ supper.","options":["a; the","an; a","an; /","the; /"],"answer":2,"explanation":"考查冠词。第一个空old的发音是以元音音素开头，故用不定冠词an；而after supper是固定用法，指晚饭后，不用加冠词。","source":"original"},{"question":"______ nice pen.","options":["What a","What an"],"answer":0,"explanation":"感叹句结构：What+a/an+形容词+单数名词！nice以辅音音素开头，用a。","source":"original"},{"question":"______ Great Wall is ______ longest wall in the world.","options":["A; a","The; the","A; the","The; a"],"answer":1,"explanation":"这题考察冠词。长城是世界上独一无二的，所以要用定冠词the，longest是形容词最高级，前也要用the，所以选B。","source":"original"},{"question":"I've got ______ idea!","options":["a","the","an"],"answer":2,"explanation":"考查冠词，元音音标前用an。故选C。","source":"original"},{"question":"My sister is ______ dentist.","options":["a","an","the"],"answer":0,"explanation":"dentist以辅音音素开头，用a。","source":"original"},{"question":"It's ______ eraser.","options":["a","an"],"answer":1,"explanation":"根据图片所知, 图片显示的是一块橡皮, 即eraser。在eraser中首字母e的发音为元音音素/iː/, 所以应用不定冠词an。故答案为B。","source":"original"},{"question":"There is ______ \"a\" and ______ \"n\" in the word \"man\".","options":["a; an","an; an","an; a","a; a"],"answer":1,"explanation":"考查不定冠词和音素。字母a发/ei/, 是元音, 故要用不定冠词an; 字母n发/en/, 元音音素开头, 要用不定冠词an, 故选B。","source":"original"},{"question":"Is your aunt ______ actress?","options":["an","a","/"],"answer":0,"explanation":"考查冠词。因为actress是以元音音素开头的单词, 故用an, 故选A。","source":"original"},{"question":"This is ______ interesting book.","options":["a","an","the"],"answer":1,"explanation":"考查不定冠词。根据interesting为元音音标发音且book为可数名词，此处应选不定冠词an。故答案选B。","source":"original"},{"question":"I have ______ egg and a hamburger.","options":["an","a","the"],"answer":0,"explanation":"考查冠词辨析。句意：我吃了一个鸡蛋和汉堡包。根据句意可知，此处表示“一个鸡蛋”。egg为可数名词，且是以元音音素开头的单词，应选不定冠词an。故答案为A。","source":"original"},{"question":"I have ______ uncle and he works in Shanghai.","options":["a; /","an; /","a; the","an; the"],"answer":1,"explanation":"考查不定冠词。根据句意：我有一个叔叔，他在上海工作。表示一个叔叔，uncle前需要加不定冠词修饰，根据uncle是以元音音素开头，判断用an；再根据Shanghai地名，前不需要加冠词。故选B。","source":"original"},{"question":"______ new bridge has been built over ______ Huangpu River.","options":["The; a","A; /","A; the","An; the"],"answer":2,"explanation":"第一个空是泛指，用a；第二个空是河流名称，故用the。","source":"original"},{"question":"There is ______ \"f\" in the word \"full\".","options":["a","an","the","/"],"answer":1,"explanation":"字母发音以元音音素开头，选择不定冠词an。","source":"original"},{"question":"I like playing ______ basketball, but my sister likes playing ______ piano.","options":["a; a","a; the","/; the"],"answer":2,"explanation":"考查冠词。球类前不加冠词，西洋乐器前加冠词。故正确答案为C。","source":"original"},{"question":"The boy likes playing ______ basketball very much.","options":["a","an","the","/"],"answer":3,"explanation":"考查冠词。球类运动不加冠词，比如play basketball。故选D。","source":"original"},{"question":"We have ______ art lesson in ______ afternoon.","options":["/; a","an; the","the; an","a; /"],"answer":1,"explanation":"考查不定冠词a/an和定冠词the的用法。横线后面的单词art是以元音音素开头，可知第一空应使用不定冠词an，而在下午是固定短语in the afternoon。故选：B。","source":"original"},{"question":"______ computers are very useful in our life.","options":["A","The","/"],"answer":2,"explanation":"复数名词表示类别时，不加冠词。","source":"original"},{"question":"You can see ______ English book under the phone.","options":["some","an","a"],"answer":1,"explanation":"考查冠词。English book以元音音素开头，不定冠词应该用an。","source":"original"},{"question":"Mr. Read is ______ university professor. He is ______ old professor.","options":["an; an","a; the","a; an"],"answer":2,"explanation":"考查冠词的用法。辅音音素前用a,元音音素前用an。university [juːnɪˈvɜːsəti],old [əʊld]。故选C。","source":"original"},{"question":"I have ______ Chinese book, ______ maths book and ______ English book.","options":["a; a; an","an; a; an","a; an; an"],"answer":0,"explanation":"考查不定冠词的使用。句意：我有一本语文书，一本数学书和一本英语书。a用于辅音音素开头的单词前；an用于元音音素开头的单词前。故选A。","source":"original"},{"question":"—What's this? —It's ______ UFO.","options":["the","a","an","/"],"answer":1,"explanation":"此题考查冠词，根据句意得知用不定冠词，且U的第一个发音是辅音，所以选B。","source":"original"},{"question":"Lily is good at music and likes playing ______ piano.","options":["a","/","the"],"answer":2,"explanation":"考查冠词。句意：莉莉擅长音乐，而且喜欢弹钢琴。play后接表示乐器的名词时，其后要加定冠词the，如果其后接的是球类运动，则不加the。根据本空后的\"piano\"表示乐器可知，本空应填定冠词the。故选：C。","source":"original"}]},{"levelName":"形容词和副词的比较级","questions":[{"question":"My sister is ______ than me.","options":["tall","taller","tallest","more tall"],"answer":1,"explanation":"than 提示比较级，tall 单音节词加 -er。","source":"ai"},{"question":"This book is ______ than that one.","options":["interesting","interestinger","more interesting","most interesting"],"answer":2,"explanation":"多音节词 interesting 的比较级用 more + 原级。","source":"ai"},{"question":"She runs ______ than her brother.","options":["fast","faster","fastest","more fast"],"answer":1,"explanation":"fast 的比较级直接加 -er。","source":"ai"},{"question":"Today is the ______ day of the year.","options":["hot","hotter","hottest","most hot"],"answer":2,"explanation":"of the year 提示最高级，hot 双写 t 加 -est。","source":"ai"},{"question":"He is ______ student in our class.","options":["good","better","best","the best"],"answer":3,"explanation":"in our class 提示最高级，最高级前加 the。","source":"ai"},{"question":"This flower is ______ than that one.","options":["beautiful","beautifuler","more beautiful","most beautiful"],"answer":2,"explanation":"多音节词 beautiful 的比较级用 more。","source":"ai"},{"question":"The weather is getting ______ and ______.","options":["warm...warm","warmer...warmer","warmest...warmest","more warm...more warm"],"answer":1,"explanation":"越来越…用比较级 and 比较级。","source":"ai"},{"question":"He is the ______ boy I have ever seen.","options":["brave","braver","bravest","more brave"],"answer":2,"explanation":"I have ever seen 提示最高级，brave 加 -st。","source":"ai"},{"question":"I feel ______ today than yesterday.","options":["well","better","best","good"],"answer":1,"explanation":"than 提示比较级，well 的比较级是 better。","source":"ai"},{"question":"This is the ______ movie I have ever watched.","options":["bad","worse","worst","baddest"],"answer":2,"explanation":"I have ever watched 提示最高级，bad 的最高级是 worst。","source":"ai"},{"question":"She sings ______ in the class.","options":["beautifully","more beautifully","most beautifully","the most beautifully"],"answer":3,"explanation":"in the class 提示最高级，副词最高级前加 the。","source":"ai"},{"question":"The ______ you work, the ______ you will get.","options":["hard...much","harder...more","hardest...most","more hard...more"],"answer":1,"explanation":"the + 比较级...the + 比较级 表示越…越…。","source":"ai"},{"question":"My bag is ______ than yours.","options":["big","bigger","biggest","more big"],"answer":1,"explanation":"big 的比较级双写 g 加 -er。","source":"ai"},{"question":"He is as ______ as his father.","options":["tall","taller","tallest","more tall"],"answer":0,"explanation":"as...as 中间用原级，表示同样…。","source":"ai"},{"question":"This problem is ______ than that one.","options":["easy","easier","easiest","more easy"],"answer":1,"explanation":"easy 的比较级变 y 为 i 加 -er。","source":"ai"},{"question":"He is the ______ of the three brothers.","options":["young","younger","youngest","more young"],"answer":2,"explanation":"of the three 提示三者中最…，用最高级 youngest。","source":"ai"},{"question":"She did the work ______ than anyone else.","options":["carefully","more carefully","most carefully","carefullier"],"answer":1,"explanation":"副词 carefully 的比较级用 more carefully。","source":"ai"},{"question":"The river is getting ______.","options":["clean","cleaner","cleanest","more clean"],"answer":1,"explanation":"get + 比较级表示变得越来越…。","source":"ai"},{"question":"This is ______ book I have ever read.","options":["interesting","more interesting","the most interesting","most interesting"],"answer":2,"explanation":"I have ever read 提示最高级，多音节词用 the most。","source":"ai"},{"question":"My brother is two years ______ than me.","options":["old","older","oldest","more old"],"answer":1,"explanation":"than 提示比较级，old 直接加 -er。","source":"ai"},{"question":"This box is ______ than that one.","options":["heavy","heavier","heaviest","more heavy"],"answer":1,"explana
