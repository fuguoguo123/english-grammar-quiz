<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🚀 英语语法大闯关 - 选择题版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Comic Sans MS","YouYuan",sans-serif;background:#0a0a2e;color:#e0e0ff;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,#1a1a4e 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,#0d0d3a 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,#151545 0%,transparent 50%);z-index:-2}
.stars-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
.btn{display:inline-block;padding:12px 28px;border:none;border-radius:25px;font-size:1.05rem;cursor:pointer;font-family:inherit;transition:all .25s;font-weight:bold;outline:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,#4a90ff,#6c5ce7);color:#fff}
.btn-success{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff}
.btn-warning{background:linear-gradient(135deg,#fdcb6e,#e17055);color:#fff}
.btn-danger{background:linear-gradient(135deg,#d63031,#e17055);color:#fff}
.btn-gray{background:linear-gradient(135deg,#636e72,#b2bec3);color:#fff}
.btn-sm{padding:6px 14px;font-size:.85rem;border-radius:18px}
.btn-lg{padding:16px 40px;font-size:1.3rem;border-radius:30px}
.btn-next{padding:16px 50px;font-size:1.3rem;border-radius:30px;background:linear-gradient(135deg,#ff6b6b,#ffa502);color:#fff;animation:nextPulse 1.5s ease-in-out infinite}
@keyframes nextPulse{0%,100%{box-shadow:0 0 10px rgba(255,107,107,.4)}50%{box-shadow:0 0 30px rgba(255,165,2,.8)}}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
.welcome-screen{justify-content:center;align-items:center;gap:20px;text-align:center}
.welcome-screen h1{font-size:2.5rem;text-shadow:0 0 20px rgba(100,150,255,.6)}
.welcome-screen .subtitle{font-size:1.1rem;opacity:.8;margin-bottom:10px}
.welcome-planets{display:flex;gap:30px;margin:20px 0;font-size:3rem}
.welcome-planets span{animation:float 3s ease-in-out infinite}
.welcome-planets span:nth-child(2){animation-delay:.5s}
.welcome-planets span:nth-child(3){animation-delay:1s}
.welcome-planets span:nth-child(4){animation-delay:1.5s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.auth-form{background:rgba(20,20,60,.9);border-radius:20px;padding:30px;width:380px;max-width:95vw;display:flex;flex-direction:column;gap:15px;border:2px solid rgba(100,150,255,.3)}
.auth-form input{width:100%;padding:12px 16px;border-radius:25px;border:2px solid rgba(100,150,255,.3);background:rgba(10,10,40,.8);color:#e0e0ff;font-size:1rem;font-family:inherit;outline:none;transition:border .3s}
.auth-form input:focus{border-color:#6c5ce7}
.auth-form .error-msg{color:#ff6b6b;font-size:.85rem;min-height:20px;text-align:center}
.auth-form .btn{width:100%}
.auth-form .remember-row{display:flex;align-items:center;gap:8px;font-size:.85rem;color:#b0b0d0}
.auth-form .remember-row input[type=checkbox]{width:auto;accent-color:#6c5ce7}
.top-bar{background:linear-gradient(135deg,rgba(20,20,80,.95),rgba(30,30,70,.95));padding:12px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:10px 20px;border-bottom:2px solid rgba(100,150,255,.3);position:sticky;top:0;z-index:100}
.top-bar .title{font-size:1.3rem;font-weight:bold;white-space:nowrap}
.top-bar .info-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.top-bar .stat{background:rgba(100,150,255,.15);border-radius:15px;padding:4px 12px;font-size:.85rem;white-space:nowrap}
.top-bar .btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}
.grammar-bar{display:flex;flex-wrap:wrap;gap:10px;padding:15px 20px;justify-content:center}
.grammar-btn{position:relative;background:rgba(40,40,100,.7);border:2px solid rgba(100,150,255,.3);border-radius:15px;padding:10px 16px;color:#c0c0ff;cursor:pointer;font-family:inherit;font-size:.9rem;transition:all .25s;white-space:nowrap}
.grammar-btn:hover{background:rgba(60,60,140,.8);border-color:#6c5ce7;transform:translateY(-2px)}
.grammar-btn.active{background:rgba(80,60,180,.8);border-color:#a29bfe;color:#fff;box-shadow:0 0 15px rgba(108,92,231,.4)}
.grammar-btn .badge{position:absolute;top:-6px;right:-6px;width:10px;height:10px;background:#ff4757;border-radius:50%}
.quiz-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:20px}
.quiz-progress{font-size:.95rem;opacity:.7}
.quiz-question{font-size:1.5rem;text-align:center;max-width:650px;line-height:1.5;background:rgba(20,20,60,.7);border-radius:18px;padding:20px 30px;border:1px solid rgba(100,150,255,.2)}
.quiz-tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
.quiz-tag.ai{background:rgba(255,165,0,.3);color:#ffa502}
.quiz-tag.original{background:rgba(0,184,148,.3);color:#00b894}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:600px;width:100%}
.quiz-option{background:rgba(30,30,80,.8);border:2px solid rgba(100,150,255,.3);border-radius:16px;padding:16px;font-size:1.1rem;color:#d0d0ff;cursor:pointer;font-family:inherit;transition:all .25s;text-align:left}
.quiz-option:hover{background:rgba(50,50,120,.8);border-color:#6c5ce7}
.quiz-option.correct{background:rgba(0,184,148,.5)!important;border-color:#00b894!important;animation:pulse .5s}
.quiz-option.wrong{background:rgba(214,48,49,.5)!important;border-color:#d63031!important;animation:shake .4s}
.quiz-option.flash-correct{animation:flashGreen .8s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes flashGreen{0%,100%{background:rgba(30,30,80,.8)}50%{background:rgba(0,184,148,.6)}}
.explanation-box{background:rgba(255,165,0,.15);border:2px solid rgba(255,165,0,.4);border-radius:15px;padding:15px 20px;max-width:600px;width:100%;text-align:center;font-size:1rem;margin-top:10px}
.star-burst{position:fixed;pointer-events:none;font-size:2rem;animation:starUp .8s ease-out forwards;z-index:200}
@keyframes starUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}
.level-up-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300}
.level-up-box{background:linear-gradient(135deg,#2d1b69,#6c5ce7);border-radius:20px;padding:40px;text-align:center;animation:bounceIn .5s;border:3px solid #fdcb6e}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:250;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:rgba(20,20,60,.97);border-radius:20px;padding:25px;max-width:700px;width:95vw;max-height:85vh;overflow-y:auto;border:2px solid rgba(100,150,255,.3)}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:15px}
.shop-card{background:rgba(30,30,80,.8);border-radius:15px;padding:18px;text-align:center;border:1px solid rgba(100,150,255,.2);transition:all .25s}
.shop-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.calendar-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:.85rem;cursor:default}
.calendar-cell.star-day{background:rgba(253,203,110,.3);border:2px solid #fdcb6e}
.calendar-cell.empty{opacity:.3}
.calendar-cell.today{border:2px solid #6c5ce7}
.calendar-header{font-size:.8rem;opacity:.6;text-align:center}
.admin-tabs{display:flex;gap:5px;margin-bottom:15px}
.admin-tab{padding:8px 18px;border-radius:15px 15px 0 0;background:rgba(40,40,100,.5);border:none;color:#c0c0ff;cursor:pointer;font-family:inherit;font-size:.9rem}
.admin-tab.active{background:rgba(80,60,180,.7);color:#fff}
.admin-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.85rem}
.admin-table th,.admin-table td{border:1px solid rgba(100,150,255,.2);padding:8px 10px;text-align:left}
.admin-table th{background:rgba(40,40,100,.6)}
.admin-table tr:hover{background:rgba(40,40,120,.3)}
.inventory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:10px}
.inventory-card{background:rgba(30,30,80,.8);border-radius:12px;padding:14px;text-align:center;font-size:.85rem}
@media(max-width:600px){.quiz-options{grid-template-columns:1fr}.welcome-screen h1{font-size:1.6rem}.top-bar{flex-direction:column;align-items:flex-start}.top-bar .btn-row{margin-left:0}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,80,.95);border:2px solid rgba(100,150,255,.4);border-radius:25px;padding:12px 28px;font-size:1rem;z-index:400;animation:toastIn .3s ease-out,toastOut .3s 2.5s ease-in forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-30px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-30px)}}
</style>
</head>
<body>
<canvas class="stars-canvas" id="starsCanvas"></canvas>
<div class="screen active" id="welcomeScreen"><div class="welcome-screen">
<div class="welcome-planets"><span>🌍</span><span>🪐</span><span>🚀</span><span>⭐</span></div>
<h1>🚀 英语语法大闯关</h1><p class="subtitle">选择题版 · 小学英语语法练习</p>
<button class="btn btn-primary" onclick="showScreen('registerScreen')">✨ 新用户注册</button>
<button class="btn btn-success" onclick="showScreen('loginScreen')">🔑 已有账号登录</button>
</div></div>
<div class="screen" id="registerScreen"><div class="welcome-screen"><h2>✨ 新用户注册</h2>
<div class="auth-form">
<input id="regUser" placeholder="用户名（至少2字符，中英文/数字/下划线）" maxlength="20">
<input type="password" id="regPass" placeholder="密码（至少4位，数字或字母）" maxlength="30">
<input type="password" id="regPass2" placeholder="确认密码">
<div class="error-msg" id="regError"></div>
<button class="btn btn-primary" onclick="doRegister()">注册</button>
<button class="btn btn-gray" onclick="showScreen('welcomeScreen')">返回</button>
</div></div></div>
<div class="screen" id="loginScreen"><div class="welcome-screen"><h2>🔑 用户登录</h2>
<div class="auth-form">
<input id="loginUser" placeholder="用户名" maxlength="20">
<input type="password" id="loginPass" placeholder="密码" maxlength="30">
<div class="remember-row"><input type="checkbox" id="rememberMe"><label for="rememberMe">记住我（自动登录）</label></div>
<div class="error-msg" id="loginError"></div>
<button class="btn btn-success" onclick="doLogin()">登录</button>
<button class="btn btn-gray" onclick="showScreen('welcomeScreen')">返回</button>
</div></div></div>
<div class="screen" id="mainScreen">
<div class="top-bar" id="topBar"></div>
<div class="grammar-bar" id="grammarBar"></div>
<div style="text-align:center;padding:10px"><button class="btn btn-warning btn-lg" onclick="startExam()" style="font-size:1.1rem">📝 模拟考试</button></div>
<div class="quiz-area" id="quizArea"><h2 style="opacity:.5">👆 请在上方选择一个语法关卡开始闯关</h2></div>
</div>
<div class="screen" id="examScreen">
<div style="padding:15px;background:rgba(253,203,110,.2);display:flex;align-items:center;gap:10px">
<button class="btn btn-sm btn-gray" onclick="confirmExitExam()">⬅ 退出考试</button>
<span style="font-weight:bold">📝 模拟考试</span>
<span id="examProgress" style="margin-left:auto"></span>
</div>
<div id="examTimer" class="exam-timer" style="display:none"></div>
<div class="quiz-area" id="examQuizArea"></div>
</div>
<div class="screen" id="wrongTrainingScreen">
<div style="padding:15px;background:rgba(214,48,49,.2);display:flex;align-items:center;gap:10px">
<button class="btn btn-sm btn-gray" onclick="exitWT()">⬅ 返回</button>
<span style="font-weight:bold">📝 错题训练</span>
<span id="wrongTrainingProgress" style="margin-left:auto"></span>
</div>
<div class="quiz-area" id="wrongQuizArea"></div>
</div>
<div id="toastContainer"></div>
<script>
var DEFAULT_QUESTION_BANK=[{"levelName": "人称代词和物主代词", "questions": [{"question": "______ am a student. I go to school every day.", "options": ["I", "You", "He", "She"], "answer": 0, "explanation": "「I」是第一人称单数主格，表示“我”，在句中作主语。", "source": "ai"}, {"question": "This is my book. That book is ______.", "options": ["my", "mine", "me", "I"], "answer": 1, "explanation": "「mine」是名词性物主代词，相当于 my book，表示“我的书”。", "source": "ai"}, {"question": "______ is my best friend. Her name is Lucy.", "options": ["He", "She", "It", "They"], "answer": 1, "explanation": "「She」是女性第三人称单数主格，指代 Lucy。", "source": "ai"}, {"question": "Please give ______ a glass of water.", "options": ["I", "me", "my", "mine"], "answer": 1, "explanation": "「me」是第一人称宾格，在动词 give 后作宾语。", "source": "ai"}, {"question": "We love ______ school. It is very beautiful.", "options": ["we", "us", "our", "ours"], "answer": 2, "explanation": "「our」是形容词性物主代词，修饰名词 school。", "source": "ai"}, {"question": "This is not my pen. ______ is blue.", "options": ["My", "Mine", "Me", "I"], "answer": 1, "explanation": "「Mine」是名词性物主代词，在句中作主语。", "source": "ai"}, {"question": "The cat is hungry. Please feed ______.", "options": ["it", "its", "it's", "itself"], "answer": 0, "explanation": "「it」是宾格，在动词 feed 后作宾语。", "source": "ai"}, {"question": "My brother is tall. ______ likes playing basketball.", "options": ["She", "He", "It", "They"], "answer": 1, "explanation": "「He」是男性第三人称单数主格，指代 brother。", "source": "ai"}, {"question": "Tom and Jerry are friends. ______ play together every day.", "options": ["He", "She", "It", "They"], "answer": 3, "explanation": "「They」是复数主格，指代 Tom and Jerry。", "source": "ai"}, {"question": "This is ______ new bike. I like it very much.", "options": ["I", "me", "my", "mine"], "answer": 2, "explanation": "「my」是形容词性物主代词，修饰名词 bike。", "source": "ai"}, {"question": "Is this ______ bag? Yes, it's hers.", "options": ["she", "her", "hers", "herself"], "answer": 1, "explanation": "「her」是形容词性物主代词，修饰名词 bag。", "source": "ai"}, {"question function hashPwd(p){var h=btoa(p),a=h.split('');for(var i=0;i<a.length;i+=2){var c=a[i].charCodeAt(0);a[i]=String.fromCharCode(((c^42)%94)+33)}return a.join('')}

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(a){var arr=[].concat(a);for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}

function doRegister(){var n=$('regUser').value.trim(),p=$('regPass').value,p2=$('regPass2').value,e=$('regError');if(n.length<2){e.textContent='用户名至少2个字符';return}if(!/^[\w\u4e00-\u9fa5]+$/.test(n)){e.textContent='用户名只能包含中英文/数字/下划线';return}if(p.length<4){e.textContent='密码至少4位';return}if(!/^[a-zA-Z0-9]+$/.test(p)){e.textContent='密码只能包含数字或字母';return}if(p!==p2){e.textContent='两次密码不一致';return}var u=getUsers();if(u.find(function(x){return x.username===n})){e.textContent='用户名已存在';return}u.push({username:n,passwordHash:hashPwd(p),isAdmin:false});saveUsers(u);toast('注册成功！请登录');showScreen('loginScreen')}
function doLogin(){var n=$('loginUser').value.trim(),p=$('loginPass').value,e=$('loginError');if(!n||!p){e.textContent='请输入用户名和密码';return}var u=getUsers(),user=u.find(function(x){return x.username===n});if(!user){e.textContent='用户不存在';return}if(user.passwordHash!==hashPwd(p)){e.textContent='密码错误';return}curUser=user.username;if($('rememberMe').checked){lsSet(uk('loginState'),true)}else{lsSet(uk('loginState'),false)}toast('欢迎回来，'+curUser+'！');showScreen('mainScreen');initMain()}

function renderQuiz(q,isW){
var area=isW?$('wrongQuizArea'):$('quizArea');
var total=isW?wQueue.length:getLevelQuestions(curGrammar).length;
var idx=isW?wIdx+1:(getProg(curGrammar).answered+1);
var tag=q.source==='ai'?'<span class="quiz-tag ai">AI生成</span>':'<span class="quiz-tag original">原题</span>';
var h='<div class="quiz-progress">'+(isW?'📝 错题训练 '+idx+'/'+total+' | 已掌握 '+wMastered+' 道':'📊 '+curGrammar+' | 第 '+idx+' 题 '+tag)+'</div>';
h+='<div class="quiz-question">'+q.question+'</div>';
h+='<div class="quiz-options" id="quizOpts">';
var labels=['A','B','C','D'];
for(var i=0;i<q.options.length;i++){h+='<button class="quiz-option" onclick="doAnswer('+i+','+isW+')"><strong>'+labels[i]+'.</strong> '+q.options[i]+'</button>'}
h+='</div>';
h+='<div id="nextBtnArea" style="display:none;margin-top:10px"><button class="btn btn-next" onclick="goNext('+isW+')">▶ 下一题</button></div>';
h+='<div id="explanationArea" style="display:none"></div>';
area.innerHTML=h;quizLocked=false}

function doAnswer(si,isW){
if(quizLocked)return;quizLocked=true;
var q=isW?wQueue[wIdx]:curQuestion;
var ci=q.answer,isC=(si===ci);
var opts=document.querySelectorAll('#quizOpts .quiz-option');
for(var i=0;i<opts.length;i++){opts[i].style.pointerEvents='none';if(i===ci)opts[i].classList.add('correct');if(i===si&&!isC)opts[i].classList.add('wrong');if(i===ci&&!isC)setTimeout(function(o){o.classList.add('flash-correct')},200,opts[i])}
if(isC){playSound(true);if(!isW)settle(true);$('nextBtnArea').style.display='block';$('explanationArea').style.display='none';$('nextBtnArea').innerHTML='<div style="font-size:1.2rem;color:#00b894;margin-bottom:8px">✨ 太棒了！✅</div><button class="btn btn-next" onclick="goNext('+isW+')">▶ 下一题</button>'}
else{playSound(false);if(!isW){addWB(q);settle(false)}$('nextBtnArea').style.display='block';var expDiv=$('explanationArea');expDiv.style.display='block';expDiv.innerHTML='<div class="explanation-box"><strong>📖 解析：</strong>'+q.explanation+'</div>';$('nextBtnArea').innerHTML='<button class="btn btn-next" onclick="goNext('+isW+')">▶ 下一题</button>'}
if(isW){var wb=getWB(),w=wb.find(function(x){return x.key===q.key});if(isC){if(w){w.consecutiveCorrect++;if(w.consecutiveCorrect>=2){w.mastered=true;wMastered++;addPts(2);toast('✅ 错题已掌握！+2积分')}}wCorrect++}else{if(w){w.wrongCount++;w.consecutiveCorrect=0;w.lastWrong=Date.now()}}saveWB(wb)}else{var p=getProg(curGrammar);p.answered++;saveProg(curGrammar,p)}updateTopBar()}

function goNext(isW){if(isW){wIdx++;if(wIdx>=wQueue.length){finishWT();return}curQuestion=wQueue[wIdx];renderQuiz(curQuestion,true);updateWTProg()}else{nextQ()}}

function nextQ(){
if(!curGrammar)return;
var qs=getLevelQuestions(curGrammar);
if(qs.length===0){$('quizArea').innerHTML='<h2>该关卡暂无题目</h2>';return}
var uk2=uk('used_'+curGrammar),used=lsGet(uk2,[]);
var avail=[];for(var i=0;i<qs.length;i++){if(used.indexOf(i)===-1)avail.push(i)}
if(avail.length===0){lsSet(uk2,[]);curQuestion=qs[ri(0,qs.length-1)]}
else{var idx=avail[ri(0,avail.length-1)];curQuestion=qs[idx];used.push(idx)}
if(used.length>qs.length*2)lsSet(uk2,[]);else lsSet(uk2,used);
renderQuiz(curQuestion,false);updateTopBar()}

function getProg(g){return lsGet(uk('prog_'+g),{answered:0})}

function settle(correct){groupTotal++;if(correct)groupCorrect++;if(groupTotal>=5){var stars=0,pts=0;if(groupCorrect===5){stars=1;pts=10;consecutiveFull++;if(consecutiveFull>=3){pts+=20;toast('🔥 连续3组全对！额外+20积分！');consecutiveFull=0}spawnStar();addDailyStar()}else if(groupCorrect===4){pts=5;consecutiveFull=0}else if(groupCorrect===3){pts=2;consecutiveFull=0}else{consecutiveFull=0}if(stars>0)addStars(stars);if(pts>0){addPts(pts);toast('🎉 获得 '+pts+' 积分！'+(stars>0?' +1⭐':''))}groupCorrect=0;groupTotal=0}}

function startWT(fg){wMode=true;var wb=getWB().filter(function(w){return !w.mastered});if(fg)wb=wb.filter(function(w){return w.grammar===fg});if(wb.length===0){toast('没有待训练的错题！');wMode=false;return}wb.sort(function(a,b){if(b.wrongCount!==a.wrongCount)return b.wrongCount-a.wrongCount;return b.lastWrong-a.lastWrong});wQueue=wb.slice(0,20);wIdx=0;wCorrect=0;wMastered=0;showScreen('wrongTrainingScreen');curQuestion=wQueue[0];renderQuiz(curQuestion,true);updateWTProg()}

function renderAQBank(){var bank=getQB(),total=0;for(var i=0;i<bank.length;i++)total+=bank[i].questions.length;var h='<p>📊 总题数：<strong>'+total+'</strong> | 关卡数：<strong>'+bank.length+'</strong></p>';h+='<table class="admin-table"><thead><tr><th>关卡</th><th>题数</th><th>AI题</th><th>原题</th><th>操作</th></tr></thead><tbody>';for(var i=0;i<bank.length;i++){var l=bank[i],ai=l.questions.filter(function(q){return q.source==='ai'}).length,og=l.questions.length-ai;h+='<tr><td>'+l.levelName+'</td><td>'+l.questions.length+'</td><td>'+ai+'</td><td>'+og+'</td><td><button class="btn btn-sm btn-primary" onclick="viewLevelDetail('+i+')">查看</button> <button class="btn btn-sm btn-danger" onclick="delLevel('+i+')">删除</button></td></tr>'}h+='</tbody></table>';h+='<h4 style="margin-top:15px">📥 导入题库</h4><p style="font-size:.8rem;opacity:.7">粘贴JSON数组，每个元素包含 levelName 和 questions 字段，新题目会追加到对应关卡</p>';h+='<textarea id="impTxt" placeholder=\'[{"levelName":"一般现在时","questions":[{"question":"...","options":["A","B","C","D"],"answer":0,"explanation":"...","source":"original"}]}]\'></textarea>';h+='<button class="btn btn-primary" onclick="preImport()" style="margin-top:8px">预览导入</button><div id="impPre"></div>';h+='<h4 style="margin-top:15px">📤 导出题库</h4><button class="btn btn-success" onclick="exportQB()">导出全部题库 JSON</button> ';h+='<button class="btn btn-danger" onclick="if(confirm(\'确定清空全部题库？此操作不可恢复！\')){lsSet(\'questionBank\',[]);renderAQBank();toast(\'题库已清空\')}">🗑️ 清空题库</button>';var t=$('aQBank');if(t)t.innerHTML=h}
function viewLevelDetail(idx){var bank=getQB(),level=bank[idx];if(!level)return;var h='<table class="admin-table"><thead><tr><th>#</th><th>题干</th><th>答案</th><th>来源</th><th>操作</th></tr></thead><tbody>';for(var i=0;i<level.questions.length;i++){var q=level.questions[i],qt=q.question.length>50?q.question.slice(0,50)+'...':q.question;h+='<tr><td>'+(i+1)+'</td><td>'+qt+'</td><td>'+['A','B','C','D'][q.answer]+'</td><td>'+(q.source==='ai'?'AI':'原题')+'</td><td><button class="btn btn-sm btn-danger" onclick="delQFromLevel('+idx+','+i+')">删除</button></td></tr>'}h+='</tbody></table>';openModal('📋 '+level.levelName+' 题目详情',h,780)}
function delQFromLevel(li,qi){if(!confirm('确定删除该题目？'))return;var bank=getQB();bank[li].questions.splice(qi,1);lsSet('questionBank',bank);toast('题目已删除');viewLevelDetail(li);renderAQBank()}
function delLevel(li){if(!confirm('确定删除整个关卡？此操作不可恢复！'))return;var bank=getQB();bank.splice(li,1);lsSet('questionBank',bank);renderAQBank();toast('关卡已删除')}
function preImport(){var txt=$('impTxt')?$('impTxt').value:'';try{var data=JSON.parse(txt);if(!Array.isArray(data)){throw new Error('必须是数组')}pendingImport=data;var c=0;for(var i=0;i<data.length;i++){if(data[i].questions)for(var j=0;j<data[i].questions.length;j++)c++}var h='<p>预览：将导入 <strong>'+data.length+'</strong> 个新关卡内容，共 <strong>'+c+'</strong> 道题</p>';h+='<button class="btn btn-primary" onclick="cfmImport()">确认导入</button>';$('impPre').innerHTML=h}catch(e){$('impPre').innerHTML='<p style="color:#ff6b6b">JSON格式错误：'+e.message+'</p>'}}
function cfmImport(){if(pendingImport.length===0)return;var bank=getQB();for(var i=0;i<pendingImport.length;i++){var item=pendingImport[i];var found=bank.find(function(l){return l.levelName===item.levelName});if(found){if(item.questions)for(var j=0;j<item.questions.length;j++){var q=item.questions[j];if(!q.source)q.source='original';found.questions.push(q)}}else{if(item.questions)for(var j=0;j<item.questions.length;j++){if(!item.questions[j].source)item.questions[j].source='original'}bank.push(item)}}lsSet('questionBank',bank);pendingImport=[];$('impPre').innerHTML='<p style="color:#00b894">✅ 导入成功！</p>';renderAQBank();renderGramBar();toast('题库已更新')}
function exportQB(){var bank=getQB(),json=JSON.stringify(bank,null,2);var blob=new Blob([json],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='questionBank_backup.json';a.click();toast('题库已导出')}

function renderAExam(){var settings=lsGet('examSettings',DEFAULT_EXAM_SETTINGS);var bank=getQB(),total=0;for(var i=0;i<bank.length;i++)total+=bank[i].questions.length;var h='<p>题库总题数：<strong>'+total+'</strong></p>';h+='<label>考试总题数：<input id="examTotal" type="number" value="'+(settings.totalQuestions||100)+'" min="1" max="'+total+'" style="width:100px;padding:6px;border-radius:10px;background:rgba(10,10,40,.8);color:#e0e0ff;border:1px solid rgba(100,150,255,.3);font-family:inherit"></label>';h+='<label style="margin-left:15px">显示计时器：<input type="checkbox" id="examTimerCb" '+(settings.showTimer?'checked':'')+' style="accent-color:#6c5ce7"></label>';h+='<h4 style="margin-top:15px">📊 得分奖励规则</h4><div id="rewardRows">';for(var i=0;i<settings.scoreRewards.length;i++){var r=settings.scoreRewards[i];h+='<div style="margin:5px 0">最低分：<input type="number" value="'+r.min+'" class="rMin" style="width:60px"> 最高分：<input type="number" value="'+r.max+'" class="rMax" style="width:60px"> ⭐：<input type="number" value="'+r.stars+'" class="rStars" style="width:50px"> 积分：<input type="number" value="'+r.points+'" class="rPts" style="width:50px"> <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">删除</button></div>'}h+='</div>';h+='<button class="btn btn-sm btn-success" onclick="addRewardRow()">+ 添加奖励行</button>';h+='<br><button class="btn btn-primary" onclick="saveExamSettings()" style="margin-top:10px">💾 保存考试设置</button>';var t=$('aExam');if(t)t.innerHTML=h}
function addRewardRow(){var d=document.createElement('div');d.style.margin='5px 0';d.innerHTML='最低分：<input type="number" value="0" class="rMin" style="width:60px"> 最高分：<input type="number" value="0" class="rMax" style="width:60px"> ⭐：<input type="number" value="0" class="rStars" style="width:50px"> 积分：<input type="number" value="0" class="rPts" style="width:50px"> <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">删除</button>';$('rewardRows').appendChild(d)}
function saveExamSettings(){var total=parseInt($('examTotal')?$('examTotal').value:100);var bank=getQB(),allTotal=0;for(var i=0;i<bank.length;i++)allTotal+=bank[i].questions.length;if(total<1){toast('题数至少为1');return}if(total>allTotal){toast('题数不能超过题库总题数('+allTotal+')');return}var rewards=[];var mins=document.querySelectorAll('.rMin');var maxes=document.querySelectorAll('.rMax');var stars=document.querySelectorAll('.rStars');var pts=document.querySelectorAll('.rPts');for(var i=0;i<mins.length;i++){rewards.push({min:parseInt(mins[i].value)||0,max:parseInt(maxes[i].value)||0,stars:parseInt(stars[i].value)||0,points:parseInt(pts[i].value)||0})}var settings={totalQuestions:total,showTimer:$('examTimerCb')?$('examTimerCb').checked:false,levelRatios:{},scoreRewards:rewards};lsSet('examSettings',settings);toast('考试设置已保存')}

function init(){
initAdmin();initQB();
if(!lsGet('shopItems',null))lsSet('shopItems',DEFAULT_SHOP);
if(!lsGet('examSettings',null))lsSet('examSettings',DEFAULT_EXAM_SETTINGS);
var users=getUsers();
for(var i=0;i<users.length;i++){if(lsGet(users[i].username+'_loginState',false)){curUser=users[i].username;showScreen('mainScreen');initMain();return}}
showScreen('welcomeScreen');
var canvas=$('starsCanvas'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
var starsArr=[];
for(var i=0;i<80;i++){starsArr.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.5,a:Math.random()*0.5+0.5,sp:Math.random()*0.02+0.005})}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);for(var i=0;i<starsArr.length;i++){var s=starsArr[i];s.a+=s.sp;if(s.a>1||s.a<0.2)s.sp=-s.sp;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+s.a+')';ctx.fill()}requestAnimationFrame(animate)}
animate();
}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
