var TARGET=300,LV=5;
function poolSize(g){let q=getQByGrammar(g),c=q.length;return c>=300?Math.ceil(c/.8):TARGET}
function lvSize(g){return Math.floor(poolSize(g)/LV)}
function getLevel(g){let p=getProg(g),sz=lvSize(g);return Math.min(LV,Math.floor(p.answered/sz)+1)}

function buildPool(g){
  let qs=getQByGrammar(g),ps=poolSize(g),ls=lvSize(g),lvs=[];
  for(let lv=0;lv<LV;lv++){
    let st=lv*ls,en=(lv===LV-1)?qs.length:st+ls;
    let orig=qs.slice(st,Math.min(en,qs.length));
    let ot=Math.floor(ls*.8),at=ls-ot;
    let sel=orig.slice(0,ot).map(function(q){return Object.assign({},q,{source:'original',id:q.grammar+'|'+q.question})});
    for(let i=0;i<at;i++)sel.push(genAIQ(g,lv+1,i));
    lvs.push(shuffle(sel));
  }
  return lvs;
}

    {q:'I ___ my homework already.',o:['finish','finished','have finished','finishing'],a:'have finished'},
    {q:'___ sun rises in the east.',o:['A','An','The','/'],a:'The'},
    {q:'There ___ many books on the desk.',o:['is','are','was','be'],a:'are'},
    {q:'Let ___ go to the park.',o:['we','us','our','ours'],a:'us'},
    {q:'You ___ obey the school rules.',o:['can','may','must','need'],a:'must'},
    {q:'She is ___ than her sister.',o:['tall','taller','tallest','more tall'],a:'taller'}
  ];
  let t=tmpl[(idx+level*g.length)%tmpl.length];
  let opts=shuffle(t.o),cAns=t.a,ai=opts.indexOf(cAns);
  return{grammar:g,question:t.q,options:opts,answer:ai>=0?ai:0,source:'ai',id:g+'|ai_'+level+'_'+idx};

function settle(correct){
  groupTotal++;if(correct)groupCorrect++;
  if(groupTotal>=5){
    let stars=0,pts=0;
    if(groupCorrect===5){stars=1;pts=10;consecutiveFull++;if(consecutiveFull>=3){pts+=20;toast('🔥 连续3组全对！+20积分！');consecutiveFull=0}spawnStar();addDailyStar()}
    else if(groupCorrect===4){pts=5;consecutiveFull=0}
    else if(groupCorrect===3){pts=2;consecutiveFull=0}
    else{consecutiveFull=0}
    if(stars>0)addStars(stars);if(pts>0)addPts(pts);
    groupCorrect=0;groupTotal=0;
  }
}

function showLevelUp(lv){

  document.body.appendChild(o);playSound(!0);setTimeout(function(){if(o.parentElement)o.remove()},3000);
}

function maybeLevelUp(g){
  let p=getProg(g),sz=lvSize(g),nl=Math.min(LV,Math.floor(p.answered/sz)+1),ol=p.level||1;
  if(nl>ol){p.level=nl;saveProg(g,p);showLevelUp(nl)}return nl;
}

function renderQuiz(q,isW){
  let area=isW?$('wrongQuizArea'):$('quizArea');
  let total=isW?wQueue.length:poolSize(curGrammar);
  let idx=isW?wIdx+1:(getProg(curGrammar).answered+1);
  let lv=isW?q.difficultyLevel||1:getLevel(curGrammar);
  let h='<div class="quiz-progress">';
  if(isW)h+='📝 错题训练 '+idx+'/'+total+' | 已掌握 '+wMastered+' 道';
  else{h+='📊 '+curGrammar+' | Lv.'+lv+' | 第 '+idx+' 题';if(q.source==='ai')h+=' <span class="quiz-ai-tag">AI生成</span>'}
  h+='</div><div class="quiz-question">'+q.question+'</div><div class="quiz-options" id="quizOpts">';
  let labels=['A','B','C','D'];
  for(let i=0;i<q.options.length;i++){
    h+='<button class="quiz-option" data-idx="'+i+'" onclick="doAnswer('+i+','+isW+')"><strong>'+labels[i]+'.</strong> '+q.options[i]+(q.source==='ai'?' <span class="quiz-ai-tag">AI</span>':'')+'</button>';
  }
  h+='</div>';area.innerHTML=h;quizLocked=!1;
}

function doAnswer(si,isW){
  if(quizLocked)return;quizLocked=!0;
  let q=isW?wQueue[wIdx]:curQuestion,ci=q.answer,isC=(si===ci);
  let opts=document.querySelectorAll('#quizOpts .quiz-option');
  opts.forEach(function(o,i){o.style.pointerEvents='none';if(i===ci)o.classList.add('correct');if(i===si&&!isC)o.classList.add('wrong');if(i===ci&&!isC)setTimeout(function(){o.classList.add('flash-correct')},200)});
  if(isC){playSound(!0);if(!isW)settle(!0)}
  else{playSound(!1);if(!isW){addWB(q,getLevel(curGrammar));settle(!1)}}
  if(isW){
    let wb=getWB(),w=wb.find(function(x){return x.key===q.key});
    if(isC){if(w){w.consecutiveCorrect++;if(w.consecutiveCorrect>=2){w.mastered=!0;wMastered++;addPts(2);toast('✅ 错题已掌握！+2积分')}}wCorrect++}
    else{if(w){w.wrongCount++;w.consecutiveCorrect=0;w.lastWrong=Date.now()}}
    saveWB(wb);
  }else{
    let p=getProg(curGrammar);p.answered++;saveProg(curGrammar,p);maybeLevelUp(curGrammar);
  }
  setTimeout(function(){
    if(isW){wIdx++;if(wIdx>=wQueue.length)finishWT();else{curQuestion=wQueue[wIdx];renderQuiz(curQuestion,!0);updateWTProg()}}
    else nextQ();
  },800);
}

function nextQ(){
  if(!curGrammar)return;
  let p=getProg(curGrammar),lv=getLevel(curGrammar),pools=buildPool(curGrammar),pool=pools[lv-1]||pools[0];
  let uk2=uk('used_'+curGrammar),used=lsGet(uk2,[]);
  let avail=pool.filter(function(q){return used.indexOf(q.id)===-1});
  if(avail.length===0){lsSet(uk2,[]);curQuestion=pool[ri(0,pool.length-1)]}
  else curQuestion=avail[ri(0,avail.length-1)];
  used.push(curQuestion.id);
  if(used.length>pool.length*2)lsSet(uk2,[]);else lsSet(uk2,used);
  renderQuiz(curQuestion,!1);updateTopBar();
}

// ============ 错题训练 ============
function startWT(fg){
  wMode=!0;let wb=getWB().filter(function(w){return !w.mastered});if(fg)wb=wb.filter(function(w){return w.grammar===fg});
  if(wb.length===0){toast('没有待训练的错题！');wMode=!1;return}
  wb.sort(function(a,b){if(b.wrongCount!==a.wrongCount)return b.wrongCount-a.wrongCount;return b.lastWrong-a.lastWrong});
  wQueue=wb.slice(0,20);wIdx=0;wCorrect=0;wMastered=0;
  showScreen('wrongTrainingScreen');curQuestion=wQueue[0];renderQuiz(curQuestion,!0);updateWTProg();
}
function updateWTProg(){$('wrongTrainingProgress').textContent='第 '+(wIdx+1)+'/'+wQueue.length+' 题'}
function finishWT(){
  wMode=!1;let rate=wQueue.length>0?Math.round(wCorrect/wQueue.length*100):0;
  let o=document.createElement('div');o.className='level-up-overlay';
  o.innerHTML='<div class="level-up-box"><h2>📝 训练结束</h2><p>正确率：'+rate+'%</p><p>新掌握：'+wMastered+' 道错题</p><button class="btn btn-success" onclick="this.parentElement.parentElement.remove();showScreen(\'mainScreen\');initMain()">返回</button></div>';
  document.body.appendChild(o);
}

  openModal('➕ 添加商品',h,450);
}
function saveNewItem(){
  let items=getShop(),nid=items.length>0?Math.max(...items.map(function(i){return i.id}))+1:1;
  items.push({id:nid,icon:document.getElementById('aIcon')?.value||'🎁',name:document.getElementById('aName')?.value||'新商品',cost:parseInt(document.getElementById('aCost')?.value||50),type:document.getElementById('aType')?.value||'permanent',days:parseInt(document.getElementById('aDays')?.value||0),desc:document.getElementById('aDesc')?.value||'',active:document.getElementById('aActive')?.value==='1'});
  saveShop(items);document.querySelectorAll('.modal-overlay').forEach(function(m){m.remove()});openAdmin();toast('商品已添加！');
}
function editItemForm(id){
  let items=getShop(),it=items.find(function(i){return i.id===id});if(!it)return;
  let h='<div class="auth-form" style="width:100%;max-width:100%"><label>图标：<input id="eIcon" value="'+it.icon+'"></label><label>名称：<input id="eName" value="'+it.name+'"></label><label>积分：<input id="eCost" type="number" value="'+it.cost+'"></label><label>类型：<select id="eType"><option value="permanent"'+(it.type==='permanent'?' selected':'')+'>永久</option><option value="limited"'+(it.type==='limited'?' selected':'')+'>限时</option></select></label><label>天数：<input id="eDays" type="number" value="'+(it.days||0)+'"></label><label>描述：<input id="eDesc" value="'+(it.desc||'')+'"></label><label>上架：<select id="eActive"><option value="1"'+(it.active?' selected':'')+'>上架</option><option value="0"'+(it.active?'':' selected')+'>下架</option></select></label><button class="btn btn-primary" onclick="saveEditItem('+id+')">保存修改</button></div>';
  openModal('✏️ 编辑商品',h,450);
}
function saveEditItem(id){
  let items=getShop(),it=items.find(function(i){return i.id===id});if(!it)return;
  it.icon=document.getElementById('eIcon')?.value||it.icon;it.name=document.getElementById('eName')?.value||it.name;
  it.cost=parseInt(document.getElementById('eCost')?.value||it.cost);it.type=document.getElementById('eType')?.value||it.type;
  it.days=parseInt(document.getElementById('eDays')?.value||0);it.desc=document.getElementById('eDesc')?.value||it.desc;
  it.active=document.getElementById('eActive')?.value==='1';saveShop(items);
  document.querySelectorAll('.modal-overlay').forEach(function(m){m.remove()});openAdmin();toast('商品已更新！');
}
function delItem(id){if(!confirm('确定删除？'))return;let items=getShop();saveShop(items.filter(function(i){return i.id!==id}));openAdmin();toast('已删除')}

// 题库管理
function renderAQBank(){
  let bank=getQB(),gs=[...new Set(bank.map(function(q){return q.grammar}))];
  let h='<div style="margin-bottom:15px;padding:10px;background:rgba(40,40,100,.4);border-radius:10px"><strong>题库总览：</strong>总题数 <strong>'+bank.length+'</strong> | 语法点 <strong>'+gs.length+'</strong>';
  h+='<table class="admin-table" style="margin-top:8px"><thead><tr><th>语法点</th><th>题数</th></tr></thead><tbody>';
  for(let i=0;i<gs.length;i++){let g=gs[i];h+='<tr><td>'+g+'</td><td>'+bank.filter(function(q){return q.grammar===g}).length+'题</td></tr>'}
  h+='</tbody></table></div>';
  h+='<div style="margin-bottom:10px"><strong>📥 导入新题库</strong></div>';
  h+='<textarea id="impTxt" placeholder=\'粘贴JSON: [{"grammar":"语法","question":"题","options":["A","B","C","D"],"answer":0},...]\'></textarea>';
  h+='<div style="margin-top:5px;display:flex;gap:10px"><button class="btn btn-sm btn-primary" onclick="preImport()">🔍 解析预览</button><button class="btn btn-sm btn-success" id="cfmBtn" style="display:none" onclick="cfmImport()">✅ 确认导入</button></div><div id="impPre"></div>';
  h+='<div style="margin:15px 0"><strong>📋 查看题库</strong> <select id="qbVF" onchange="renderQBV()" style="padding:4px 10px;border-radius:12px;background:rgba(10,10,40,.8);color:#e0e0ff;border:1px solid rgba(100,150,255,.3);font-family:inherit"><option value="all">全部</option>';
  for(let i=0;i<gs.length;i++)h+='<option value="'+gs[i]+'">'+gs[i]+'</option>';
  h+='</select></div><div id="qbV" style="max-height:400px;overflow-y:auto"></div>';
  h+='<div style="margin-top:15px;display:flex;gap:10px"><button class="btn btn-sm btn-primary" onclick="exportQB()">📤 导出题库</button><button class="btn btn-sm btn-danger" onclick="clearQBPrompt()">🗑️ 清空题库</button></div>';
  let t=document.getElementById('aQBank');if(t)t.innerHTML=h;renderQBV();
}
function preImport(){
  let ta=document.getElementById('impTxt');if(!ta)return;let raw=ta.value.trim();if(!raw){toast('请粘贴数据');return}
  let parsed;try{parsed=JSON.parse(raw)}catch(e){document.getElementById('impPre').innerHTML='<p style="color:#ff6b6b">JSON错误：'+e.message+'</p>';return}
  let flat=[];
  if(Array.isArray(parsed))flat=parsed;
  else if(typeof parsed==='object'){for(let g in parsed){let ql=parsed[g];for(let i=0;i<ql.length;i++){let q=ql[i],av=q.answer,ai=typeof av==='number'?av:(typeof av==='string'&&av.length===1&&av>='A'&&av<='D'?av.charCodeAt(0)-65:0);flat.push({grammar:g,question:q.question,options:q.options,answer:ai})}}}
  else{document.getElementById('impPre').innerHTML='<p style="color:#ff6b6b">不支持的格式</p>';return}
  pendingImport=flat;let bank=getQB(),eks=new Set(bank.map(function(q){return q.grammar+'|||'+q.question+'|||'+q.options.join('@@')}));
  let nq=flat.filter(function(q){return !eks.has(q.grammar+'|||'+q.question+'|||'+q.options.join('@@'))}),sk=flat.length-nq.length;
  let ngs=[...new Set(nq.map(function(q){return q.grammar}))],egs=new Set([...new Set(bank.map(function(q){return q.grammar}))]);
  let bng=ngs.filter(function(g){return !egs.has(g)});
  let ph='<div style="background:rgba(0,184,148,.15);padding:10px;border-radius:10px"><p>📊 新增 <strong>'+nq.length+'</strong> 道题，涉及 <strong>'+ngs.length+'</strong> 个语法点</p>';
  if(sk>0)ph+='<p style="color:#fdcb6e">⚠️ 跳过 <strong>'+sk+'</strong> 道重复题</p>';
  if(bng.length>0)ph+='<p style="color:#00b894">🆕 新语法点：'+bng.join('、')+'</p>';
  ph+='<p>';let cts={};nq.forEach(function(q){cts[q.grammar]=(cts[q.grammar]||0)+1});
  for(let g in cts)ph+='<span'+(bng.indexOf(g)>=0?' class="new-grammar"':'')+' style="margin:0 5px;padding:2px 8px;border-radius:10px;display:inline-block">'+g+'：'+cts[g]+'题'+(bng.indexOf(g)>=0?' 🆕':'')+'</span>';
  ph+='</p></div><table class="admin-table" style="margin-top:10px"><thead><tr><th>语法点</th><th>题干</th><th>选项</th><th>答案</th></tr></thead><tbody>';
  let lb=['A','B','C','D'];
  for(let i=0;i<Math.min(nq.length,50);i++){let q=nq[i],qt=q.question.length>30?q.question.slice(0,30)+'...':q.question;
    ph+='<tr'+(bng.indexOf(q.grammar)>=0?' class="new-grammar"':'')+'><td>'+q.grammar+'</td><td title="'+q.question.replace(/"/g,'&quot;')+'">'+qt+'</td><td>'+q.options.slice(0,4).map(function(o,j){return lb[j]+'. '+o}).join('<br>')+'</td><td>'+lb[q.answer]+'</td></tr>'}
  if(nq.length>50)ph+='<tr><td colspan="4" style="text-align:center">...还有'+(nq.length-50)+'道</td></tr>';
  ph+='</tbody></table>';document.getElementById('impPre').innerHTML=ph;
  let btn=document.getElementById('cfmBtn');if(btn)btn.style.display=nq.length>0?'inline-block':'none';
}
function cfmImport(){
  if(pendingImport.length===0)return;let bank=getQB(),eks=new Set(bank.map(function(q){return q.grammar+'|||'+q.question+'|||'+q.options.join('@@')}));
  let added=0,skipped=0;
  for(let i=0;i<pendingImport.length;i++){let q=pendingImport[i],k=q.grammar+'|||'+q.question+'|||'+q.options.join('@@');if(eks.has(k))skipped++;else{bank.push(q);eks.add(k);added++}}
  lsSet('questionBank',bank);toast('✅ 成功导入 '+added+' 道新题！'+(skipped>0?' 跳过'+skipped+'道重复。':''));pendingImport=[];renderAQBank();
}
function renderQBV(){
  let f=document.getElementById('qbVF')?.value||'all',bank=getQB();if(f!=='all')bank=bank.filter(function(q){return q.grammar===f});
  let c=document.getElementById('qbV');if(!c)return;
  if(bank.length===0){c.innerHTML='<p style="text-align:center;opacity:.5">无题目</p>';return}
  let grp={};bank.forEach(function(q){if(!grp[q.grammar])grp[q.grammar]=[];grp[q.grammar].push(q)});
  let h='',lb=['A','B','C','D'];
  for(let g in grp){let items=grp[g];
    h+='<div style="margin-bottom:5px;cursor:pointer;padding:5px 10px;background:rgba(40,40,100,.4);border-radius:8px" onclick="var n=this.nextElementSibling;n.style.display=n.style.display===\'none\'?\'block\':\'none\'"><strong>'+g+'</strong> ('+items.length+'题) 🔽</div>';
    h+='<div style="display:none;margin-bottom:10px"><table class="admin-table"><thead><tr><th>#</th><th>题干</th><th>选项</th><th>答案</th><th>来源</th><th>操作</th></tr></thead><tbody>';
    for(let i=0;i<items.length;i++){let q=items[i],qt=q.question.length>30?q.question.slice(0,30)+'...':q.question;
      h+='<tr><td>'+(i+1)+'</td><td title="'+q.question.replace(/"/g,'&quot;')+'">'+qt+'</td><td>'+q.options.slice(0,4).map(function(o,j){return lb[j]+'. '+o}).join('<br>')+'</td><td>'+lb[q.answer]+'</td><td>'+(q.source==='ai'?'AI':'原题')+'</td><td><button class="btn btn-sm btn-danger" onclick="delQBQ(\''+q.grammar.replace(/'/g,"\\'")+'\',\''+q.question.replace(/'/g,"\\'").replace(/\\/g,'\\\\')+'\')">删除</button></td></tr>'}h+='</tbody></table></div>';}
  c.innerHTML=h;
}
function delQBQ(g,q){if(!confirm('确定删除此题？'))return;let bank=getQB();bank=bank.filter(function(x){return !(x.grammar===g&&x.question===q)});lsSet('questionBank',bank);renderAQBank();toast('题目已删除')}
function exportQB(){let bank=getQB(),blob=new Blob([JSON.stringify(bank,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='题库_备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('题库已导出！')}
function clearQBPrompt(){let pw=prompt('⚠️ 输入"确认清空"四个字来确认清空全部题库（不可恢复！）：');if(pw==='确认清空'){lsSet('questionBank',[]);renderAQBank();toast('题库已清空！')}else if(pw!==null)toast('输入不正确，取消清空')}

// 修改密码
function renderAPwd(){
  let h='<div class="auth-form" style="width:100%;max-width:100%"><label>当前用户：<strong>'+curUser+'</strong></label><label>新密码：<input id="admNewPwd" type="password"></label><label>确认新密码：<input id="admNewPwd2" type="password"></label><button class="btn btn-primary" onclick="changeAdminPwd()">修改密码</button></div>';
  let t=document.getElementById('aPwd');if(t)t.innerHTML=h;
}
function changeAdminPwd(){
  let p1=document.getElementById('admNewPwd')?.value,p2=document.getElementById('admNewPwd2')?.value;
  if(!p1||p1.length<4){toast('密码至少4位');return}if(!/^[a-zA-Z0-9]+$/.test(p1)){toast('只能数字或字母');return}
  if(p1!==p2){toast('两次密码不一致');return}
  let u=getUsers(),user=u.find(function(x){return x.username===curUser});if(!user)return;
  user.passwordHash=hashPwd(p1);saveUsers(u);toast('密码修改成功！')
}

// ============ 初始化 ============
function init(){
  initQB();initAdmin();
  let uc=getUsers().map(function(u){return u.username});
  for(let i=0;i<uc.length;i++){let u=uc[i];if(lsGet(u+'_loginState',!1)){curUser=u;break}}
  if(curUser){showScreen('mainScreen');initMain();}
  else showScreen('welcomeScreen');
  // 星星画布
  let canvas=$('starsCanvas'),ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  let stars=[];for(let i=0;i<100;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+.5,a:Math.random(),s:Math.random()*.02+.005});
  function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=0;i<stars.length;i++){let s=stars[i];s.a+=s.s;if(s.a>1){s.a=0;s.y=Math.random()*canvas.height}s.a>1&&(s.a=0);ctx.globalAlpha=.3+.7*Math.sin(s.a*Math.PI);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;requestAnimationFrame(anim)}
  anim();
}
window.addEventListener('DOMContentLoaded',init);
</script>
